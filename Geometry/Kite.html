<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
/* ===================== CONFIG ===================== */
const QUIZ_TITLE  = "Model 16 — Kite Model (Areas in a Quadrilateral)";
const LESSON_TITLE= "Model 16 — Kite Model (Areas in a Quadrilateral)";

const PARTS = [
  { title: "Part 1 (Core) — Kite Model: areas formed by intersecting diagonals (4 questions)", level: "Core", count: 4 }
];
const TOTAL_QUESTIONS = PARTS.reduce((s,p)=>s+p.count,0);

/* ===================== Utils ===================== */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ const t=a%b; a=b; b=t; } return a||1; }
function formatMs(ms){
  const totalSec=Math.floor(ms/1000), min=Math.floor(totalSec/60), sec=totalSec%60;
  return `${String(min).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
function escapeXml(s){
  return String(s)
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&apos;");
}
function wrapLines(lines, maxChars=72){
  const out=[];
  function pushWrapped(line){
    const words=String(line).split(/\s+/).filter(Boolean);
    if(words.length===0){ out.push(""); return; }
    let cur="";
    for(const w of words){
      if(w.length>maxChars){
        if(cur){ out.push(cur); cur=""; }
        for(let i=0;i<w.length;i+=maxChars) out.push(w.slice(i,i+maxChars));
        continue;
      }
      if(!cur) cur=w;
      else if((cur+" "+w).length<=maxChars) cur+=" "+w;
      else { out.push(cur); cur=w; }
    }
    if(cur) out.push(cur);
  }
  for(const line of lines) pushWrapped(line);
  return out;
}
function svgDataUri(svg){
  const encoded=encodeURIComponent(svg)
    .replaceAll("%0A","").replaceAll("%20"," ")
    .replaceAll("%3D","=").replaceAll("%3A",":")
    .replaceAll("%2F","/").replaceAll("%2C",",");
  return "data:image/svg+xml;charset=utf-8," + encoded;
}

/* Parse numbers from user input (supports fractions like 32/3) and ratios like 3:5 */
function parseNumbersFromInput(str){
  const s=(str||"").trim();
  if(!s) return [];
  const out=[];
  const re=/([+-]?\d+\s*\/\s*[+-]?\d+)|([+-]?\d+(?:\.\d+)?)/g;
  let m;
  while((m=re.exec(s))!==null){
    const token=(m[1]||m[2]||"").replace(/\s+/g,"");
    if(token.includes("/")){
      const [a,b]=token.split("/");
      const n=Number(a), d=Number(b);
      if(Number.isFinite(n)&&Number.isFinite(d)&&d!==0) out.push(n/d);
    }else{
      const v=Number(token);
      if(Number.isFinite(v)) out.push(v);
    }
  }
  return out;
}
function approxEqual(a,b,tol=1e-6){ return Math.abs(a-b)<=tol; }
function reducePair(p,q){
  const g=gcd(p,q);
  return {p:p/g, q:q/g};
}

/* ===================== SVG Card ===================== */
function makeSvgQuestionCard(lines, diagramMarkup, titleText=QUIZ_TITLE){
  const W=980, headerH=72, padX=44, textLineH=36, topY=headerH+48;
  const wrapped=wrapLines(lines, 72);
  const textBlockH = wrapped.length * textLineH;
  const diagramY = topY + textBlockH + 18;
  const diagramH = 400;
  const padBottom = 54;
  const H = diagramY + diagramH + padBottom;

  const textSpans=wrapped.map((t,i)=>{
    const y=topY + i*textLineH;
    return `<text x="${padX}" y="${y}" font-size="28" fill="#1f2a44" font-family="Segoe UI, Arial">${escapeXml(t)}</text>`;
  }).join("");

  const svg=`
  <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#f7fbff"/>
        <stop offset="1" stop-color="#ffffff"/>
      </linearGradient>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/>
      </filter>
      <clipPath id="clipBox">
        <rect x="44" y="0" width="${W-88}" height="${diagramH}" rx="16" ry="16"></rect>
      </clipPath>
    </defs>

    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${H-36}"
          fill="url(#g)" stroke="#dfe7f2" stroke-width="3" filter="url(#shadow)"/>
    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${headerH}"
          fill="#0d47a1" opacity="0.10"/>

    <text x="${padX}" y="56" font-size="28" fill="#0d47a1" font-weight="700"
          font-family="Segoe UI, Arial">${escapeXml(titleText)}</text>

    ${textSpans}

    <g transform="translate(0, ${diagramY})">
      <rect x="44" y="0" width="${W-88}" height="${diagramH}" rx="16" ry="16"
            fill="#ffffff" stroke="#e5e5e5" stroke-width="3"/>
      <g clip-path="url(#clipBox)">
        ${diagramMarkup}
      </g>
    </g>
  </svg>`.trim();

  return svgDataUri(svg);
}

/* ===================== Geometry helpers ===================== */
function lineIntersection(p1,p2,p3,p4){
  const x1=p1.x,y1=p1.y,x2=p2.x,y2=p2.y,x3=p3.x,y3=p3.y,x4=p4.x,y4=p4.y;
  const den=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);
  if(Math.abs(den)<1e-9) return null;
  const px=((x1*y2-y1*x2)*(x3-x4)-(x1-x2)*(x3*y4-y3*x4))/den;
  const py=((x1*y2-y1*x2)*(y3-y4)-(y1-y2)*(x3*y4-y3*x4))/den;
  return {x:px,y:py};
}
function centroid(a,b,c){ return {x:(a.x+b.x+c.x)/3, y:(a.y+b.y+c.y)/3}; }
function angle(p,q){ return Math.atan2(q.y-p.y, q.x-p.x); }
function angleDiff(a,b){
  let d = a-b;
  while(d>Math.PI) d-=2*Math.PI;
  while(d<-Math.PI) d+=2*Math.PI;
  return Math.abs(d);
}
function segmentIntersectionWithParams(p1,p2,p3,p4){
  // returns {x,y,t,u} where point = p1 + t*(p2-p1) = p3 + u*(p4-p3)
  const x1=p1.x,y1=p1.y,x2=p2.x,y2=p2.y,x3=p3.x,y3=p3.y,x4=p4.x,y4=p4.y;
  const den=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);
  if(Math.abs(den)<1e-9) return null;
  const px=((x1*y2-y1*x2)*(x3-x4)-(x1-x2)*(x3*y4-y3*x4))/den;
  const py=((x1*y2-y1*x2)*(y3-y4)-(y1-y2)*(x3*y4-y3*x4))/den;

  const dx12 = x2-x1, dy12 = y2-y1;
  const dx34 = x4-x3, dy34 = y4-y3;

  const t = (Math.abs(dx12) > Math.abs(dy12)) ? ((px - x1) / (dx12 || 1e-9)) : ((py - y1) / (dy12 || 1e-9));
  const u = (Math.abs(dx34) > Math.abs(dy34)) ? ((px - x3) / (dx34 || 1e-9)) : ((py - y3) / (dy34 || 1e-9));

  return {x:px,y:py,t,u};
}

/* ===================== Random NON-parallelogram quadrilateral ===================== */
function generateNonParallelogramQuad(){
  // Try multiple times to find a clearly non-parallelogram quadrilateral
  for(let tries=0; tries<200; tries++){
    // Anchor corners but allow strong irregularity (avoid near-parallel opposite sides)
    const A={x:randInt(220,360), y:randInt(70,150)};
    const D={x:randInt(600,780), y:randInt(50,170)};
    const B={x:randInt(200,380), y:randInt(290,390)};
    const C={x:randInt(580,800), y:randInt(280,410)};

    // Intersection must be inside both diagonals (not near endpoints)
    const inter = segmentIntersectionWithParams(A,C,B,D);
    if(!inter) continue;
    if(!(inter.t>0.18 && inter.t<0.82 && inter.u>0.18 && inter.u<0.82)) continue;

    // Reject shapes that look like parallelograms (opposite sides nearly parallel)
    const angAD = angle(A,D);
    const angBC = angle(B,C);
    const angAB = angle(A,B);
    const angDC = angle(D,C);

    // If both opposite pairs are close in angle -> parallelogram-like; reject
    const close1 = angleDiff(angAD, angBC) < 0.22; // ~12.6 degrees
    const close2 = angleDiff(angAB, angDC) < 0.22;
    if(close1 && close2) continue;

    // Also avoid "almost trapezoid-perfect" look where both pairs are too close
    // (we still allow trapezoids, just not too clean)
    if(close1 && angleDiff(angAB, angDC) < 0.14) continue;
    if(close2 && angleDiff(angAD, angBC) < 0.14) continue;

    return {A,B,C,D,O:{x:inter.x,y:inter.y}};
  }

  // fallback
  const A={x:300,y:90}, D={x:720,y:110}, C={x:640,y:360}, B={x:250,y:310};
  const O=lineIntersection(A,C,B,D) || {x:485,y:215};
  return {A,B,C,D,O};
}

/* ===================== Kite diagram ===================== */
function diagramKiteAreas(opts){
  // opts can omit some values to HIDE them (used in Q4)
  const missing = opts.missing || "";
  const shade = opts.shade || "";

  const {A,B,C,D,O} = generateNonParallelogramQuad();

  const styleText = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="7" fill="#1f2a44"`;
  const styleArea = `font-family="Segoe UI, Arial" font-weight="900" paint-order="stroke" stroke="#ffffff" stroke-width="8" fill="#111827"`;

  function dot(p){ return `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#1f2a44"/>`; }
  function label(p,t,dx,dy){ return `<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${t}</text>`; }

  const tri = {
    aob: [A,O,B],
    boc: [B,O,C],
    cod: [C,O,D],
    aod: [A,O,D],
  };

  function areaText(key, value){
    const [p,q,r]=tri[key];
    const c=centroid(p,q,r);
    const txt = (missing===key) ? "?" : String(value);
    return `<text x="${c.x}" y="${c.y}" font-size="34" text-anchor="middle" ${styleArea}>${escapeXml(txt)}</text>`;
  }

  function shadePoly(key){
    if(shade!==key) return "";
    const [p,q,r]=tri[key];
    return `<polygon points="${p.x},${p.y} ${q.x},${q.y} ${r.x},${r.y}" fill="rgba(33,150,243,0.18)" stroke="none"/>`;
  }

  let s = "";

  // Quadrilateral outline (intentionally irregular)
  s+=`<polygon points="${A.x},${A.y} ${D.x},${D.y} ${C.x},${C.y} ${B.x},${B.y}"
        fill="rgba(76,175,80,0.05)" stroke="#1f2a44" stroke-width="4"/>`;

  // Diagonals
  s+=`<line x1="${A.x}" y1="${A.y}" x2="${C.x}" y2="${C.y}" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${B.x}" y1="${B.y}" x2="${D.x}" y2="${D.y}" stroke="#1f2a44" stroke-width="4"/>`;

  // Optional shading (e.g., lake)
  s+=shadePoly("aod");

  // Points + labels
  s+=dot(A)+dot(B)+dot(C)+dot(D)+dot(O);
  s+=label(A,"A",-18,-14);
  s+=label(B,"B",-18,34);
  s+=label(C,"C",10,34);
  s+=label(D,"D",10,-14);
  s+=label(O,"O",10,-10);

  // ✅ Only render the areas that are provided (others are hidden)
  if(opts.aob!=null) s+=areaText("aob", opts.aob);
  if(opts.boc!=null) s+=areaText("boc", opts.boc);
  if(opts.cod!=null) s+=areaText("cod", opts.cod);
  if(opts.aod!=null) s+=areaText("aod", opts.aod);

  // Caption + NOT TO SCALE on the edge area
  s+=`<text x="92" y="382" font-size="22" ${styleText}>Diagonals AC and BD intersect at O</text>`;
  s+=`<text x="770" y="382" font-size="22" font-style="italic"
            font-family="Segoe UI, Arial" fill="#546e7a"
            paint-order="stroke" stroke="#ffffff" stroke-width="6">NOT TO SCALE</text>`;

  return `<g>${s}</g>`;
}

/* ===================== Grading ===================== */
function gradeAnswer(userText, answer){
  const nums = parseNumbersFromInput(userText);

  if(answer.type==="single"){
    if(nums.length<1) return false;
    return approxEqual(nums[0], answer.values[0], answer.tol ?? 1e-6);
  }

  if(answer.type==="number_ratio"){
    if(nums.length < 3) return false;
    const okNumber = approxEqual(nums[0], answer.number, answer.tol ?? 1e-6);
    if(!okNumber) return false;

    const a=nums[1], b=nums[2];
    if(Math.abs(b) < 1e-12) return false;
    const expected = answer.ratioP / answer.ratioQ;
    const got = a / b;
    return approxEqual(got, expected, 1e-6);
  }

  return false;
}

/* ===================== Question Generators (4) ===================== */
function genQ1(){
  const AOB = randInt(4,12);
  const AOD = randInt(2,10);
  const k   = randInt(2,6);
  const BOC = AOB * k;
  const COD = AOD * k;

  const lines=[
    "(Q1) In quadrilateral ABCD, diagonals AC and BD intersect at O.",
    "Three triangle areas are given on the diagram.",
    "Find the missing area of △COD.",
    "(Enter one number.)"
  ];

  return {
    img: makeSvgQuestionCard(lines, diagramKiteAreas({aob:AOB, boc:BOC, cod:COD, aod:AOD, missing:"cod"})),
    hintText: "Kite model fact: AOB × COD = BOC × AOD.",
    answer: { type:"single", values:[COD], label:String(COD) }
  };
}

function genQ2(){
  const r = randInt(2,6);
  let s = randInt(2,7);
  while(s===r) s=randInt(2,7);
  const u = randInt(2,8);
  const v = randInt(2,8);

  const AOB = r*u;
  const BOC = s*u;
  const COD = s*v;
  const AOD = r*v;

  const ratio = reducePair(r, s);

  const lines=[
    "(Q2) In quadrilateral ABCD, diagonals AC and BD intersect at O.",
    "Three triangle areas are shown. The area of △BOC is missing.",
    "1) Find Area(△BOC).",
    "2) Find AO:CO (write as a:b).",
    "(Enter: area, a:b  e.g., 12, 3:4)"
  ];

  return {
    img: makeSvgQuestionCard(lines, diagramKiteAreas({aob:AOB, boc:BOC, cod:COD, aod:AOD, missing:"boc"})),
    hintText: "Use: (1) AOB × COD = BOC × AOD. (2) AOB:BOC = AO:CO.",
    answer: {
      type:"number_ratio",
      number: BOC,
      ratioP: ratio.p,
      ratioQ: ratio.q,
      label: `Area(BOC) = ${BOC},  AO:CO = ${ratio.p}:${ratio.q}`
    }
  };
}

function genQ3(){
  const r = randInt(3,9);
  const s = randInt(3,10);
  const u = randInt(6,20);
  const v = randInt(6,20);

  const AOBraw = r*u;
  const BOCraw = s*u;
  const CODraw = s*v;
  const AODraw = r*v;

  const scale = 0.01;
  const AOB = +(AOBraw*scale).toFixed(2);
  const BOC = +(BOCraw*scale).toFixed(2);
  const COD = +(CODraw*scale).toFixed(2);
  const AOD = +(AODraw*scale).toFixed(2);
  const total = +((AOBraw+BOCraw+CODraw+AODraw)*scale).toFixed(2);

  const place = pick(["Riverside Park","Kowhai Gardens","Silverlake Reserve","Cedar Bay Park","Hillview Park"]);
  const unit = "km²";

  const lines=[
    "(Q3) A park is shaped like quadrilateral ABCD. Diagonals AC and BD intersect at O.",
    `Area(△AOB) = ${AOB} ${unit}, Area(△BOC) = ${BOC} ${unit}, Area(△COD) = ${COD} ${unit}.`,
    `The total area of ${place} is ${total} ${unit}. The shaded region △AOD is a lake.`,
    "Find the area of the lake (△AOD).",
    "(Enter one number.)"
  ];

  return {
    img: makeSvgQuestionCard(lines, diagramKiteAreas({aob:AOB, boc:BOC, cod:COD, aod:AOD, missing:"aod", shade:"aod"})),
    hintText: "Either use Total = AOB + BOC + COD + AOD, or use AOB × COD = BOC × AOD.",
    answer: { type:"single", values:[AOD], tol:1e-4, label:String(AOD) }
  };
}

function genQ4(){
  // Only TWO triangle areas are shown on the diagram. (Largest is NOT visible directly.)
  const unit = pick(["hectares","acres"]);

  let p = randInt(2,9), q = randInt(2,9);
  while(gcd(p,q)!==1 || p===q){ p = randInt(2,9); q = randInt(2,9); }
  const m = randInt(1,6);
  const k = randInt(2,7);

  const AOD = p*m;
  const COD = q*m;
  const AOB = p*k;
  const BOC = q*k;

  const total = AOD + COD + AOB + BOC;
  const largest = Math.max(AOD, COD, AOB, BOC);

  const lines=[
    "(Q4) A plot of land (quadrilateral ABCD) is split by its two diagonals into four triangles.",
    `The total area is ${total} ${unit}. Two triangle areas are shown on the diagram:`,
    `Area(△AOD) = ${AOD}, and Area(△COD) = ${COD}.`,
    "Find the area of the largest triangle.",
    "(Enter one number.)"
  ];

  return {
    img: makeSvgQuestionCard(lines, diagramKiteAreas({aod:AOD, cod:COD})),
    hintText: "Kite model: AOB:BOC = AOD:COD. Also AOB + BOC = Total − (AOD + COD).",
    answer: { type:"single", values:[largest], label:String(largest) }
  };
}

/* ===================== Build Questions ===================== */
function buildQuestions(){
  return [genQ1(), genQ2(), genQ3(), genQ4()];
}

/* ===================== State ===================== */
let questions=[];
let currentQuestionIndex=0;
let studentName="Student";
let quizStartTime=null;
let quizEndTime=null;
let quizSubmitted=false;

let timerInterval=null;
let elapsedMs=0;
let isPaused=false;
let firstAttemptMs=null;

let setCounter=0;
let lastSignature="";

/* DOM */
const quizContent=document.getElementById("quizContent");
const sidebarEl=document.getElementById("sidebar");

const buttonContainer=document.getElementById("navButtons");
const backButton=document.getElementById("backButton");
const nextButton=document.getElementById("nextButton");
const submitButton=document.getElementById("submitButton");
const checkButton=document.getElementById("checkButton");
const saveButton=document.getElementById("saveButton");

const generateBtn=document.getElementById("generateButton");
const pauseButton=document.getElementById("pauseButton");
const exportQuestionsBtn=document.getElementById("exportQuestionsBtn");
const pdfPerPageSel=document.getElementById("pdfPerPage");

const timerDisplay=document.getElementById("timerDisplay");
const studentLine=document.getElementById("studentLine");
const setLine=document.getElementById("setLine");

/* ===================== Timer ===================== */
function updateTimerDisplay(){
  let totalMs=elapsedMs;
  if(!isPaused && quizStartTime) totalMs+=(new Date()-quizStartTime);
  let text=`Time: ${formatMs(totalMs)}`;
  if(firstAttemptMs!==null) text+=` (First: ${formatMs(firstAttemptMs)})`;
  timerDisplay.textContent=text;
}
function startTimerInterval(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(updateTimerDisplay, 1000);
}
function pauseTimer(){
  if(isPaused || !quizStartTime) return;
  const now=new Date();
  elapsedMs+=now-quizStartTime;
  isPaused=true;
  quizStartTime=null;
  updateTimerDisplay();
}
function resumeTimer(){
  if(!isPaused) return;
  isPaused=false;
  quizStartTime=new Date();
  updateTimerDisplay();
}

/* ===================== Generate Quiz ===================== */
function signatureOf(built){
  return built.map(q=>q.answer.label).join("|");
}
function generateQuiz(){
  questions=[];
  quizSubmitted=false;

  let tries=0;
  let built=null;

  while(tries<60){
    built = buildQuestions();
    const sig = signatureOf(built);
    if(sig !== lastSignature){
      lastSignature = sig;
      break;
    }
    tries++;
  }

  setCounter++;
  setLine.textContent = `Set: ${setCounter}`;

  for(let i=0;i<built.length;i++){
    questions.push({
      partIndex: 0,
      indexInPart: i,
      img: built[i].img,
      hint: built[i].hintText || "Use the kite model area relationships.",
      answer: built[i].answer,
      userValue:"",
      isCorrect:false
    });
  }
}

/* ===================== Sidebar ===================== */
function renderSidebar(){
  sidebarEl.style.display="block";
  sidebarEl.innerHTML=`<h4>Questions</h4><ul id="qList"></ul>`;
  const ul=document.getElementById("qList");

  for(let i=0;i<TOTAL_QUESTIONS;i++){
    const li=document.createElement("li");
    li.textContent=`Q${i+1}`;
    li.dataset.index=i;
    li.addEventListener("click",()=>{
      saveCurrentInput();
      currentQuestionIndex=i;
      renderQuestion();
    });
    ul.appendChild(li);
  }
  updateSidebarStatus();
}
function updateSidebarStatus(){
  const items=document.querySelectorAll("#qList li");
  items.forEach(li=>{
    const idx=Number(li.dataset.index);
    const q=questions[idx];
    li.classList.remove("active","answered","correct","incorrect");

    if(!quizSubmitted){
      li.classList.toggle("active", idx===currentQuestionIndex);
      if((q.userValue||"").trim()!=="") li.classList.add("answered");
    }else{
      if((q.userValue||"").trim()!==""){
        li.classList.add(q.isCorrect ? "correct" : "incorrect");
      }
    }
  });
}

/* ===================== Helpers ===================== */
function saveCurrentInput(){
  const input=document.getElementById("answerInput");
  if(input){
    questions[currentQuestionIndex].userValue=input.value.trim();
    if(quizSubmitted){
      const q=questions[currentQuestionIndex];
      q.isCorrect = gradeAnswer(q.userValue, q.answer);
      updateSidebarStatus();
    }
  }
}
function mountNavButtonsInto(slotId){
  const slot=document.getElementById(slotId);
  if(!slot) return;
  slot.appendChild(buttonContainer);
  buttonContainer.style.display="flex";
}

/* ===================== Render Question ===================== */
function renderQuestion(){
  const q=questions[currentQuestionIndex];
  const placeholder = "e.g., 12  (or: 12, 3:4 for Q2)";

  quizContent.innerHTML=`
    <p class="question-text">Question ${currentQuestionIndex+1} of ${TOTAL_QUESTIONS}</p>
    <div class="part-title">${escapeXml(PARTS[0].title)}</div>

    <div class="single-question">
      <div style="font-weight:800;margin-bottom:8px;">Core — Question ${q.indexInPart+1}</div>

      <div class="img-wrap">
        <img class="q-img" src="${q.img}" alt="Question image">
      </div>

      <div class="answer-row">
        <div style="font-weight:700;">Answer:</div>
        <input id="answerInput" class="answer-box" type="text"
               placeholder="${escapeXml(placeholder)}"
               value="${escapeXml(q.userValue||"")}">
      </div>

      <div id="checkFeedback" style="display:none;"></div>

      <div class="hint-row">
        <button id="hintBtn" class="hint-btn">Hint</button>
      </div>

      <div id="hintBox" class="hint">${escapeXml(q.hint)}</div>
    </div>

    <div id="navSlot"></div>
  `;

  mountNavButtonsInto("navSlot");

  const hintBtn=document.getElementById("hintBtn");
  const hintBox=document.getElementById("hintBox");
  hintBtn.addEventListener("click", ()=>{
    const shown=hintBox.style.display==="block";
    hintBox.style.display = shown ? "none" : "block";
    hintBtn.textContent = shown ? "Hint" : "Hide Hint";
  });

  backButton.style.display="inline-block";
  backButton.style.visibility=(currentQuestionIndex===0)?"hidden":"visible";

  const isLast=(currentQuestionIndex===TOTAL_QUESTIONS-1);
  nextButton.style.display=isLast?"none":"inline-block";
  submitButton.style.display=isLast?"inline-block":"none";

  if(!quizSubmitted){
    checkButton.style.display="inline-block";
  }else{
    checkButton.style.display = (q.userValue||"").trim()!=="" && !q.isCorrect ? "inline-block" : "none";
  }

  saveButton.style.display=quizSubmitted?"inline-block":"none";
  updateSidebarStatus();
}

/* ===================== Results + Submit ===================== */
function calculateAndShowResults(){
  saveCurrentInput();

  const now=new Date();
  let attemptMs=elapsedMs;
  if(!isPaused && quizStartTime) attemptMs+=now-quizStartTime;
  if(firstAttemptMs===null) firstAttemptMs=attemptMs;

  const attemptStartTime=quizStartTime || now;
  quizEndTime=now;
  quizSubmitted=true;

  let correctCount=0;
  questions.forEach((q)=>{
    q.isCorrect = gradeAnswer(q.userValue, q.answer);
    if(q.isCorrect) correctCount++;
  });

  updateSidebarStatus();

  let html=`
    <h3>Results for ${escapeXml(studentName)}</h3>
    <p>Set: <strong>${setCounter}</strong></p>
    <p>Score: <strong>${correctCount} / ${TOTAL_QUESTIONS}</strong></p>
    <p>Start time: <strong>${attemptStartTime.toLocaleTimeString()}</strong></p>
    <p>Submit time: <strong>${quizEndTime.toLocaleTimeString()}</strong></p>
    <p>Time taken (this attempt): <strong>${formatMs(attemptMs)}</strong></p>
    <p>First attempt time: <strong>${formatMs(firstAttemptMs)}</strong></p>

    <table class="review-table">
      <tr>
        <th>#</th><th>Image</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th>
      </tr>
  `;

  questions.forEach((q,i)=>{
    const ua=(q.userValue||"").trim();
    const correctText = q.answer.label;

    html+=`
      <tr class="${q.isCorrect ? "correct-answer":"incorrect-answer"}">
        <td>${i+1}</td>
        <td><img class="thumb" src="${q.img}" alt="Q${i+1}"></td>
        <td>${ua==="" ? "—" : escapeXml(ua)}</td>
        <td><strong>${escapeXml(correctText)}</strong></td>
        <td>${ua==="" ? "Not answered" : (q.isCorrect ? "Correct":"Incorrect")}</td>
      </tr>
    `;
  });

  html+=`</table><div id="navSlot"></div>`;
  quizContent.innerHTML=html;

  mountNavButtonsInto("navSlot");

  backButton.style.display="none";
  nextButton.style.display="none";
  submitButton.style.display="none";
  checkButton.style.display="none";
  saveButton.style.display="inline-block";
}

/* ===================== Buttons ===================== */
nextButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex<TOTAL_QUESTIONS-1){
    currentQuestionIndex++;
    renderQuestion();
  }
});
backButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex>0){
    currentQuestionIndex--;
    renderQuestion();
  }
});
submitButton.addEventListener("click", ()=>{
  if(currentQuestionIndex===TOTAL_QUESTIONS-1){
    calculateAndShowResults();
  }
});

checkButton.addEventListener("click", ()=>{
  saveCurrentInput();
  const q=questions[currentQuestionIndex];

  q.isCorrect = gradeAnswer(q.userValue, q.answer);
  updateSidebarStatus();

  const box=document.getElementById("checkFeedback");
  if(!box) return;

  box.className="check-feedback";
  box.style.display="block";

  if(q.isCorrect){
    box.innerHTML=`✅ Correct!`;
    if(quizSubmitted) checkButton.style.display="none";
  }else{
    box.innerHTML=`❌ Incorrect. Correct answer: <strong>${escapeXml(q.answer.label)}</strong>`;
    if(quizSubmitted) checkButton.style.display="inline-block";
  }
});

/* Save TXT */
function formatDateForFilename(date){
  if(!date) return "no_time";
  const pad=n=>String(n).padStart(2,"0");
  return date.getFullYear()+pad(date.getMonth()+1)+pad(date.getDate())+"_"+pad(date.getHours())+pad(date.getMinutes())+pad(date.getSeconds());
}
function saveCurrentResultAsTxt(){
  saveCurrentInput();

  let correctCount=0;
  questions.forEach(q=>{ if(q.isCorrect) correctCount++; });

  const lines=[];
  lines.push(QUIZ_TITLE + " — Current Result");
  lines.push("Student: "+studentName);
  lines.push("Set: "+setCounter);
  if(quizEndTime) lines.push("Last submit time: "+quizEndTime.toLocaleString());
  lines.push("Score: "+correctCount+" / "+TOTAL_QUESTIONS);
  if(firstAttemptMs!==null) lines.push("First attempt time: "+formatMs(firstAttemptMs));
  lines.push("");

  questions.forEach((q,i)=>{
    const userAns=(q.userValue||"").trim()==="" ? "Not answered" : q.userValue;
    const resultText=(q.userValue||"").trim()==="" ? "Not answered" : (q.isCorrect?"Correct":"Incorrect");
    lines.push(`Q${i+1}`);
    lines.push("Your answer: "+userAns);
    lines.push("Correct answer: "+q.answer.label);
    lines.push("Result: "+resultText);
    lines.push("");
  });

  const content=lines.join("\n");
  const blob=new Blob([content],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const safeName=studentName.replace(/[^a-z0-9_\-]/gi,"_")||"Student";
  const ts=formatDateForFilename(new Date());
  a.href=url;
  a.download=`KiteModel_${safeName}_Set${setCounter}_${ts}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
saveButton.addEventListener("click", saveCurrentResultAsTxt);

/* Pause/Resume (no popup) */
pauseButton.addEventListener("click", ()=>{
  if(!quizStartTime && elapsedMs===0 && !quizSubmitted) return;
  if(isPaused){ resumeTimer(); pauseButton.textContent="Pause"; }
  else { pauseTimer(); pauseButton.textContent="Resume"; }
});

/* ===================== Generate new set (WITH browser confirm) ===================== */
generateBtn.addEventListener("click", ()=>{
  const ok = window.confirm("Generate a new random set? All answers will be lost.");
  if(!ok) return;
  doGenerateNewSet();
});

function doGenerateNewSet(){
  if(timerInterval) clearInterval(timerInterval);
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=new Date(); quizEndTime=null;
  updateTimerDisplay(); startTimerInterval();
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();
}

/* ===================== Export Questions PDF ===================== */
function waitForImages(container){
  const imgs = Array.from(container.querySelectorAll("img"));
  return Promise.all(imgs.map(img => {
    if(img.complete && img.naturalWidth > 0) return Promise.resolve();
    return new Promise(resolve => {
      img.onload = () => resolve();
      img.onerror = () => resolve();
    });
  }));
}
exportQuestionsBtn.addEventListener("click", async ()=>{
  if(!questions || questions.length===0){
    alert("Please start a quiz first.");
    return;
  }
  if(!window.jspdf || !window.jspdf.jsPDF){
    alert("PDF export needs internet to load jsPDF/html2canvas (CDN). The quiz itself works offline.");
    return;
  }

  const perPage = Number(pdfPerPageSel.value || 3);

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  const wrapper=document.createElement("div");
  wrapper.style.position="fixed";
  wrapper.style.left="-9999px";
  wrapper.style.top="0";
  wrapper.style.width="800px";
  wrapper.style.background="#ffffff";
  document.body.appendChild(wrapper);

  try{
    let pageDiv=null;

    questions.forEach((q, idx)=>{
      if(idx%perPage===0){
        pageDiv=document.createElement("div");
        pageDiv.style.padding="20px";
        pageDiv.style.marginBottom="20px";
        pageDiv.style.boxSizing="border-box";

        const header=document.createElement("div");
        header.innerHTML=`
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <div style="width:24px;height:24px;background:#0d47a1;border-radius:6px;position:relative;">
              <div style="position:absolute;width:12px;height:5px;background:#ff9800;top:-4px;left:12px;border-radius:3px;"></div>
            </div>
            <div style="display:flex;flex-direction:column;line-height:1.1;">
              <div style="font-weight:900;letter-spacing:1px;color:#ff9800;font-size:14px;">DYAA</div>
              <div style="font-size:11px;color:#0d47a1;font-weight:700;">EDUCATION</div>
            </div>
          </div>
          <hr style="border:none;border-top:1px solid #e0e0e0;margin:0 0 12px 0;">
          <div style="font-weight:800;color:#1f2a44;margin:0 0 4px 0;">${LESSON_TITLE}</div>
          <div style="color:#546e7a;font-weight:800;margin:0 0 10px 0;">Questions (Set ${setCounter})</div>
        `;
        pageDiv.appendChild(header);
        wrapper.appendChild(pageDiv);
      }

      const qDiv=document.createElement("div");
      qDiv.style.marginBottom="18px";
      qDiv.innerHTML=`
        <div style="font-weight:700;margin:4px 0 6px 0;">Q${idx+1}</div>
        <div style="border-radius:12px;border:1px solid #e5e5e5;padding:12px;">
          <img src="${q.img}" style="width:100%;height:auto;border-radius:10px;" />
        </div>
      `;
      pageDiv.appendChild(qDiv);
    });

    const pages=Array.from(wrapper.children);

    for(let i=0;i<pages.length;i++){
      await waitForImages(pages[i]);

      const canvas = await html2canvas(pages[i], { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
      const imgData = canvas.toDataURL("image/png");

      const imgWidth = pageWidth - 20;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;

      if(i>0) pdf.addPage();
      pdf.addImage(imgData, "PNG", 10, 10, imgWidth, Math.min(imgHeight, pageHeight - 20));
    }

    const safeName=(studentName||"Student").replace(/[^a-z0-9_\-]/gi,"_") || "Student";
    const ts=formatDateForFilename(new Date());
    pdf.save(`KiteModel_Questions_${safeName}_Set${setCounter}_${ts}.pdf`);
  } finally {
    document.body.removeChild(wrapper);
  }
});

/* ===================== Start Screen (+ optional ?name=Tiger) ===================== */
function getNameFromUrl(){
  const url=new URL(window.location.href);
  const name=url.searchParams.get("name");
  return name ? name.trim() : "";
}
function showStartScreen(){
  sidebarEl.style.display="none";
  buttonContainer.style.display="none";
  generateBtn.style.display="none";
  saveButton.style.display="none";
  pauseButton.style.display="none";
  exportQuestionsBtn.style.display="none";

  studentLine.textContent="";
  setLine.textContent="";

  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=null; quizEndTime=null;
  updateTimerDisplay();

  const preset=getNameFromUrl();
  if(preset){
    studentName=preset;
    studentLine.textContent=`Student: ${studentName}`;
    startQuiz(true);
    return;
  }

  quizContent.innerHTML=`
    <p>This quiz has <strong>${TOTAL_QUESTIONS}</strong> questions.</p>
    <p style="margin-top:10px;">Enter your name to begin:</p>

    <input id="nameInput" type="text"
      style="padding:10px;width:260px;font-size:1.05em;border:1px solid #ccc;border-radius:10px;"
      placeholder="Your name">

    <button id="startButton"
      style="margin-left:10px;background:#4caf50;padding:10px 20px;color:white;border:none;border-radius:8px;">
      Start Quiz
    </button>
  `;
  document.getElementById("startButton").addEventListener("click", ()=>startQuiz(false));
}
function startQuiz(skipReadName){
  if(!skipReadName){
    const nameInput=document.getElementById("nameInput");
    studentName=(nameInput.value || "Student").trim();
  }
  studentLine.textContent=`Student: ${studentName}`;

  quizStartTime=new Date();
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  updateTimerDisplay(); startTimerInterval();

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();

  generateBtn.style.display="inline-block";
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";
  exportQuestionsBtn.style.display="inline-block";
}

/* ===================== Init ===================== */
showStartScreen();
</script>
