<script>
/* ===================== CONFIG ===================== */
const SVG_TITLE = "Model 3 — Building Blocks";
const LESSON_TITLE = "Model 3 — Building Blocks: Counting Cubes";

const PART_TITLES = [
  "Part 1 (Warm-up) — Count cubes in simple stacks (2 questions)",
  "Part 2 (Core) — Hollow / carved solids (2 questions)",
  "Part 3 (Apply) — Add cubes to complete a cube (2 questions)"
];

const NUM_PARTS = 3;
const QUESTIONS_PER_PART = 2;
const TOTAL_QUESTIONS = NUM_PARTS * QUESTIONS_PER_PART;

/* ===================== Utils ===================== */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

function formatMs(ms){
  const totalSec=Math.floor(ms/1000), min=Math.floor(totalSec/60), sec=totalSec%60;
  return `${String(min).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
function escapeXml(s){
  return String(s)
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&apos;");
}
function wrapLines(lines, maxChars=70){
  const out=[];
  function pushWrapped(line){
    const words=String(line).split(/\s+/).filter(Boolean);
    if(words.length===0){ out.push(""); return; }
    let cur="";
    for(const w of words){
      if(w.length>maxChars){
        if(cur){ out.push(cur); cur=""; }
        for(let i=0;i<w.length;i+=maxChars) out.push(w.slice(i,i+maxChars));
        continue;
      }
      if(!cur) cur=w;
      else if((cur+" "+w).length<=maxChars) cur+=" "+w;
      else { out.push(cur); cur=w; }
    }
    if(cur) out.push(cur);
  }
  for(const line of lines) pushWrapped(line);
  return out;
}
function svgDataUri(svg){
  const encoded=encodeURIComponent(svg)
    .replaceAll("%0A","").replaceAll("%20"," ")
    .replaceAll("%3D","=").replaceAll("%3A",":")
    .replaceAll("%2F","/").replaceAll("%2C",",");
  return "data:image/svg+xml;charset=utf-8," + encoded;
}
function parseNumbersFromInput(str){
  const s=(str||"").trim();
  if(!s) return [];
  const out=[];
  const re=/([+-]?\d+\s*\/\s*[+-]?\d+)|([+-]?\d+(?:\.\d+)?)/g;
  let m;
  while((m=re.exec(s))!==null){
    const token=(m[1]||m[2]||"").replace(/\s+/g,"");
    if(token.includes("/")){
      const [a,b]=token.split("/");
      const n=Number(a), d=Number(b);
      if(Number.isFinite(n)&&Number.isFinite(d)&&d!==0) out.push(n/d);
    }else{
      const v=Number(token);
      if(Number.isFinite(v)) out.push(v);
    }
  }
  return out;
}
function approxEqual(a,b,tol=1e-6){ return Math.abs(a-b)<=tol; }

/* ===================== SVG Card ===================== */
function makeSvgQuestionCard(lines, diagramMarkup, titleText=SVG_TITLE){
  const W=980, headerH=72, padX=44, textLineH=36, topY=headerH+48;
  const wrapped=wrapLines(lines, 72);
  const textBlockH = wrapped.length * textLineH;
  const diagramY = topY + textBlockH + 18;
  const diagramH = 360;
  const padBottom = 54;
  const H = diagramY + diagramH + padBottom;

  const textSpans=wrapped.map((t,i)=>{
    const y=topY + i*textLineH;
    return `<text x="${padX}" y="${y}" font-size="28" fill="#1f2a44" font-family="Segoe UI, Arial">${escapeXml(t)}</text>`;
  }).join("");

  const svg=`
  <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#f7fbff"/>
        <stop offset="1" stop-color="#ffffff"/>
      </linearGradient>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/>
      </filter>
      <clipPath id="clipBox">
        <rect x="44" y="0" width="${W-88}" height="${diagramH}" rx="16" ry="16"></rect>
      </clipPath>
    </defs>

    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${H-36}"
          fill="url(#g)" stroke="#dfe7f2" stroke-width="3" filter="url(#shadow)"/>
    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${headerH}"
          fill="#0d47a1" opacity="0.10"/>

    <text x="${padX}" y="56" font-size="28" fill="#0d47a1" font-weight="700"
          font-family="Segoe UI, Arial">${escapeXml(titleText)}</text>

    ${textSpans}

    <g transform="translate(0, ${diagramY})">
      <rect x="44" y="0" width="${W-88}" height="${diagramH}" rx="16" ry="16"
            fill="#ffffff" stroke="#e5e5e5" stroke-width="3"/>
      <g clip-path="url(#clipBox)">
        ${diagramMarkup}
      </g>
    </g>
  </svg>`.trim();

  return svgDataUri(svg);
}

function hintCardSvg(lines, title="Hint"){
  const W=980, headerH=60, padX=44, lineH=34, firstLineY=headerH+44, padBottom=44;
  const wrapped=wrapLines(lines, 84);
  const H=firstLineY + (wrapped.length-1)*lineH + padBottom;

  const textSpans=wrapped.map((t,i)=>{
    const y=firstLineY + i*lineH;
    return `<text x="${padX}" y="${y}" font-size="24" fill="#1f2a44" font-family="Segoe UI, Arial">${escapeXml(t)}</text>`;
  }).join("");

  const svg=`
  <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ffffff"/>
        <stop offset="1" stop-color="#fff7e6"/>
      </linearGradient>
      <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.10"/>
      </filter>
    </defs>

    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${H-36}"
          fill="url(#bg)" stroke="#ffe0b2" stroke-width="3" filter="url(#shadow2)"/>

    <text x="${padX}" y="52" font-size="26" fill="#8d6e63" font-weight="800"
          font-family="Segoe UI, Arial">${escapeXml(title)}</text>

    ${textSpans}
  </svg>`.trim();

  return svgDataUri(svg);
}

/* ===================== Isometric cube renderer ===================== */
function proj(i,j,k,u){
  // R=(u,u/2), L=(-u,u/2), U=(0,-u)
  return { x:(i-j)*u, y:(i+j)*u*0.5 - k*u };
}
function addP(a,b){ return {x:a.x+b.x, y:a.y+b.y}; }

function cubePolys(base,u){
  const R={x:u, y:u*0.5}, L={x:-u, y:u*0.5}, D={x:0, y:u};

  const P0=base;                 // top front-ish corner
  const P1=addP(base,R);
  const P2=addP(addP(base,R),L);
  const P3=addP(base,L);

  const P0d=addP(P0,D), P1d=addP(P1,D), P2d=addP(P2,D), P3d=addP(P3,D);

  return {
    top:[P0,P1,P2,P3],
    right:[P0,P1,P1d,P0d],
    left:[P0,P3,P3d,P0d]
  };
}
function ptsToStr(pts){ return pts.map(p=>`${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(" "); }

function computeBounds(cubes,u){
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  cubes.forEach(c=>{
    const b=proj(c.i,c.j,c.k,u);
    const polys=cubePolys(b,u);
    [...polys.top, ...polys.left, ...polys.right].forEach(p=>{
      minX=Math.min(minX,p.x); minY=Math.min(minY,p.y);
      maxX=Math.max(maxX,p.x); maxY=Math.max(maxY,p.y);
    });
  });
  if(!isFinite(minX)) return {minX:0,minY:0,maxX:1,maxY:1};
  return {minX,minY,maxX,maxY};
}

function isoDiagram(cubes, opts={}){
  // opts: {showLegend:boolean, caption:string}
  const W=980, H=360, pad=26;

  // choose u to fit
  let u=30;
  for(let t=0;t<20;t++){
    const b=computeBounds(cubes,u);
    const bw=b.maxX-b.minX, bh=b.maxY-b.minY;
    if(bw <= (W-2*pad) && bh <= (H-2*pad)) break;
    u = Math.max(16, u-1.2);
  }

  const b=computeBounds(cubes,u);
  const bw=b.maxX-b.minX, bh=b.maxY-b.minY;
  const offX = (W - bw)/2 - b.minX;
  const offY = (H - bh)/2 - b.minY;

  const styleText = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;

  // draw order: back-to-front
  const sorted=[...cubes].sort((a,b)=>{
    const da=(a.i+a.j), db=(b.i+b.j);
    if(da!==db) return da-db;
    if(a.k!==b.k) return b.k-a.k; // higher first
    if(a.j!==b.j) return a.j-b.j;
    return a.i-b.i;
  });

  function faceColors(style){
    if(style==="ghost"){
      return {
        top:"rgba(255,152,0,0.16)",
        left:"rgba(255,152,0,0.12)",
        right:"rgba(255,152,0,0.10)",
        stroke:"rgba(31,42,68,0.55)"
      };
    }
    if(style==="removed"){
      return {
        top:"rgba(244,67,54,0.16)",
        left:"rgba(244,67,54,0.12)",
        right:"rgba(244,67,54,0.10)",
        stroke:"rgba(31,42,68,0.55)"
      };
    }
    return {
      top:"#ffffff",
      left:"#f2f2f2",
      right:"#e6e6e6",
      stroke:"#1f2a44"
    };
  }

  let g=``;

  // soft ground line
  g+=`<line x1="120" y1="315" x2="860" y2="315" stroke="#e6eef7" stroke-width="10" stroke-linecap="round"/>`;

  sorted.forEach(c=>{
    const base=proj(c.i,c.j,c.k,u);
    const base2={x:base.x+offX, y:base.y+offY};
    const polys=cubePolys(base2,u);
    const col=faceColors(c.style||"solid");

    // draw left, right, top (typical iso)
    g+=`<polygon points="${ptsToStr(polys.left)}" fill="${col.left}" stroke="${col.stroke}" stroke-width="2"/>`;
    g+=`<polygon points="${ptsToStr(polys.right)}" fill="${col.right}" stroke="${col.stroke}" stroke-width="2"/>`;
    g+=`<polygon points="${ptsToStr(polys.top)}" fill="${col.top}" stroke="${col.stroke}" stroke-width="2"/>`;
  });

  if(opts.caption){
    g+=`<text x="490" y="342" text-anchor="middle" font-size="22" ${styleText}>${escapeXml(opts.caption)}</text>`;
  }

  if(opts.showLegend){
    g+=`
      <g transform="translate(70,40)">
        <rect x="0" y="0" width="260" height="78" rx="12" ry="12" fill="rgba(247,251,255,0.95)" stroke="#dfe7f2" stroke-width="2"/>
        <rect x="14" y="18" width="18" height="18" fill="#ffffff" stroke="#1f2a44" stroke-width="2"/>
        <text x="40" y="33" font-size="20" ${styleText}>Existing cubes</text>
        <rect x="14" y="48" width="18" height="18" fill="rgba(255,152,0,0.16)" stroke="rgba(31,42,68,0.55)" stroke-width="2"/>
        <text x="40" y="63" font-size="20" ${styleText}>Missing / removed</text>
      </g>
    `;
  }

  return `<g>${g}</g>`;
}

/* ===================== Shape builders ===================== */
function addCube(set,i,j,k,style="solid"){
  set.push({i,j,k,style});
}

function buildSolidBlock(A,B,C, style="solid"){
  const cubes=[];
  for(let i=0;i<A;i++){
    for(let j=0;j<B;j++){
      for(let k=0;k<C;k++){
        addCube(cubes,i,j,k,style);
      }
    }
  }
  return cubes;
}

function removeSubBlockFromCubes(cubes, rx0, ry0, rz0, a, b, c){
  // Remove cubes with i in [rx0, rx0+a-1], j in [ry0, ry0+b-1], k in [rz0, rz0+c-1]
  const removed=[];
  const keep=[];
  cubes.forEach(q=>{
    const inI = q.i>=rx0 && q.i<rx0+a;
    const inJ = q.j>=ry0 && q.j<ry0+b;
    const inK = q.k>=rz0 && q.k<rz0+c;
    if(inI && inJ && inK) removed.push(q);
    else keep.push(q);
  });
  return {keep, removed};
}

/* ===================== 6 Question Generators ===================== */
function genQ1SimpleStack(){
  const A=randInt(3,5);
  const B=randInt(2,4);
  const a2=randInt(2, Math.max(2, A-1));
  const b2=randInt(1, Math.max(1, B-1));

  const addTop = Math.random()<0.55;

  const cubes=[];
  // base layer
  for(let i=0;i<A;i++) for(let j=0;j<B;j++) addCube(cubes,i,j,0,"solid");
  // second layer in one corner
  for(let i=0;i<a2;i++) for(let j=0;j<b2;j++) addCube(cubes,i,j,1,"solid");
  if(addTop) addCube(cubes,0,0,2,"solid");

  const total = cubes.filter(c=>c.style==="solid").length;

  const lines=[
    "(Warm-up) Count the cubes",
    "The picture shows a stack of identical unit cubes.",
    "How many unit cubes are in the stack in total?",
    "(Enter one integer.)"
  ];

  const hint=hintCardSvg([
    "Count layer by layer:",
    "• Count cubes on the bottom layer.",
    "• Count cubes on the second layer (and any higher layer).",
    "Add them together."
  ], "Hint (Layer counting)");

  return {
    img: makeSvgQuestionCard(lines, isoDiagram(cubes,{caption:"Unit cubes stack"})),
    diagram: hint,
    hintText: "Count bottom layer, then the upper layer(s). Add them together.",
    answer: {type:"single", values:[total], label:`${total}`}
  };
}

function genQ2UShape(){
  const W=randInt(4,6);      // length along i
  const H=randInt(2,4);      // pillar height
  const depth = pick([1,2]); // thickness in j

  const cubes=[];
  // base path (like a corridor)
  for(let i=0;i<W;i++){
    for(let j=0;j<depth;j++){
      addCube(cubes,i,j,0,"solid");
    }
  }
  // two pillars at ends (front edge j=0)
  for(let k=1;k<H;k++){
    addCube(cubes,0,0,k,"solid");
    addCube(cubes,W-1,0,k,"solid");
  }
  // optional top bridge at height H-1
  if(Math.random()<0.7){
    for(let i=1;i<W-1;i++){
      addCube(cubes,i,0,H-1,"solid");
    }
  }

  const total = cubes.length;

  const lines=[
    "(Warm-up) Count the cubes",
    "This is a small 'building' made from unit cubes.",
    "Count ALL unit cubes in the figure (including vertical pillars).",
    "(Enter one integer.)"
  ];

  const hint=hintCardSvg([
    "Tip: split the figure into parts:",
    "• Count the bottom floor first.",
    "• Then count cubes above the floor (pillars and any top row)."
  ], "Hint (Split into parts)");

  return {
    img: makeSvgQuestionCard(lines, isoDiagram(cubes,{caption:"A small U/bridge structure"})),
    diagram: hint,
    hintText: "Count the base layer, then add cubes above it (pillars / top bridge).",
    answer: {type:"single", values:[total], label:`${total}`}
  };
}

function genQ3Staircase(){
  const n=randInt(4,6);           // number of steps
  const w=pick([1,2]);            // width
  const cubes=[];

  // staircase: height decreases as i increases
  for(let i=0;i<n;i++){
    const h=n-i;
    for(let j=0;j<w;j++){
      for(let k=0;k<h;k++){
        addCube(cubes,i,j,k,"solid");
      }
    }
  }
  const total=cubes.length; // = w*n*(n+1)/2

  const lines=[
    "(Core) Staircase made of cubes",
    "The figure is a 'staircase' built from unit cubes.",
    "Count the total number of cubes in the staircase.",
    "(Enter one integer.)"
  ];

  const hint=hintCardSvg([
    "Count by columns (from tallest to shortest):",
    `If there are ${n} steps, the heights are ${n}, ${n-1}, ..., 1.`,
    `If the staircase is ${w} cube(s) wide, multiply the total by ${w}.`,
    "Total = width × (1 + 2 + ... + n)."
  ], "Hint (Arithmetic series)");

  return {
    img: makeSvgQuestionCard(lines, isoDiagram(cubes,{caption:`Staircase: ${n} steps, width ${w}`})),
    diagram: hint,
    hintText: "Heights form 1+2+...+n (then multiply by the width).",
    answer: {type:"single", values:[total], label:`${total}`}
  };
}

function genQ4HollowPrism(){
  const A=pick([3,4,5]);
  const B=pick([3,4,5]);
  const C=randInt(3,5);

  const holeA = Math.max(1, A-2);
  const holeB = Math.max(1, B-2);

  const cubes=[];
  for(let i=0;i<A;i++){
    for(let j=0;j<B;j++){
      const inHole = (i>=1 && i<=A-2) && (j>=1 && j<=B-2);
      if(inHole) continue;
      for(let k=0;k<C;k++){
        addCube(cubes,i,j,k,"solid");
      }
    }
  }

  const total = A*B*C - holeA*holeB*C;

  const lines=[
    "(Core) Hollow tower (middle is empty)",
    `A solid block would be ${A} × ${B} × ${C} unit cubes.`,
    `But the middle is hollow from top to bottom (a ${holeA} × ${holeB} tunnel).`,
    "How many unit cubes are in the final shape?",
    "(Enter one integer.)"
  ];

  const hint=hintCardSvg([
    "Use subtraction:",
    "Total cubes (solid) = A × B × C.",
    "Cubes removed (hollow tunnel) = (hole width) × (hole depth) × C.",
    "Final = solid − removed."
  ], "Hint (Solid − Hollow)");

  // also draw ghost cubes for the hollow tunnel only on top layer (visual)
  const solidAll = buildSolidBlock(A,B,C,"solid");
  const ghostTunnel = [];
  for(let i=1;i<=A-2;i++){
    for(let j=1;j<=B-2;j++){
      for(let k=0;k<C;k++){
        ghostTunnel.push({i,j,k,style:"ghost"});
      }
    }
  }
  // show only shell as solid + ghost tunnel
  const shellPlusGhost = [...cubes, ...ghostTunnel];

  return {
    img: makeSvgQuestionCard(lines, isoDiagram(shellPlusGhost,{caption:"Hollow in the middle (ghost = empty)", showLegend:true})),
    diagram: hint,
    hintText: "Compute solid A×B×C, subtract the hollow tunnel cubes.",
    answer: {type:"single", values:[total], label:`${total}`}
  };
}

function genQ5CarvedBlock(){
  const A=pick([4,5]);
  const B=pick([3,4]);
  const C=pick([3,4]);

  const a=randInt(1, Math.min(2, A-1));
  const b=randInt(1, Math.min(2, B-1));
  const c=randInt(1, Math.min(2, C-1));

  const solid = buildSolidBlock(A,B,C,"solid");
  // remove from one corner: i in [A-a, A-1], j in [B-b, B-1], k in [C-c, C-1]
  const rx0=A-a, ry0=B-b, rz0=C-c;
  const {keep, removed} = removeSubBlockFromCubes(solid, rx0, ry0, rz0, a, b, c);
  const removedCount = a*b*c;
  const remainCount = A*B*C - removedCount;

  const lines=[
    "(Core) Carved solid block",
    `A solid block is made of ${A} × ${B} × ${C} unit cubes.`,
    `A corner piece of size ${a} × ${b} × ${c} is removed (cut out).`,
    "How many unit cubes remain?",
    "(Enter one integer.)"
  ];

  const hint=hintCardSvg([
    "Count with subtraction:",
    "Remaining cubes = (A × B × C) − (a × b × c)."
  ], "Hint (Subtract the removed part)");

  const ghostRemoved = removed.map(x=>({i:x.i, j:x.j, k:x.k, style:"ghost"}));
  const show = [...keep, ...ghostRemoved];

  return {
    img: makeSvgQuestionCard(lines, isoDiagram(show,{caption:"Ghost = removed corner", showLegend:true})),
    diagram: hint,
    hintText: "Remaining = A×B×C − a×b×c.",
    answer: {type:"single", values:[remainCount], label:`${remainCount}`}
  };
}

function genQ6CompleteCube(){
  const N=pick([3,4]);
  const solid = buildSolidBlock(N,N,N,"solid");

  // remove a smaller block from a corner
  const a=randInt(1, Math.min(2, N-1));
  const b=randInt(1, Math.min(2, N-1));
  const c=randInt(1, Math.min(2, N-1));

  // remove from "front-right-top" corner in our coords: i in [N-a,N-1], j in [0,b-1], k in [N-c,N-1]
  const rx0=N-a, ry0=0, rz0=N-c;
  const {keep, removed} = removeSubBlockFromCubes(solid, rx0, ry0, rz0, a, b, c);
  const missing = removed.length;          // cubes to add
  const existing = keep.length;

  const lines=[
    "(Apply) Complete the big cube",
    `A full cube would be ${N} × ${N} × ${N} unit cubes.`,
    "The picture shows the current shape (some cubes are missing).",
    "What is the minimum number of unit cubes needed to add to make a full cube again?",
    "(Enter one integer.)"
  ];

  const hint=hintCardSvg([
    "Minimum cubes to add = (full cube cubes) − (current cubes).",
    `Full cube cubes = ${N}³ = ${N*N*N}.`,
    "So you only need to know how many cubes are currently present."
  ], "Hint (Full − Current)");

  const ghostMissing = removed.map(x=>({i:x.i, j:x.j, k:x.k, style:"ghost"}));
  const show = [...keep, ...ghostMissing];

  return {
    img: makeSvgQuestionCard(lines, isoDiagram(show,{caption:"Ghost = missing cubes to fill", showLegend:true})),
    diagram: hint,
    hintText: "Add = N³ − (current cubes). The ghost cubes show what is missing.",
    answer: {type:"single", values:[missing], label:`${missing}`}
  };
}

/* ===================== Build exactly 6 questions ===================== */
function buildSixQuestions(){
  return [
    genQ1SimpleStack(),
    genQ2UShape(),
    genQ3Staircase(),
    genQ4HollowPrism(),
    genQ5CarvedBlock(),
    genQ6CompleteCube()
  ];
}

/* ===================== State ===================== */
let questions=[];
let currentQuestionIndex=0;
let studentName="Student";
let quizStartTime=null;
let quizEndTime=null;
let quizSubmitted=false;

let timerInterval=null;
let elapsedMs=0;
let isPaused=false;
let firstAttemptMs=null;

let setCounter=0;
let lastSignature="";

/* DOM */
const quizContent=document.getElementById("quizContent");
const sidebarEl=document.getElementById("sidebar");

const buttonContainer=document.getElementById("navButtons");
const backButton=document.getElementById("backButton");
const nextButton=document.getElementById("nextButton");
const submitButton=document.getElementById("submitButton");
const checkButton=document.getElementById("checkButton");
const saveButton=document.getElementById("saveButton");

const generateBtn=document.getElementById("generateButton");
const pauseButton=document.getElementById("pauseButton");
const exportQuestionsBtn=document.getElementById("exportQuestionsBtn");

const timerDisplay=document.getElementById("timerDisplay");
const studentLine=document.getElementById("studentLine");
const setLine=document.getElementById("setLine");

/* ===================== Timer ===================== */
function updateTimerDisplay(){
  let totalMs=elapsedMs;
  if(!isPaused && quizStartTime) totalMs+=(new Date()-quizStartTime);
  let text=`Time: ${formatMs(totalMs)}`;
  if(firstAttemptMs!==null) text+=` (First: ${formatMs(firstAttemptMs)})`;
  timerDisplay.textContent=text;
}
function startTimerInterval(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(updateTimerDisplay, 1000);
}
function pauseTimer(){
  if(isPaused || !quizStartTime) return;
  const now=new Date();
  elapsedMs+=now-quizStartTime;
  isPaused=true;
  quizStartTime=null;
  updateTimerDisplay();
}
function resumeTimer(){
  if(!isPaused) return;
  isPaused=false;
  quizStartTime=new Date();
  updateTimerDisplay();
}

/* ===================== Grading ===================== */
function gradeAnswer(userText, answer){
  const nums = parseNumbersFromInput(userText);
  if(answer.type==="single"){
    if(nums.length<1) return false;
    return approxEqual(nums[0], answer.values[0]);
  }
  return false;
}

/* ===================== Generate Quiz ===================== */
function signatureOf(built){
  return built.map(q=>q.answer.label).join("|");
}
function generateQuiz(){
  questions=[];
  quizSubmitted=false;

  let tries=0;
  let built=null;

  while(tries<40){
    built = buildSixQuestions();
    const sig = signatureOf(built);
    if(sig !== lastSignature){
      lastSignature = sig;
      break;
    }
    tries++;
  }

  setCounter++;
  setLine.textContent = `Set: ${setCounter}`;

  for(let i=0;i<built.length;i++){
    const partIndex=Math.floor(i/QUESTIONS_PER_PART);
    const indexInPart=i%QUESTIONS_PER_PART;
    questions.push({
      partIndex,
      indexInPart,
      img: built[i].img,
      diagram: built[i].diagram || "",
      hint: built[i].hintText || "Count cubes carefully.",
      answer: built[i].answer,
      userValue:"",
      isCorrect:false
    });
  }
}

/* ===================== Sidebar ===================== */
function renderSidebar(){
  sidebarEl.style.display="block";
  sidebarEl.innerHTML=`<h4>Questions</h4><ul id="qList"></ul>`;
  const ul=document.getElementById("qList");
  for(let i=0;i<TOTAL_QUESTIONS;i++){
    const li=document.createElement("li");
    li.textContent=`Q${i+1}`;
    li.dataset.index=i;
    li.addEventListener("click",()=>{
      saveCurrentInput();
      currentQuestionIndex=i;
      renderQuestion();
    });
    ul.appendChild(li);
  }
  updateSidebarStatus();
}
function updateSidebarStatus(){
  const items=document.querySelectorAll("#qList li");
  items.forEach(li=>{
    const idx=Number(li.dataset.index);
    const q=questions[idx];
    li.classList.remove("active","answered","correct","incorrect");

    if(!quizSubmitted){
      li.classList.toggle("active", idx===currentQuestionIndex);
      if((q.userValue||"").trim()!=="") li.classList.add("answered");
    }else{
      if((q.userValue||"").trim()!==""){
        li.classList.add(q.isCorrect ? "correct" : "incorrect");
      }
    }
  });
}

/* ===================== Helpers ===================== */
function saveCurrentInput(){
  const input=document.getElementById("answerInput");
  if(input){
    questions[currentQuestionIndex].userValue=input.value.trim();
    if(quizSubmitted){
      const q=questions[currentQuestionIndex];
      q.isCorrect = gradeAnswer(q.userValue, q.answer);
      updateSidebarStatus();
    }
  }
}
function mountNavButtonsInto(slotId){
  const slot=document.getElementById(slotId);
  if(!slot) return;
  slot.appendChild(buttonContainer);
  buttonContainer.style.display="flex";
}

/* ===================== Render Question ===================== */
function renderQuestion(){
  const q=questions[currentQuestionIndex];

  const hintDiagramHtml = q.diagram
    ? `<div class="hint-diagram-wrap"><img src="${q.diagram}" alt="Hint diagram"></div>`
    : "";

  const placeholder = "e.g., 18";

  quizContent.innerHTML=`
    <p class="question-text">Question ${currentQuestionIndex+1} of ${TOTAL_QUESTIONS}</p>
    <div class="part-title">${escapeXml(PART_TITLES[q.partIndex])}</div>

    <div class="single-question">
      <div style="font-weight:800;margin-bottom:8px;">Question ${currentQuestionIndex+1}</div>

      <div class="img-wrap">
        <img class="q-img" src="${q.img}" alt="Question image">
      </div>

      <div class="answer-row">
        <div style="font-weight:700;">Answer:</div>
        <input id="answerInput" class="answer-box" type="text"
               placeholder="${escapeXml(placeholder)}"
               value="${escapeXml(q.userValue||"")}">
      </div>

      <div id="checkFeedback" style="display:none;"></div>

      <div class="hint-row">
        <button id="hintBtn" class="hint-btn">Hint</button>
      </div>

      <div id="hintBox" class="hint">
        <div>${escapeXml(q.hint)}</div>
        ${hintDiagramHtml}
      </div>
    </div>

    <div id="navSlot"></div>
  `;

  mountNavButtonsInto("navSlot");

  const hintBtn=document.getElementById("hintBtn");
  const hintBox=document.getElementById("hintBox");
  hintBtn.addEventListener("click", ()=>{
    const shown=hintBox.style.display==="block";
    hintBox.style.display = shown ? "none" : "block";
    hintBtn.textContent = shown ? "Hint" : "Hide Hint";
  });

  backButton.style.display="inline-block";
  backButton.style.visibility=(currentQuestionIndex===0)?"hidden":"visible";

  const isLast=(currentQuestionIndex===TOTAL_QUESTIONS-1);
  nextButton.style.display=isLast?"none":"inline-block";
  submitButton.style.display=isLast?"inline-block":"none";

  saveButton.style.display=quizSubmitted?"inline-block":"none";
  checkButton.style.display=(quizSubmitted && !q.isCorrect)?"inline-block":"none";

  updateSidebarStatus();
}

/* ===================== Results + Submit ===================== */
function calculateAndShowResults(){
  saveCurrentInput();

  const now=new Date();
  let attemptMs=elapsedMs;
  if(!isPaused && quizStartTime) attemptMs+=now-quizStartTime;
  if(firstAttemptMs===null) firstAttemptMs=attemptMs;

  const attemptStartTime=quizStartTime || now;
  quizEndTime=now;
  quizSubmitted=true;

  let correctCount=0;
  questions.forEach((q)=>{
    q.isCorrect = gradeAnswer(q.userValue, q.answer);
    if(q.isCorrect) correctCount++;
  });

  updateSidebarStatus();

  let html=`
    <h3>Results for ${escapeXml(studentName)}</h3>
    <p>Set: <strong>${setCounter}</strong></p>
    <p>Score: <strong>${correctCount} / ${TOTAL_QUESTIONS}</strong></p>
    <p>Start time: <strong>${attemptStartTime.toLocaleTimeString()}</strong></p>
    <p>Submit time: <strong>${quizEndTime.toLocaleTimeString()}</strong></p>
    <p>Time taken (this attempt): <strong>${formatMs(attemptMs)}</strong></p>
    <p>First attempt time: <strong>${formatMs(firstAttemptMs)}</strong></p>

    <table class="review-table">
      <tr>
        <th>#</th><th>Image</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th>
      </tr>
  `;

  questions.forEach((q,i)=>{
    const ua=(q.userValue||"").trim();
    const correctText = q.answer.label;

    html+=`
      <tr class="${q.isCorrect ? "correct-answer":"incorrect-answer"}">
        <td>${i+1}</td>
        <td><img class="thumb" src="${q.img}" alt="Q${i+1}"></td>
        <td>${ua==="" ? "—" : escapeXml(ua)}</td>
        <td><strong>${escapeXml(correctText)}</strong></td>
        <td>${ua==="" ? "Not answered" : (q.isCorrect ? "Correct":"Incorrect")}</td>
      </tr>
    `;
  });

  html+=`</table><div id="navSlot"></div>`;
  quizContent.innerHTML=html;

  mountNavButtonsInto("navSlot");

  backButton.style.display="none";
  nextButton.style.display="none";
  submitButton.style.display="none";
  checkButton.style.display="none";
  saveButton.style.display="inline-block";

  // reset timer for review attempt
  elapsedMs=0; isPaused=false; quizStartTime=new Date();
  pauseButton.textContent="Pause";
  startTimerInterval();
  updateTimerDisplay();
}

/* ===================== Buttons ===================== */
nextButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex<TOTAL_QUESTIONS-1){
    currentQuestionIndex++;
    renderQuestion();
  }
});
backButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex>0){
    currentQuestionIndex--;
    renderQuestion();
  }
});
submitButton.addEventListener("click", ()=>{
  if(currentQuestionIndex===TOTAL_QUESTIONS-1){
    calculateAndShowResults();
  }
});
checkButton.addEventListener("click", ()=>{
  saveCurrentInput();
  const q=questions[currentQuestionIndex];
  if(!quizSubmitted) return;

  q.isCorrect = gradeAnswer(q.userValue, q.answer);
  updateSidebarStatus();

  const box=document.getElementById("checkFeedback");
  if(!box) return;

  box.className="check-feedback";
  box.style.display="block";

  if(q.isCorrect){
    box.innerHTML=`✅ Correct!`;
    checkButton.style.display="none";
  }else{
    box.innerHTML=`❌ Incorrect. Correct answer: <strong>${escapeXml(q.answer.label)}</strong>`;
    checkButton.style.display="inline-block";
  }
});

/* Save TXT */
function formatDateForFilename(date){
  if(!date) return "no_time";
  const pad=n=>String(n).padStart(2,"0");
  return date.getFullYear()+pad(date.getMonth()+1)+pad(date.getDate())+"_"+pad(date.getHours())+pad(date.getMinutes())+pad(date.getSeconds());
}
function saveCurrentResultAsTxt(){
  saveCurrentInput();

  let correctCount=0;
  questions.forEach(q=>{ if(q.isCorrect) correctCount++; });

  const lines=[];
  lines.push("Model 3 — Building Blocks: Counting Cubes — Current Result");
  lines.push("Student: "+studentName);
  lines.push("Set: "+setCounter);
  if(quizStartTime) lines.push("Start time: "+quizStartTime.toLocaleString());
  if(quizEndTime) lines.push("Last submit time: "+quizEndTime.toLocaleString());
  lines.push("Score: "+correctCount+" / "+TOTAL_QUESTIONS);
  if(firstAttemptMs!==null) lines.push("First attempt time: "+formatMs(firstAttemptMs));
  lines.push("");

  questions.forEach((q,i)=>{
    const userAns=(q.userValue||"").trim()==="" ? "Not answered" : q.userValue;
    const resultText=(q.userValue||"").trim()==="" ? "Not answered" : (q.isCorrect?"Correct":"Incorrect");
    lines.push(`Q${i+1}`);
    lines.push("Your answer: "+userAns);
    lines.push("Correct answer: "+q.answer.label);
    lines.push("Result: "+resultText);
    lines.push("");
  });

  const content=lines.join("\n");
  const blob=new Blob([content],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const safeName=studentName.replace(/[^a-z0-9_\-]/gi,"_")||"Student";
  const ts=formatDateForFilename(new Date());
  a.href=url;
  a.download=`BuildingBlocks_${safeName}_Set${setCounter}_${ts}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
saveButton.addEventListener("click", saveCurrentResultAsTxt);

/* Pause/Resume (no pop-up) */
pauseButton.addEventListener("click", ()=>{
  if(!quizStartTime && elapsedMs===0 && !quizSubmitted) return;
  if(isPaused){ resumeTimer(); pauseButton.textContent="Pause"; }
  else { pauseTimer(); pauseButton.textContent="Resume"; }
});

/* Generate new set */
generateBtn.addEventListener("click", ()=>{
  if(!quizSubmitted && !confirm("Generate a new random set? All answers will be lost.")) return;

  if(timerInterval) clearInterval(timerInterval);
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=new Date(); quizEndTime=null;
  updateTimerDisplay(); startTimerInterval();
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();
});

/* ===================== Export Questions PDF (2 per page, DYAA header) ===================== */
function waitForImages(container){
  const imgs = Array.from(container.querySelectorAll("img"));
  return Promise.all(imgs.map(img => {
    if(img.complete && img.naturalWidth > 0) return Promise.resolve();
    return new Promise(resolve => {
      img.onload = () => resolve();
      img.onerror = () => resolve();
    });
  }));
}
exportQuestionsBtn.addEventListener("click", async ()=>{
  if(!questions || questions.length===0){
    alert("Please start a quiz first.");
    return;
  }
  if(!window.jspdf || !window.html2canvas){
    alert("PDF libraries failed to load. If you opened this file offline, export may not work.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  const wrapper=document.createElement("div");
  wrapper.style.position="fixed";
  wrapper.style.left="-9999px";
  wrapper.style.top="0";
  wrapper.style.width="800px";
  wrapper.style.background="#ffffff";
  document.body.appendChild(wrapper);

  try{
    let groupDiv=null;

    questions.forEach((q, idx)=>{
      if(idx%2===0){
        groupDiv=document.createElement("div");
        groupDiv.style.padding="20px";
        groupDiv.style.marginBottom="20px";
        groupDiv.style.boxSizing="border-box";

        const header=document.createElement("div");
        header.innerHTML=`
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <div style="width:24px;height:24px;background:#0d47a1;border-radius:6px;position:relative;">
              <div style="position:absolute;width:12px;height:5px;background:#ff9800;top:-4px;left:12px;border-radius:3px;"></div>
            </div>
            <div style="display:flex;flex-direction:column;line-height:1.1;">
              <div style="font-weight:900;letter-spacing:1px;color:#ff9800;font-size:14px;">DYAA</div>
              <div style="font-size:11px;color:#0d47a1;font-weight:700;">EDUCATION</div>
            </div>
          </div>
          <hr style="border:none;border-top:1px solid #e0e0e0;margin:0 0 12px 0;">
          <div style="font-weight:800;color:#1f2a44;margin:0 0 4px 0;">${LESSON_TITLE}</div>
          <div style="color:#546e7a;font-weight:800;margin:0 0 10px 0;">Questions (Set ${setCounter})</div>
        `;
        groupDiv.appendChild(header);
        wrapper.appendChild(groupDiv);
      }

      const qDiv=document.createElement("div");
      qDiv.style.marginBottom="18px";
      qDiv.innerHTML=`
        <div style="font-weight:700;margin:4px 0 6px 0;">Q${idx+1}</div>
        <div style="border-radius:12px;border:1px solid #e5e5e5;padding:12px;">
          <img src="${q.img}" style="width:100%;height:auto;border-radius:10px;" />
        </div>
      `;
      groupDiv.appendChild(qDiv);
    });

    const groups=Array.from(wrapper.children);

    for(let i=0;i<groups.length;i++){
      await waitForImages(groups[i]);
      const canvas = await html2canvas(groups[i], { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
      const imgData = canvas.toDataURL("image/png");

      const imgWidth = pageWidth - 20;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;

      if(i>0) pdf.addPage();
      pdf.addImage(imgData, "PNG", 10, 10, imgWidth, Math.min(imgHeight, pageHeight - 20));
    }

    const safeName=(studentName||"Student").replace(/[^a-z0-9_\-]/gi,"_") || "Student";
    const ts=formatDateForFilename(new Date());
    pdf.save(`BuildingBlocks_Questions_${safeName}_Set${setCounter}_${ts}.pdf`);
  } finally {
    document.body.removeChild(wrapper);
  }
});

/* ===================== Start Screen (+ optional ?name=Tiger) ===================== */
function getNameFromUrl(){
  const url=new URL(window.location.href);
  const name=url.searchParams.get("name");
  return name ? name.trim() : "";
}
function showStartScreen(){
  sidebarEl.style.display="none";
  buttonContainer.style.display="none";
  generateBtn.style.display="none";
  saveButton.style.display="none";
  pauseButton.style.display="none";
  exportQuestionsBtn.style.display="none";

  studentLine.textContent="";
  setLine.textContent="";

  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=null; quizEndTime=null;
  updateTimerDisplay();

  const preset=getNameFromUrl();
  if(preset){
    studentName=preset;
    studentLine.textContent=`Student: ${studentName}`;
    startQuiz(true);
    return;
  }

  quizContent.innerHTML=`
    <p>This quiz has <strong>${TOTAL_QUESTIONS}</strong> questions.</p>
    <ul style="margin-top:6px;color:#555;line-height:1.7;">
      <li><strong>Warm-up:</strong> count cubes in stacks</li>
      <li><strong>Core:</strong> hollow / carved solids</li>
      <li><strong>Apply:</strong> add cubes to complete a cube</li>
    </ul>
    <p style="margin-top:10px;">Enter your name to begin:</p>

    <input id="nameInput" type="text"
      style="padding:10px;width:260px;font-size:1.05em;border:1px solid #ccc;border-radius:10px;"
      placeholder="Your name">

    <button id="startButton"
      style="margin-left:10px;background:#4caf50;padding:10px 20px;color:white;border:none;border-radius:8px;">
      Start Quiz
    </button>
  `;
  document.getElementById("startButton").addEventListener("click", ()=>startQuiz(false));
}
function startQuiz(skipReadName){
  if(!skipReadName){
    const nameInput=document.getElementById("nameInput");
    studentName=(nameInput.value || "Student").trim();
  }
  studentLine.textContent=`Student: ${studentName}`;

  quizStartTime=new Date();
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  updateTimerDisplay(); startTimerInterval();

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();

  generateBtn.style.display="inline-block";
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";
  exportQuestionsBtn.style.display="inline-block";
  buttonContainer.style.display="flex";
}

/* ===================== Init ===================== */
showStartScreen();
</script>
</body>
</html>
