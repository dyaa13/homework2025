<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
/* ===================== CONFIG ===================== */
const QUIZ_TITLE = "Model 15 — Sandglass Model (Similarity & Ratios)";
const LESSON_TITLE = "Model 15 — Sandglass Model (Similarity & Ratios)";

const PARTS = [
  { title: "Part 1 (Core Skills) — sandglass / parallel-line similarity (5 questions)", level: "Core", count: 5 },
  { title: "Part 2 (Applied) — composite diagram (2 squares) (1 question)", level: "Applied", count: 1 },
];
const TOTAL_QUESTIONS = PARTS.reduce((s,p)=>s+p.count,0);

/* ===================== Utils ===================== */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ const t=a%b; a=b; b=t; } return a||1; }
function formatMs(ms){
  const totalSec=Math.floor(ms/1000), min=Math.floor(totalSec/60), sec=totalSec%60;
  return `${String(min).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
function escapeXml(s){
  return String(s)
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&apos;");
}
function wrapLines(lines, maxChars=72){
  const out=[];
  function pushWrapped(line){
    const words=String(line).split(/\s+/).filter(Boolean);
    if(words.length===0){ out.push(""); return; }
    let cur="";
    for(const w of words){
      if(w.length>maxChars){
        if(cur){ out.push(cur); cur=""; }
        for(let i=0;i<w.length;i+=maxChars) out.push(w.slice(i,i+maxChars));
        continue;
      }
      if(!cur) cur=w;
      else if((cur+" "+w).length<=maxChars) cur+=" "+w;
      else { out.push(cur); cur=w; }
    }
    if(cur) out.push(cur);
  }
  for(const line of lines) pushWrapped(line);
  return out;
}
function svgDataUri(svg){
  const encoded=encodeURIComponent(svg)
    .replaceAll("%0A","").replaceAll("%20"," ")
    .replaceAll("%3D","=").replaceAll("%3A",":")
    .replaceAll("%2F","/").replaceAll("%2C",",");
  return "data:image/svg+xml;charset=utf-8," + encoded;
}

/* Parse numbers from user input (supports fractions like 32/3) */
function parseNumbersFromInput(str){
  const s=(str||"").trim();
  if(!s) return [];
  const out=[];
  const re=/([+-]?\d+\s*\/\s*[+-]?\d+)|([+-]?\d+(?:\.\d+)?)/g;
  let m;
  while((m=re.exec(s))!==null){
    const token=(m[1]||m[2]||"").replace(/\s+/g,"");
    if(token.includes("/")){
      const [a,b]=token.split("/");
      const n=Number(a), d=Number(b);
      if(Number.isFinite(n)&&Number.isFinite(d)&&d!==0) out.push(n/d);
    }else{
      const v=Number(token);
      if(Number.isFinite(v)) out.push(v);
    }
  }
  return out;
}
function approxEqual(a,b,tol=1e-6){ return Math.abs(a-b)<=tol; }

function reduceFrac(num, den){
  const g=gcd(num, den);
  num/=g; den/=g;
  if(den<0){ den*=-1; num*=-1; }
  return {num, den};
}
function fracToString(num, den){
  const r=reduceFrac(num, den);
  if(r.den===1) return String(r.num);
  return `${r.num}/${r.den}`;
}

/* ===================== SVG Card ===================== */
function makeSvgQuestionCard(lines, diagramMarkup, titleText=QUIZ_TITLE){
  const W=980, headerH=72, padX=44, textLineH=36, topY=headerH+48;
  const wrapped=wrapLines(lines, 72);
  const textBlockH = wrapped.length * textLineH;
  const diagramY = topY + textBlockH + 18;
  const diagramH = 380;
  const padBottom = 54;
  const H = diagramY + diagramH + padBottom;

  const textSpans=wrapped.map((t,i)=>{
    const y=topY + i*textLineH;
    return `<text x="${padX}" y="${y}" font-size="28" fill="#1f2a44" font-family="Segoe UI, Arial">${escapeXml(t)}</text>`;
  }).join("");

  const svg=`
  <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#f7fbff"/>
        <stop offset="1" stop-color="#ffffff"/>
      </linearGradient>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/>
      </filter>
      <clipPath id="clipBox">
        <rect x="44" y="0" width="${W-88}" height="${diagramH}" rx="16" ry="16"></rect>
      </clipPath>
    </defs>

    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${H-36}"
          fill="url(#g)" stroke="#dfe7f2" stroke-width="3" filter="url(#shadow)"/>
    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${headerH}"
          fill="#0d47a1" opacity="0.10"/>

    <text x="${padX}" y="56" font-size="28" fill="#0d47a1" font-weight="700"
          font-family="Segoe UI, Arial">${escapeXml(titleText)}</text>

    ${textSpans}

    <g transform="translate(0, ${diagramY})">
      <rect x="44" y="0" width="${W-88}" height="${diagramH}" rx="16" ry="16"
            fill="#ffffff" stroke="#e5e5e5" stroke-width="3"/>
      <g clip-path="url(#clipBox)">
        ${diagramMarkup}
      </g>
    </g>
  </svg>`.trim();

  return svgDataUri(svg);
}

function hintCardSvg(lines, title="Hint"){
  const W=980, headerH=60, padX=44, lineH=34, firstLineY=headerH+44, padBottom=44;
  const wrapped=wrapLines(lines, 86);
  const H=firstLineY + (wrapped.length-1)*lineH + padBottom;

  const textSpans=wrapped.map((t,i)=>{
    const y=firstLineY + i*lineH;
    return `<text x="${padX}" y="${y}" font-size="24" fill="#1f2a44" font-family="Segoe UI, Arial">${escapeXml(t)}</text>`;
  }).join("");

  const svg=`
  <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ffffff"/>
        <stop offset="1" stop-color="#fff7e6"/>
      </linearGradient>
      <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.10"/>
      </filter>
    </defs>

    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${H-36}"
          fill="url(#bg)" stroke="#ffe0b2" stroke-width="3" filter="url(#shadow2)"/>

    <text x="${padX}" y="52" font-size="26" fill="#8d6e63" font-weight="800"
          font-family="Segoe UI, Arial">${escapeXml(title)}</text>

    ${textSpans}
  </svg>`.trim();

  return svgDataUri(svg);
}

/* ===================== Geometry helpers ===================== */
function lineIntersection(p1,p2,p3,p4){
  // returns intersection of lines p1p2 and p3p4
  const x1=p1.x,y1=p1.y,x2=p2.x,y2=p2.y,x3=p3.x,y3=p3.y,x4=p4.x,y4=p4.y;
  const den=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);
  if(Math.abs(den)<1e-9) return null;
  const px=((x1*y2-y1*x2)*(x3-x4)-(x1-x2)*(x3*y4-y3*x4))/den;
  const py=((x1*y2-y1*x2)*(y3-y4)-(y1-y2)*(x3*y4-y3*x4))/den;
  return {x:px,y:py};
}
function lerp(p,q,t){ return {x:p.x+(q.x-p.x)*t, y:p.y+(q.y-p.y)*t}; }

/* ===================== Diagrams (Model 15) ===================== */
function diagramSandglassParallel(rTop, rBot){
  // AB || CD with AB:CD = rTop:rBot (top shorter if rTop<rBot)
  const cx=490, yTop=95, yBot=300;
  const topLen = rTop*50;
  const botLen = rBot*50;
  const A={x:cx-topLen/2, y:yTop};
  const B={x:cx+topLen/2, y:yTop};
  const C={x:cx-botLen/2, y:yBot};
  const D={x:cx+botLen/2, y:yBot};

  const O=lineIntersection(A,D,B,C) || {x:cx,y:(yTop+yBot)/2};

  const styleText=`font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;
  let s=``;

  // bases
  s+=`<line x1="${A.x}" y1="${A.y}" x2="${B.x}" y2="${B.y}" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${C.x}" y1="${C.y}" x2="${D.x}" y2="${D.y}" stroke="#1f2a44" stroke-width="4"/>`;

  // cross lines
  s+=`<line x1="${A.x}" y1="${A.y}" x2="${D.x}" y2="${D.y}" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${B.x}" y1="${B.y}" x2="${C.x}" y2="${C.y}" stroke="#1f2a44" stroke-width="4"/>`;

  // points
  function dot(p){ return `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#1f2a44"/>`; }
  function label(p,t,dx,dy){ return `<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${t}</text>`; }

  s+=dot(A)+dot(B)+dot(C)+dot(D)+dot(O);
  s+=label(A,"A",-18,-14);
  s+=label(B,"B",10,-14);
  s+=label(C,"C",-18,34);
  s+=label(D,"D",10,34);
  s+=label(O,"O",10,-10);

  s+=`<text x="240" y="365" font-size="22" ${styleText}>AB : CD = ${rTop} : ${rBot}</text>`;

  return `<g>${s}</g>`;
}

function diagramSandglassTriangles(aTop, bBot){
  // AB || DE, A-C-E collinear, B-C-D collinear (classic sandglass)
  const cx=490, yTop=95, yBot=305;
  const topLen = aTop*40;
  const botLen = bBot*40;

  const A={x:cx-topLen/2, y:yTop};
  const B={x:cx+topLen/2, y:yTop};
  const D={x:cx-botLen/2, y:yBot};
  const E={x:cx+botLen/2, y:yBot};

  const C=lineIntersection(A,E,B,D) || {x:cx,y:(yTop+yBot)/2};

  const styleText=`font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;
  let s=``;

  s+=`<line x1="${A.x}" y1="${A.y}" x2="${B.x}" y2="${B.y}" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${D.x}" y1="${D.y}" x2="${E.x}" y2="${E.y}" stroke="#1f2a44" stroke-width="4"/>`;

  s+=`<line x1="${A.x}" y1="${A.y}" x2="${E.x}" y2="${E.y}" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${B.x}" y1="${B.y}" x2="${D.x}" y2="${D.y}" stroke="#1f2a44" stroke-width="4"/>`;

  function dot(p){ return `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#1f2a44"/>`; }
  function label(p,t,dx,dy){ return `<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${t}</text>`; }

  s+=dot(A)+dot(B)+dot(C)+dot(D)+dot(E);
  s+=label(A,"A",-18,-14);
  s+=label(B,"B",10,-14);
  s+=label(D,"D",-18,34);
  s+=label(E,"E",10,34);
  s+=label(C,"C",10,-10);

  s+=`<text x="240" y="365" font-size="22" ${styleText}>AB ∥ DE</text>`;
  return `<g>${s}</g>`;
}

function diagramParallelogramWithE(aAB, dAD, eBE){
  // Parallelogram ABCD, E on extension of AB, DE intersects BC at F
  const A={x:220,y:300};
  const base=420;
  const B={x:A.x+base,y:A.y};
  // slanted side vector
  const vLen=280; // visual
  const v={x:-0.42*vLen, y:-0.78*vLen}; // slant up-left
  const D={x:A.x+v.x, y:A.y+v.y};
  const C={x:B.x+v.x, y:B.y+v.y};

  // E on extension of AB by BE proportion
  const tBE = eBE/(aAB+0.00001);
  const E={x:B.x+base*tBE, y:B.y};

  const F=lineIntersection(D,E,B,C) || lerp(B,C,0.2);

  const styleText=`font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;
  let s=``;

  // parallelogram
  s+=`<polygon points="${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y} ${D.x},${D.y}"
        fill="rgba(33,150,243,0.06)" stroke="#1f2a44" stroke-width="4"/>`;

  // extension AB to E
  s+=`<line x1="${B.x}" y1="${B.y}" x2="${E.x}" y2="${E.y}" stroke="#1f2a44" stroke-width="4"/>`;

  // DE
  s+=`<line x1="${D.x}" y1="${D.y}" x2="${E.x}" y2="${E.y}" stroke="#1f2a44" stroke-width="4"/>`;

  // Mark F
  s+=`<circle cx="${F.x}" cy="${F.y}" r="6" fill="#1f2a44"/>`;

  function dot(p){ return `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#1f2a44"/>`; }
  function label(p,t,dx,dy){ return `<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${t}</text>`; }

  s+=dot(A)+dot(B)+dot(C)+dot(D)+dot(E);
  s+=label(A,"A",-18,34);
  s+=label(B,"B",-10,34);
  s+=label(C,"C",10,10);
  s+=label(D,"D",-18,-14);
  s+=label(E,"E",10,34);
  s+=label(F,"F",10,-10);

  return `<g>${s}</g>`;
}

function diagramTrapezoidDiagonals(kRatio){
  // Trapezoid ABCD with AB || CD, diagonals intersect at O. Shade triangle AOB.
  const cx=490, yTop=95, yBot=320;

  const cdLen=220;
  const abLen=cdLen*kRatio;

  const D={x:cx-cdLen/2,y:yTop};
  const C={x:cx+cdLen/2,y:yTop};
  const A={x:cx-abLen/2,y:yBot};
  const B={x:cx+abLen/2,y:yBot};

  const O=lineIntersection(A,C,B,D) || {x:cx,y:(yTop+yBot)/2};

  const styleText=`font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;
  let s=``;

  // trapezoid outline
  s+=`<polygon points="${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y} ${D.x},${D.y}"
        fill="rgba(76,175,80,0.05)" stroke="#1f2a44" stroke-width="4"/>`;

  // diagonals
  s+=`<line x1="${A.x}" y1="${A.y}" x2="${C.x}" y2="${C.y}" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${B.x}" y1="${B.y}" x2="${D.x}" y2="${D.y}" stroke="#1f2a44" stroke-width="4"/>`;

  // shade AOB
  s+=`<polygon points="${A.x},${A.y} ${O.x},${O.y} ${B.x},${B.y}" fill="rgba(33,150,243,0.18)" stroke="none"/>`;

  function dot(p){ return `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#1f2a44"/>`; }
  function label(p,t,dx,dy){ return `<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${t}</text>`; }

  s+=dot(A)+dot(B)+dot(C)+dot(D)+dot(O);
  s+=label(A,"A",-18,34);
  s+=label(B,"B",10,34);
  s+=label(C,"C",10,-14);
  s+=label(D,"D",-18,-14);
  s+=label(O,"O",10,-10);

  s+=`<text x="240" y="365" font-size="22" ${styleText}>AB ∥ CD</text>`;
  return `<g>${s}</g>`;
}

function diagramSquareMidpoint(){
  // Square ABCD, E midpoint of BC, lines DB and AE intersect at O
  const x0=330, y0=75, side=260;
  const A={x:x0,y:y0};
  const B={x:x0+side,y:y0};
  const C={x:x0+side,y:y0+side};
  const D={x:x0,y:y0+side};
  const E={x:x0+side, y:y0+side/2};

  const O=lineIntersection(D,B,A,E) || {x:x0+side*0.66, y:y0+side*0.66};

  const styleText=`font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;
  let s=``;

  // square
  s+=`<rect x="${A.x}" y="${A.y}" width="${side}" height="${side}" fill="rgba(33,150,243,0.05)" stroke="#1f2a44" stroke-width="4"/>`;

  // lines
  s+=`<line x1="${D.x}" y1="${D.y}" x2="${B.x}" y2="${B.y}" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${A.x}" y1="${A.y}" x2="${E.x}" y2="${E.y}" stroke="#1f2a44" stroke-width="4"/>`;

  // shade triangle BOE (given)
  s+=`<polygon points="${B.x},${B.y} ${O.x},${O.y} ${E.x},${E.y}" fill="rgba(255,152,0,0.22)" stroke="none"/>`;

  function dot(p){ return `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#1f2a44"/>`; }
  function label(p,t,dx,dy){ return `<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${t}</text>`; }

  s+=dot(A)+dot(B)+dot(C)+dot(D)+dot(E)+dot(O);
  s+=label(A,"A",-18,-14);
  s+=label(B,"B",10,-14);
  s+=label(C,"C",10,34);
  s+=label(D,"D",-18,34);
  s+=label(E,"E",10,10);
  s+=label(O,"O",10,-10);

  return `<g>${s}</g>`;
}

function diagramTwoSquares(L, S){
  // Big square side L (left), small square side S attached to right at bottom with C as shared corner
  // Diagonal from A (top-left of big) to G (bottom-right of small). Shade triangle ADH.
  const x0=220, y0=75;
  const scale=18; // pixels per unit
  const big= L*scale;
  const small= S*scale;

  const A={x:x0, y:y0};
  const B={x:x0, y:y0+big};
  const C={x:x0+big, y:y0+big};
  const D={x:x0+big, y:y0};

  const E={x:C.x, y:C.y-small};
  const F={x:C.x+small, y:C.y-small};
  const G={x:C.x+small, y:C.y};

  // diagonal A->G intersects x = D.x at H
  const H = lineIntersection(A,G, D, C) || {x:D.x, y: y0 + big*0.6};

  const styleText=`font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;
  let s=``;

  // squares
  s+=`<rect x="${A.x}" y="${A.y}" width="${big}" height="${big}" fill="rgba(33,150,243,0.05)" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<rect x="${C.x}" y="${C.y-small}" width="${small}" height="${small}" fill="rgba(76,175,80,0.05)" stroke="#1f2a44" stroke-width="4"/>`;

  // diagonal
  s+=`<line x1="${A.x}" y1="${A.y}" x2="${G.x}" y2="${G.y}" stroke="#1f2a44" stroke-width="4"/>`;

  // shade triangle A-D-H
  s+=`<polygon points="${A.x},${A.y} ${D.x},${D.y} ${H.x},${H.y}" fill="rgba(33,150,243,0.18)" stroke="none"/>`;

  function dot(p){ return `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#1f2a44"/>`; }
  function label(p,t,dx,dy){ return `<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${t}</text>`; }

  s+=dot(A)+dot(B)+dot(C)+dot(D)+dot(E)+dot(F)+dot(G)+dot(H);
  s+=label(A,"A",-18,-14);
  s+=label(B,"B",-18,34);
  s+=label(C,"C",-10,34);
  s+=label(D,"D",10,-14);
  s+=label(E,"E",10,10);
  s+=label(F,"F",10,10);
  s+=label(G,"G",10,34);
  s+=label(H,"H",10,-10);

  return `<g>${s}</g>`;
}

/* ===================== Grading ===================== */
function gradeAnswer(userText, answer){
  const nums = parseNumbersFromInput(userText);
  if(answer.type==="single"){
    if(nums.length<1) return false;
    return approxEqual(nums[0], answer.values[0]);
  }
  if(answer.type==="multi"){
    const n=answer.values.length;
    if(nums.length < n) return false;
    for(let i=0;i<n;i++){
      if(!approxEqual(nums[i], answer.values[i])) return false;
    }
    return true;
  }
  return false;
}

/* ===================== Question Generators (6) ===================== */
function genQ1(){
  // AB || CD; AD and BC intersect at O. Given AB:CD = m:n, AO, area(AOB).
  // Find OD and area(COD). Choose values to keep integers.
  const m = randInt(3,6);
  const n = randInt(m+1, m+3);

  const t = randInt(2,5);
  const AO = m * t;               // makes OD integer
  const k = randInt(1,6);
  const areaAOB = m*m*k;          // makes areaCOD integer

  const OD = t * n;
  const areaCOD = k * n*n;

  const lines=[
    "(Q1) In the sandglass diagram, AB ∥ CD. Lines AD and BC intersect at O.",
    `AB:CD = ${m}:${n}.  AO = ${AO}.  Area(△AOB) = ${areaAOB}.`,
    "Find OD and the area of △COD.",
    "(Enter two numbers in order: OD, Area(COD). Example: 10, 56)"
  ];

  const hint = hintCardSvg([
    "Triangles △AOB and △DCO are similar (parallel lines + vertical angles).",
    "So AO/OD = AB/CD, and Area(AOB):Area(COD) = (AB/CD)^2."
  ], "Hint (Sandglass similarity)");

  return {
    img: makeSvgQuestionCard(lines, diagramSandglassParallel(m,n)),
    diagram: hint,
    hintText: "Use similarity: AO/OD = AB/CD and area scales by the square of the ratio.",
    answer: { type:"multi", values:[OD, areaCOD], label:`OD = ${OD}, Area(COD) = ${areaCOD}` }
  };
}

function genQ2(){
  // AB || DE; A-C-E collinear, B-C-D collinear. Given AB, DE, BD -> find CD.
  // Choose CD so BD is integer.
  const AB = randInt(8,14);
  const DE = randInt(6,12);
  const g = gcd(AB+DE, DE);
  const CD = (DE/g) * randInt(2,7);            // ensures BD integer
  const BD = CD * (AB+DE) / DE;                // integer by construction

  const lines=[
    "(Q2) AB ∥ DE. Points A–C–E are collinear, and points B–C–D are collinear.",
    `AB = ${AB},  DE = ${DE},  and BD = ${BD}.`,
    "Find the length of CD.",
    "(Enter one number; fractions like 32/3 are allowed.)"
  ];

  const hint = hintCardSvg([
    "Triangles △ACB and △DCE are similar (sandglass model).",
    "So BC:CD = AB:DE, and BD = BC + CD."
  ], "Hint (Similar triangles)");

  return {
    img: makeSvgQuestionCard(lines, diagramSandglassTriangles(AB,DE)),
    diagram: hint,
    hintText: "Use BC:CD = AB:DE, then BD = BC + CD.",
    answer: { type:"single", values:[CD], label:String(CD) }
  };
}

function genQ3(){
  // Parallelogram; E on extension of AB; DE intersects BC at F; find BF.
  // BF = AD * BE / (AB + BE). Choose values to keep BF integer.
  const AB = randInt(6,12);
  const BE = randInt(1,6);
  const g = gcd(AB+BE, BE);
  const t = randInt(2,7);
  const AD = (AB+BE)/g * t;      // makes BF integer
  const BF = (BE/g) * t;

  const lines=[
    "(Q3) In parallelogram ABCD, AB = "+AB+", AD = "+AD+".",
    "Point E lies on the extension of AB beyond B, with BE = "+BE+".",
    "Line DE meets BC at F. Find BF.",
    "(Enter one number.)"
  ];

  const hint = hintCardSvg([
    "Use coordinates/vectors (or similar triangles on BC).",
    "A key result for this setup is: BF = AD × BE / (AB + BE)."
  ], "Hint (Parallelogram + extension)");

  return {
    img: makeSvgQuestionCard(lines, diagramParallelogramWithE(AB,AD,BE)),
    diagram: hint,
    hintText: "Use BF = AD × BE / (AB + BE).",
    answer: { type:"single", values:[BF], label:String(BF) }
  };
}

function genQ4(){
  // Trapezoid AB || CD, diagonals intersect at O.
  // Given area(COD) and AB = k*CD, find shaded area = area(AOB) = k^2 * area(COD).
  const k = pick([2,3,4]);
  const areaCOD = randInt(4,18);
  const areaAOB = areaCOD * k * k;

  const lines=[
    "(Q4) AB ∥ CD. Diagonals AC and BD intersect at O.",
    `Area(△COD) = ${areaCOD}.  AB = ${k} × CD.`,
    "Find the shaded area (△AOB).",
    "(Enter one number.)"
  ];

  const hint = hintCardSvg([
    "Triangles △AOB and △COD are similar because AB ∥ CD and they use the same diagonals.",
    "Linear scale factor = AB/CD, so area scale factor = (AB/CD)^2."
  ], "Hint (Diagonal intersection)");

  return {
    img: makeSvgQuestionCard(lines, diagramTrapezoidDiagonals(k)),
    diagram: hint,
    hintText: "Area(AOB) = (AB/CD)^2 × Area(COD).",
    answer: { type:"single", values:[areaAOB], label:String(areaAOB) }
  };
}

function genQ5(){
  // Square ABCD. E is midpoint of BC. Lines DB and AE meet at O.
  // Area(AOD) = 4 × Area(BOE). Choose BOE integer.
  const areaBOE = randInt(4,20);
  const areaAOD = 4 * areaBOE;

  const lines=[
    "(Q5) ABCD is a square. Point E is the midpoint of BC (so BE = EC).",
    "Lines DB and AE intersect at O.",
    `If Area(△BOE) = ${areaBOE}, find Area(△AOD).`,
    "(Enter one number.)"
  ];

  const hint = hintCardSvg([
    "Set coordinates for a square or use area ratios on similar triangles.",
    "For this fixed configuration (E midpoint), Area(AOD) = 4 × Area(BOE)."
  ], "Hint (Fixed ratio)");

  return {
    img: makeSvgQuestionCard(lines, diagramSquareMidpoint()),
    diagram: hint,
    hintText: "Use the fixed ratio: Area(AOD) = 4 × Area(BOE).",
    answer: { type:"single", values:[areaAOD], label:String(areaAOD) }
  };
}

function genQ6(){
  // Two squares: side lengths L and S (L>S). Attached as in diagram.
  // Diagonal from A (top-left of big) to G (bottom-right of small).
  // Shaded area = area(△ADH) = L^3 / (2(L+S)).
  const pairs = [
    {L:12,S:8},
    {L:10,S:6},
    {L:14,S:8},
    {L:16,S:10},
    {L:18,S:12},
  ];
  const P = pick(pairs);
  const L=P.L, S=P.S;

  const num = L*L*L;
  const den = 2*(L+S);
  const fr = reduceFrac(num, den);
  const areaVal = fr.num / fr.den;
  const areaLabel = fracToString(num, den);

  const lines=[
    "(Q6) Two squares with side lengths "+S+" and "+L+" are placed together as shown.",
    "A straight line is drawn from A (top-left of the larger square) to G (bottom-right of the smaller square).",
    "Find the shaded area.",
    "(Enter one number; fractions are allowed.)"
  ];

  const hint = hintCardSvg([
    "Use coordinates (or similar triangles).",
    "If the larger side is L and the smaller side is S, then",
    "Shaded area = L^3 / (2(L + S))."
  ], "Hint (Two-squares similarity)");

  return {
    img: makeSvgQuestionCard(lines, diagramTwoSquares(L,S)),
    diagram: hint,
    hintText: "Use Shaded area = L^3 / (2(L + S)).",
    answer: { type:"single", values:[areaVal], label:areaLabel }
  };
}

/* ===================== Build Questions ===================== */
function buildQuestions(){
  return [genQ1(), genQ2(), genQ3(), genQ4(), genQ5(), genQ6()];
}

/* ===================== Timer ===================== */
function updateTimerDisplay(){
  let totalMs=elapsedMs;

  if(firstAttemptMs!==null) text+=` (First: ${formatMs(firstAttemptMs)})`;

  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(updateTimerDisplay, 1000);

  if(isPaused || !quizStartTime) return;
  const now=new Date();
  elapsedMs+=now-quizStartTime;

/* ===================== Generate Quiz ===================== */
function signatureOf(built){
  return built.map(q=>q.answer.label).join("|");
}
function generateQuiz(){
  questions=[];
  quizSubmitted=false;

  let tries=0;
  let built=null;

  while(tries<60){
    built = buildQuestions();
    const sig = signatureOf(built);
    if(sig !== lastSignature){
      lastSignature = sig;
      break;
    }
    tries++;
  }

  setCounter++;
  setLine.textContent = `Set: ${setCounter}`;

  const partBoundaries=[];
  let acc=0;
  for(let i=0;i<PARTS.length;i++){
    partBoundaries.push({start:acc, end:acc+PARTS[i].count-1});
    acc+=PARTS[i].count;
  }

  for(let i=0;i<built.length;i++){
    let partIndex=0;
    for(let p=0;p<partBoundaries.length;p++){
      if(i>=partBoundaries[p].start && i<=partBoundaries[p].end){ partIndex=p; break; }
    }
    const indexInPart = i - partBoundaries[partIndex].start;

    questions.push({
      partIndex,
      indexInPart,
      img: built[i].img,
      diagram: built[i].diagram || "",
      hint: built[i].hintText || "Use sandglass-model similarity and ratios.",
      answer: built[i].answer,
      userValue:"",
      isCorrect:false
    });
  }
}

/* ===================== Sidebar ===================== */
function renderSidebar(){
  sidebarEl.style.display="block";
  sidebarEl.innerHTML=`<h4>Questions</h4><ul id="qList"></ul>`;
  const ul=document.getElementById("qList");

  for(let i=0;i<TOTAL_QUESTIONS;i++){
    const q=questions[i];
    const li=document.createElement("li");
    const label = `${PARTS[q.partIndex].level}${q.indexInPart+1}`;
    li.textContent=`Q${i+1} (${label})`;
    li.dataset.index=i;
    li.addEventListener("click",()=>{
      saveCurrentInput();
      currentQuestionIndex=i;
      renderQuestion();
    });
    ul.appendChild(li);
  }
  updateSidebarStatus();
}
function updateSidebarStatus(){
  const items=document.querySelectorAll("#qList li");
  items.forEach(li=>{
    const idx=Number(li.dataset.index);
    const q=questions[idx];
    li.classList.remove("active","answered","correct","incorrect");

    if(!quizSubmitted){
      li.classList.toggle("active", idx===currentQuestionIndex);
      if((q.userValue||"").trim()!=="") li.classList.add("answered");
    }else{
      if((q.userValue||"").trim()!==""){
        li.classList.add(q.isCorrect ? "correct" : "incorrect");
      }
    }
  });
}

/* ===================== Helpers ===================== */
function saveCurrentInput(){
  const input=document.getElementById("answerInput");
  if(input){
    questions[currentQuestionIndex].userValue=input.value.trim();
    if(quizSubmitted){
      const q=questions[currentQuestionIndex];
      q.isCorrect = gradeAnswer(q.userValue, q.answer);
      updateSidebarStatus();
    }
  }
}
function mountNavButtonsInto(slotId){

  });

      <tr class="${q.isCorrect ? "correct-answer":"incorrect-answer"}">
        <td>${i+1}</td>
        <td>${escapeXml(partLbl)}</td>
        <td><img class="thumb" src="${q.img}" alt="Q${i+1}"></td>
        <td>${ua==="" ? "—" : escapeXml(ua)}</td>
        <td><strong>${escapeXml(correctText)}</strong></td>
        <td>${ua==="" ? "Not answered" : (q.isCorrect ? "Correct":"Incorrect")}</td>
      </tr>
    `;
  });

  html+=`</table><div id="navSlot"></div>`;
  quizContent.innerHTML=html;

  mountNavButtonsInto("navSlot");

  backButton.style.display="none";
  nextButton.style.display="none";
  submitButton.style.display="none";
  checkButton.style.display="none";
  saveButton.style.display="inline-block";
}

/* ===================== Buttons ===================== */
nextButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex<TOTAL_QUESTIONS-1){
    currentQuestionIndex++;
    renderQuestion();
  }
});
backButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex>0){
    currentQuestionIndex--;
    renderQuestion();
  }
});
submitButton.addEventListener("click", ()=>{
  if(currentQuestionIndex===TOTAL_QUESTIONS-1){
    calculateAndShowResults();
  }
});

checkButton.addEventListener("click", ()=>{
  saveCurrentInput();
  const q=questions[currentQuestionIndex];

  q.isCorrect = gradeAnswer(q.userValue, q.answer);
  updateSidebarStatus();

  const box=document.getElementById("checkFeedback");
  if(!box) return;

  box.className="check-feedback";
  box.style.display="block";

  if(q.isCorrect){
    box.innerHTML=`✅ Correct!`;
    if(quizSubmitted) checkButton.style.display="none";
  }else{
    box.innerHTML=`❌ Incorrect. Correct answer: <strong>${escapeXml(q.answer.label)}</strong>`;
    if(quizSubmitted) checkButton.style.display="inline-block";
  }
});

/* Save TXT */
function formatDateForFilename(date){
  if(!date) return "no_time";
  const pad=n=>String(n).padStart(2,"0");
  return date.getFullYear()+pad(date.getMonth()+1)+pad(date.getDate())+"_"+pad(date.getHours())+pad(date.getMinutes())+pad(date.getSeconds());
}
function saveCurrentResultAsTxt(){
  saveCurrentInput();

  let correctCount=0;
  questions.forEach(q=>{ if(q.isCorrect) correctCount++; });

  const lines=[];
  lines.push(QUIZ_TITLE + " — Current Result");
  lines.push("Student: "+studentName);
  lines.push("Set: "+setCounter);
  if(quizStartTime) lines.push("Start time: "+quizStartTime.toLocaleString());
  if(quizEndTime) lines.push("Last submit time: "+quizEndTime.toLocaleString());
  lines.push("Score: "+correctCount+" / "+TOTAL_QUESTIONS);
  if(firstAttemptMs!==null) lines.push("First attempt time: "+formatMs(firstAttemptMs));
  lines.push("");

  questions.forEach((q,i)=>{
    const partLbl = `${PARTS[q.partIndex].level}${q.indexInPart+1}`;
    const userAns=(q.userValue||"").trim()==="" ? "Not answered" : q.userValue;
    const resultText=(q.userValue||"").trim()==="" ? "Not answered" : (q.isCorrect?"Correct":"Incorrect");
    lines.push(`Q${i+1} (${partLbl})`);
    lines.push("Your answer: "+userAns);
    lines.push("Correct answer: "+q.answer.label);
    lines.push("Result: "+resultText);
    lines.push("");
  });

  const content=lines.join("\n");
  const blob=new Blob([content],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const safeName=studentName.replace(/[^a-z0-9_\-]/gi,"_")||"Student";
  const ts=formatDateForFilename(new Date());
  a.href=url;
  a.download=`Sandglass_${safeName}_Set${setCounter}_${ts}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
saveButton.addEventListener("click", saveCurrentResultAsTxt);

/* Pause/Resume (no pop-up) */
pauseButton.addEventListener("click", ()=>{
  if(!quizStartTime && elapsedMs===0 && !quizSubmitted) return;
  if(isPaused){ resumeTimer(); pauseButton.textContent="Pause"; }
  else { pauseTimer(); pauseButton.textContent="Resume"; }
});

/* Custom confirm modal helpers */
function openConfirm(){
  confirmBackdrop.style.display="flex";
  confirmBackdrop.setAttribute("aria-hidden","false");
}
function closeConfirm(){
  confirmBackdrop.style.display="none";
  confirmBackdrop.setAttribute("aria-hidden","true");
}
confirmCancel.addEventListener("click", closeConfirm);
confirmBackdrop.addEventListener("click", (e)=>{
  if(e.target===confirmBackdrop) closeConfirm();
});

/* Generate new set (with in-page confirm) */
generateBtn.addEventListener("click", ()=>{
  if(!quizSubmitted && !confirm("Generate a new random set? All answers will be lost.")) return;

  if(timerInterval) clearInterval(timerInterval);
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=new Date(); quizEndTime=null;
  updateTimerDisplay(); startTimerInterval();
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();
});
confirmYes.addEventListener("click", ()=>{
  closeConfirm();
  doGenerateNewSet();
});
function doGenerateNewSet(){
  if(timerInterval) clearInterval(timerInterval);
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=new Date(); quizEndTime=null;
  updateTimerDisplay(); startTimerInterval();
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();
}

/* ===================== Export Questions PDF ===================== */
function waitForImages(container){
  const imgs = Array.from(container.querySelectorAll("img"));
  return Promise.all(imgs.map(img => {
    if(img.complete && img.naturalWidth > 0) return Promise.resolve();
    return new Promise(resolve => {
      img.onload = () => resolve();
      img.onerror = () => resolve();
    });
  }));
}
exportQuestionsBtn.addEventListener("click", async ()=>{
  if(!questions || questions.length===0){
    alert("Please start a quiz first.");
    return;
  }
  if(!window.jspdf || !window.jspdf.jsPDF){
    alert("PDF export needs internet to load jsPDF/html2canvas (CDN). The quiz itself works offline.");
    return;
  }

  const perPage = Number(pdfPerPageSel.value || 3);

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  const wrapper=document.createElement("div");
  wrapper.style.position="fixed";
  wrapper.style.left="-9999px";
  wrapper.style.top="0";
  wrapper.style.width="800px";
  wrapper.style.background="#ffffff";
  document.body.appendChild(wrapper);

  try{
    let pageDiv=null;

    questions.forEach((q, idx)=>{
      if(idx%perPage===0){
        pageDiv=document.createElement("div");
        pageDiv.style.padding="20px";
        pageDiv.style.marginBottom="20px";
        pageDiv.style.boxSizing="border-box";

        const header=document.createElement("div");
        header.innerHTML=`
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <div style="width:24px;height:24px;background:#0d47a1;border-radius:6px;position:relative;">
              <div style="position:absolute;width:12px;height:5px;background:#ff9800;top:-4px;left:12px;border-radius:3px;"></div>
            </div>
            <div style="display:flex;flex-direction:column;line-height:1.1;">
              <div style="font-weight:900;letter-spacing:1px;color:#ff9800;font-size:14px;">DYAA</div>
              <div style="font-size:11px;color:#0d47a1;font-weight:700;">EDUCATION</div>
            </div>
          </div>
          <hr style="border:none;border-top:1px solid #e0e0e0;margin:0 0 12px 0;">
          <div style="font-weight:800;color:#1f2a44;margin:0 0 4px 0;">${LESSON_TITLE}</div>
          <div style="color:#546e7a;font-weight:800;margin:0 0 10px 0;">Questions (Set ${setCounter})</div>
        `;
        pageDiv.appendChild(header);
        wrapper.appendChild(pageDiv);
      }

      const qDiv=document.createElement("div");
      qDiv.style.marginBottom="18px";
      qDiv.innerHTML=`
        <div style="font-weight:700;margin:4px 0 6px 0;">Q${idx+1}</div>
        <div style="border-radius:12px;border:1px solid #e5e5e5;padding:12px;">
          <img src="${q.img}" style="width:100%;height:auto;border-radius:10px;" />
        </div>
      `;
      pageDiv.appendChild(qDiv);
    });

    const pages=Array.from(wrapper.children);

    for(let i=0;i<pages.length;i++){
      await waitForImages(pages[i]);

      const canvas = await html2canvas(pages[i], { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
      const imgData = canvas.toDataURL("image/png");

      const imgWidth = pageWidth - 20;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;

      if(i>0) pdf.addPage();
      pdf.addImage(imgData, "PNG", 10, 10, imgWidth, Math.min(imgHeight, pageHeight - 20));
    }

    const safeName=(studentName||"Student").replace(/[^a-z0-9_\-]/gi,"_") || "Student";
    const ts=formatDateForFilename(new Date());
    pdf.save(`Sandglass_Questions_${safeName}_Set${setCounter}_${ts}.pdf`);
  } finally {
    document.body.removeChild(wrapper);
  }
});

/* ===================== Start Screen (+ optional ?name=Tiger) ===================== */
function getNameFromUrl(){
  const url=new URL(window.location.href);
  const name=url.searchParams.get("name");
  return name ? name.trim() : "";
}
function showStartScreen(){
  sidebarEl.style.display="none";
  buttonContainer.style.display="none";
  generateBtn.style.display="none";
  saveButton.style.display="none";
  pauseButton.style.display="none";
  exportQuestionsBtn.style.display="none";

  studentLine.textContent="";
  setLine.textContent="";

  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=null; quizEndTime=null;
  updateTimerDisplay();

  const preset=getNameFromUrl();
  if(preset){
    studentName=preset;
    studentLine.textContent=`Student: ${studentName}`;
    startQuiz(true);
    return;
  }

  quizContent.innerHTML=`
    <p>This quiz has <strong>${TOTAL_QUESTIONS}</strong> questions.</p>
    <ul style="margin-top:6px;color:#555;line-height:1.7;">
      <li><strong>Core:</strong> 5 questions</li>
      <li><strong>Applied:</strong> 1 question</li>
    </ul>
    <p style="margin-top:10px;">Enter your name to begin:</p>

    <input id="nameInput" type="text"
      style="padding:10px;width:260px;font-size:1.05em;border:1px solid #ccc;border-radius:10px;"
      placeholder="Your name">

    <button id="startButton"
      style="margin-left:10px;background:#4caf50;padding:10px 20px;color:white;border:none;border-radius:8px;">
      Start Quiz
    </button>
  `;
  document.getElementById("startButton").addEventListener("click", ()=>startQuiz(false));
}
function startQuiz(skipReadName){
  if(!skipReadName){
    const nameInput=document.getElementById("nameInput");
    studentName=(nameInput.value || "Student").trim();
  }
  studentLine.textContent=`Student: ${studentName}`;

  quizStartTime=new Date();
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  updateTimerDisplay(); startTimerInterval();

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();

  generateBtn.style.display="inline-block";
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";
  exportQuestionsBtn.style.display="inline-block";
}

/* ===================== Init ===================== */
showStartScreen();
</script>
