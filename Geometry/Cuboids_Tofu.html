<script>
/* ===================== CONFIG ===================== */
const QUIZ_TITLE  = "Model 19 — Cutting Cuboids (Tofu Model)";
const LESSON_TITLE= "Model 19 — Cutting Cuboids (Tofu Model)";

const PARTS = [
  { title: "Easy (2 questions)",   level: "Easy",   count: 2 },
  { title: "Medium (2 questions)", level: "Medium", count: 2 },
  { title: "Hard (2 questions)",   level: "Hard",   count: 2 }
];
const TOTAL_QUESTIONS = PARTS.reduce((s,p)=>s+p.count,0);

/* ===================== Utils ===================== */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ const t=a%b; a=b; b=t; } return a||1; }
function formatMs(ms){
  const totalSec=Math.floor(ms/1000), min=Math.floor(totalSec/60), sec=totalSec%60;
  return `${String(min).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
function escapeXml(s){
  return String(s)
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&apos;");
}
function wrapLines(lines, maxChars=76){
  const out=[];
  function pushWrapped(line){
    const words=String(line).split(/\s+/).filter(Boolean);
    if(words.length===0){ out.push(""); return; }
    let cur="";
    for(const w of words){
      if(w.length>maxChars){
        if(cur){ out.push(cur); cur=""; }
        for(let i=0;i<w.length;i+=maxChars) out.push(w.slice(i,i+maxChars));
        continue;
      }
      if(!cur) cur=w;
      else if((cur+" "+w).length<=maxChars) cur+=" "+w;
      else { out.push(cur); cur=w; }
    }
    if(cur) out.push(cur);
  }
  for(const line of lines) pushWrapped(line);
  return out;
}

/* Parse numbers from user input */
function parseNumbersFromInput(str){
  const s=(str||"").trim();
  if(!s) return [];
  const out=[];
  const re=/([+-]?\d+\s*\/\s*[+-]?\d+)|([+-]?\d+(?:\.\d+)?)/g;
  let m;
  while((m=re.exec(s))!==null){
    const token=(m[1]||m[2]||"").replace(/\s+/g,"");
    if(token.includes("/")){
      const [a,b]=token.split("/");
      const n=Number(a), d=Number(b);
      if(Number.isFinite(n)&&Number.isFinite(d)&&d!==0) out.push(n/d);
    }else{
      const v=Number(token);
      if(Number.isFinite(v)) out.push(v);
    }
  }
  return out;
}
function approxEqual(a,b,tol=1e-6){ return Math.abs(a-b)<=tol; }
function sort2(a,b){ return a<b ? [a,b] : [b,a]; }

/* ===================== SVG Card (INLINE SVG, crisp) ===================== */
function makeSvgQuestionCardMarkup(lines, diagramMarkup, titleText=QUIZ_TITLE){
  // Bigger card so it’s readable on phones too
  const W=1200, headerH=78, padX=52, textLineH=42, topY=headerH+54;
  const wrapped=wrapLines(lines, 78);
  const textBlockH = wrapped.length * textLineH;
  const diagramY = topY + textBlockH + 18;
  const diagramH = 620;
  const padBottom = 58;
  const H = diagramY + diagramH + padBottom;

  const textSpans=wrapped.map((t,i)=>{
    const y=topY + i*textLineH;
    return `<text x="${padX}" y="${y}" font-size="30" fill="#1f2a44" font-family="Segoe UI, Arial">${escapeXml(t)}</text>`;
  }).join("");

  const svg=`
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}"
       preserveAspectRatio="xMidYMid meet"
       style="width:100%; height:auto; display:block;">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#f7fbff"/>
        <stop offset="1" stop-color="#ffffff"/>
      </linearGradient>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/>
      </filter>
      <clipPath id="clipBox">
        <rect x="52" y="0" width="${W-104}" height="${diagramH}" rx="16" ry="16"></rect>
      </clipPath>
    </defs>

    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${H-36}"
          fill="url(#g)" stroke="#dfe7f2" stroke-width="3" filter="url(#shadow)"/>
    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${headerH}"
          fill="#0d47a1" opacity="0.10"/>

    <text x="${padX}" y="58" font-size="30" fill="#0d47a1" font-weight="800"
          font-family="Segoe UI, Arial">${escapeXml(titleText)}</text>

    ${textSpans}

    <g transform="translate(0, ${diagramY})">
      <rect x="52" y="0" width="${W-104}" height="${diagramH}" rx="16" ry="16"
            fill="#ffffff" stroke="#e5e5e5" stroke-width="3"/>
      <g clip-path="url(#clipBox)">
        ${diagramMarkup}
      </g>
    </g>
  </svg>`.trim();

  return svg;
}

/* ===================== Diagram: isometric cuboid + cuts ===================== */
function cuboidDiagram(opts){
  const L  = opts.L ?? 15;
  const Wd = opts.W ?? 10;
  const H  = opts.H ?? 5;

  const unit = opts.unit ?? "cm";
  const cutsL = opts.cutsL ?? 1;
  const cutsW = opts.cutsW ?? 1;

  const labelExtra = opts.labelExtra ?? "";
  const highlightFace = opts.highlightFace ?? "";
  const showNotToScale = opts.showNotToScale ?? true;

  // ✅ 长条梁：用 2D 梁图（更清楚）
  const aspect = L / Math.max(Wd, H);
  if(aspect >= 6){
    return beamDiagram2D({L, W:Wd, H, unit, cutsL, labelExtra, showNotToScale});
  }

  // ====== 否则：正常 3D 立方体/长方体（你之前那套）======
  // （保持你现有的 3D 版本即可；这里我给你放一份简化的高对比 3D）
  const CANVAS_W = 1200, CANVAS_H = 620;
  const edgeStroke = `stroke="#0b1020" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"`;
  const cutStroke  = `stroke="#0b1020" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="12 10"`;
  const styleText  = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="8" fill="#0b1020"`;
  const styleSmall = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="7" fill="#0b1020"`;

  const marginX=120, marginY=110;
  const maxW = CANVAS_W - marginX*2;
  const maxH = CANVAS_H - marginY*2 - 70;

  const projW = L + 0.75*Wd;
  const projH = H + 0.55*(0.75*Wd);

  let scale = Math.min(maxW/projW, maxH/projH);
  if(!Number.isFinite(scale) || scale<=0) scale=25;

  const fw=L*scale, fh=H*scale;
  const depth=Wd*scale*0.75, dx=-depth, dy=-depth*0.55;

  let FBR={x:0,y:0}, FBL={x:-fw,y:0}, FTR={x:0,y:-fh}, FTL={x:-fw,y:-fh};
  let BBR={x:FBR.x+dx,y:FBR.y+dy}, BBL={x:FBL.x+dx,y:FBL.y+dy};
  let BTR={x:FTR.x+dx,y:FTR.y+dy}, BTL={x:FTL.x+dx,y:FTL.y+dy};

  const pts=[FBR,FBL,FTR,FTL,BBR,BBL,BTR,BTL];
  const minX=Math.min(...pts.map(p=>p.x)), maxX=Math.max(...pts.map(p=>p.x));
  const minY=Math.min(...pts.map(p=>p.y)), maxY=Math.max(...pts.map(p=>p.y));
  const shiftX = CANVAS_W*0.55 - (minX+maxX)/2;
  const shiftY = CANVAS_H*0.56 - (minY+maxY)/2;
  const sh=p=>({x:p.x+shiftX,y:p.y+shiftY});
  FBR=sh(FBR);FBL=sh(FBL);FTR=sh(FTR);FTL=sh(FTL);
  BBR=sh(BBR);BBL=sh(BBL);BTR=sh(BTR);BTL=sh(BTL);

  const topFace=[BTL,BTR,FTR,FTL];
  const sideFace=[BTR,BBR,FBR,FTR];
  const frontFace=[FTL,FTR,FBR,FBL];

  const poly=(arr,fill)=>`<polygon points="${arr.map(p=>`${p.x},${p.y}`).join(" ")}" fill="${fill}" ${edgeStroke}/>`;
  let highlight="";
  if(highlightFace==="cutH"){
    highlight = `<polygon points="${topFace.map(p=>`${p.x},${p.y}`).join(" ")}" fill="rgba(255,152,0,0.18)" stroke="none"/>`;
  }

  let cutLines="";
  if(cutsL>1){
    for(let i=1;i<cutsL;i++){
      const t=i/cutsL;
      const p1={x:FTL.x+(FTR.x-FTL.x)*t,y:FTL.y+(FTR.y-FTL.y)*t};
      const p2={x:BTL.x+(BTR.x-BTL.x)*t,y:BTL.y+(BTR.y-BTL.y)*t};
      const p3={x:FBL.x+(FBR.x-FBL.x)*t,y:FBL.y+(FBR.y-FBL.y)*t};
      cutLines += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" ${cutStroke}/>`;
      cutLines += `<line x1="${p1.x}" y1="${p1.y}" x2="${p3.x}" y2="${p3.y}" ${cutStroke}/>`;
    }
  }
  if(cutsW>1){
    for(let i=1;i<cutsW;i++){
      const t=i/cutsW;
      const p1={x:FTL.x+(BTL.x-FTL.x)*t,y:FTL.y+(BTL.y-FTL.y)*t};
      const p2={x:FTR.x+(BTR.x-FTR.x)*t,y:FTR.y+(BTR.y-FTR.y)*t};
      const p3={x:FBL.x+(BBL.x-FBL.x)*t,y:FBL.y+(BBL.y-FBL.y)*t};
      cutLines += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" ${cutStroke}/>`;
      cutLines += `<line x1="${p1.x}" y1="${p1.y}" x2="${p3.x}" y2="${p3.y}" ${cutStroke}/>`;
    }
  }

  const mid=(a,b)=>({x:(a.x+b.x)/2,y:(a.y+b.y)/2});
  const midL=mid(FBL,FBR), midH=mid(FBL,FTL), midW=mid(FTL,BTL);

  const labelL = `
    <line x1="${FBL.x}" y1="${FBL.y+34}" x2="${FBR.x}" y2="${FBR.y+34}" ${edgeStroke}/>
    <text x="${midL.x-90}" y="${midL.y+84}" font-size="34" ${styleText}>L = ${L} ${unit}</text>
  `;
  const labelH = `
    <line x1="${FBL.x-34}" y1="${FBL.y}" x2="${FTL.x-34}" y2="${FTL.y}" ${edgeStroke}/>
    <text x="${midH.x-250}" y="${midH.y-10}" font-size="34" ${styleText}>H = ${H} ${unit}</text>
  `;
  const labelW = `
    <line x1="${FTL.x-18}" y1="${FTL.y-26}" x2="${BTL.x-18}" y2="${BTL.y-26}" ${edgeStroke}/>
    <text x="${midW.x-260}" y="${midW.y-60}" font-size="34" ${styleText}>W = ${Wd} ${unit}</text>
  `;

  const extra = labelExtra ? `<text x="90" y="90" font-size="34" ${styleText}>${escapeXml(labelExtra)}</text>` : "";
  const caption = `<text x="90" y="${CANVAS_H-18}" font-size="26" ${styleSmall}>Cuboid / Cube cutting model</text>`;
  const nts = showNotToScale
    ? `<text x="${CANVAS_W-220}" y="${CANVAS_H-18}" font-size="26" font-style="italic"
         font-family="Segoe UI, Arial" fill="#546e7a"
         paint-order="stroke" stroke="#ffffff" stroke-width="7">NOT TO SCALE</text>` : "";

  return `
    <g>
      ${poly(topFace,  "rgba(13,71,161,0.14)")}
      ${poly(sideFace, "rgba(13,71,161,0.22)")}
      ${poly(frontFace,"rgba(13,71,161,0.10)")}
      ${highlight}
      ${cutLines}
      ${labelL}
      ${labelW}
      ${labelH}
      ${extra}
      ${caption}
      ${nts}
    </g>
  `;
}

/* ✅ 2D beam diagram for very long thin cuboids (clear!) */
function beamDiagram2D(opts){
  const L = opts.L, W = opts.W, H = opts.H;
  const unit = opts.unit ?? "cm";
  const cutsL = Math.max(1, opts.cutsL ?? 1);
  const labelExtra = opts.labelExtra ?? "";
  const showNotToScale = opts.showNotToScale ?? true;

  const CANVAS_W=1200, CANVAS_H=620;

  const styleText  = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="8" fill="#0b1020"`;
  const styleSmall = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="7" fill="#0b1020"`;
  const edgeStroke = `stroke="#0b1020" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"`;
  const cutStroke  = `stroke="#0b1020" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="12 10"`;

  // beam body (exaggerated thickness for visibility)
  const xL=140, xR=1060;
  const yTop=270, yBot=380;
  const depthX=-36, depthY=-22;

  // 3D-ish faces
  const front = [
    {x:xL, y:yTop},
    {x:xR, y:yTop},
    {x:xR, y:yBot},
    {x:xL, y:yBot},
  ];
  const topFace = [
    {x:xL, y:yTop},
    {x:xR, y:yTop},
    {x:xR+depthX, y:yTop+depthY},
    {x:xL+depthX, y:yTop+depthY},
  ];
  const endFace = [
    {x:xR, y:yTop},
    {x:xR+depthX, y:yTop+depthY},
    {x:xR+depthX, y:yBot+depthY},
    {x:xR, y:yBot},
  ];

  const poly=(arr,fill)=>`<polygon points="${arr.map(p=>`${p.x},${p.y}`).join(" ")}" fill="${fill}" ${edgeStroke}/>`;

  // cut lines along length
  let cuts="";
  if(cutsL>1){
    for(let i=1;i<cutsL;i++){
      const t=i/cutsL;
      const x = xL + (xR-xL)*t;
      // front face cut
      cuts += `<line x1="${x}" y1="${yTop}" x2="${x}" y2="${yBot}" ${cutStroke}/>`;
      // top face cut (projected)
      cuts += `<line x1="${x}" y1="${yTop}" x2="${x+depthX}" y2="${yTop+depthY}" ${cutStroke}/>`;
    }
  }

  // inset: square cross-section (clear!)
  const insetX=170, insetY=110, insetS=90;
  const inset = `
    <rect x="${insetX}" y="${insetY}" width="${insetS}" height="${insetS}" fill="rgba(13,71,161,0.12)" ${edgeStroke}/>
    <text x="${insetX+insetS+20}" y="${insetY+55}" font-size="32" ${styleText}>side = ${H} ${unit}</text>
  `;

  const extra = labelExtra ? `<text x="90" y="90" font-size="34" ${styleText}>${escapeXml(labelExtra)}</text>` : "";

  // L label
  const midX=(xL+xR)/2;
  const labelL = `
    <line x1="${xL}" y1="${yBot+40}" x2="${xR}" y2="${yBot+40}" ${edgeStroke}/>
    <text x="${midX-100}" y="${yBot+92}" font-size="34" ${styleText}>L = ${L} ${unit}</text>
  `;

  const caption = `<text x="90" y="${CANVAS_H-18}" font-size="26" ${styleSmall}>Cuboid / Cube cutting model</text>`;
  const nts = showNotToScale
    ? `<text x="${CANVAS_W-220}" y="${CANVAS_H-18}" font-size="26" font-style="italic"
         font-family="Segoe UI, Arial" fill="#546e7a"
         paint-order="stroke" stroke="#ffffff" stroke-width="7">NOT TO SCALE</text>` : "";

  return `
    <g>
      ${extra}
      ${inset}
      ${poly(topFace,  "rgba(13,71,161,0.16)")}
      ${poly(endFace,  "rgba(13,71,161,0.22)")}
      ${poly(front,    "rgba(13,71,161,0.10)")}
      ${cuts}
      ${labelL}
      ${caption}
      ${nts}
    </g>
  `;
}

/* ===================== Grading ===================== */
function gradeAnswer(userText, answer){
  const nums = parseNumbersFromInput(userText);

  if(answer.type==="single"){
    if(nums.length<1) return false;
    return approxEqual(nums[0], answer.values[0], answer.tol ?? 1e-6);
  }

  if(answer.type==="two_numbers"){
    if(nums.length<2) return false;
    const a=nums[0], b=nums[1];
    const x=answer.values[0], y=answer.values[1];
    if(answer.order==="any"){
      const [p,q]=sort2(a,b);
      const [r,s]=sort2(x,y);
      return approxEqual(p,r,answer.tol??1e-6) && approxEqual(q,s,answer.tol??1e-6);
    }
    return approxEqual(a,x,answer.tol??1e-6) && approxEqual(b,y,answer.tol??1e-6);
  }

  return false;
}

/* ===================== Question Generators (2 easy, 2 medium, 2 hard) ===================== */
function genE1(){
  const lengthM = pick([1.6, 1.8, 2.0, 2.4, 3.0]);
  const side = randInt(6, 14);
  const pieces = randInt(3, 8);
  const cuts = pieces - 1;
  const increase = 2 * cuts * side * side;

  const lines=[
    "(Easy 1) A wooden beam is " + lengthM + " m long.",
    `Its cross-section is a square of side ${side} cm.`,
    `It is cut perpendicular to its length into ${pieces} equal pieces.`,
    "By how many cm² does the total surface area increase?",
    "(Enter one number.)"
  ];

  return {
    partIndex: 0,
    placeholder: "e.g., 800",
    svg: makeSvgQuestionCardMarkup(
      lines,
      cuboidDiagram({L:Math.round(lengthM*100), W:side, H:side, unit:"cm", cutsL:pieces, highlightFace:"cutL",
        labelExtra:`Cut into ${pieces} pieces (cuts = ${cuts})`})
    ),
    hintText: "Each cut creates 2 new faces. New area per face = side × side. Increase = 2 × cuts × side².",
    answer: { type:"single", values:[increase], label:String(increase) }
  };
}

function genE2(){
  const k = randInt(3, 5);
  const s = randInt(1, 4);
  const big = k * s;

  const original = 6 * big * big;
  const smallArea = 6 * s * s;
  const count = k*k*k;
  const newTotal = count * smallArea;
  const increase = newTotal - original;

  const lines=[
    "(Easy 2) A cube has side length " + big + " cm.",
    `It is cut into small cubes of side ${s} cm.`,
    "By how many cm² does the total surface area increase?",
    "(Enter one number.)"
  ];

  return {
    partIndex: 0,
    placeholder: "e.g., 432",
    svg: makeSvgQuestionCardMarkup(
      lines,
      cuboidDiagram({L:big, W:big, H:big, unit:"cm", cutsL:k, cutsW:k, highlightFace:"cutH",
        labelExtra:`${k}×${k}×${k} small cubes (${count} total)`})
    ),
    hintText: "Original = 6·big². New = (number of small cubes) × 6·s². Increase = new − original.",
    answer: { type:"single", values:[increase], label:String(increase) }
  };
}

function genM1(){
  const s = randInt(2, 9);
  const decrease = 4 * s * s;
  const cubeSA = 6 * s * s;
  const bigL = 3*s, bigW=s, bigH=s;

  const lines=[
    "(Medium 1) Three identical cubes are joined to form one cuboid (in a straight row).",
    `Compared with the sum of surface areas of the 3 separate cubes,`,
    `the cuboid's surface area is ${decrease} cm² less.`,
    "Find the surface area of ONE small cube (cm²).",
    "(Enter one number.)"
  ];

  return {
    partIndex: 1,
    placeholder: "e.g., 54",
    svg: makeSvgQuestionCardMarkup(
      lines,
      cuboidDiagram({L:bigL, W:bigW, H:bigH, unit:"cm", cutsL:3, highlightFace:"cutL",
        labelExtra:`3 cubes in a row (side = ${s} cm)`})
    ),
    hintText: "Two joins hide 4 square faces total: decrease = 4·s². Cube surface area = 6·s².",
    answer: { type:"single", values:[cubeSA], label:String(cubeSA) }
  };
}

function genM2(){
  const a = randInt(10, 22);
  const b = randInt(6, 18);
  const c = randInt(4, 14);

  const inc1 = 2 * b * c;
  const inc2 = 2 * a * c;
  const inc3 = 2 * a * b;

  const maxInc = Math.max(inc1, inc2, inc3);
  const minInc = Math.min(inc1, inc2, inc3);

  const lines=[
    "(Medium 2) A cuboid is " + a + " cm × " + b + " cm × " + c + " cm.",
    "It is cut into TWO identical smaller cuboids (one straight cut).",
    "Find the maximum possible increase and the minimum possible increase in surface area (cm²).",
    "(Enter: max, min  e.g., 200, 100)"
  ];

  return {
    partIndex: 1,
    placeholder: "e.g., 200, 100",
    svg: makeSvgQuestionCardMarkup(
      lines,
      cuboidDiagram({L:a, W:b, H:c, unit:"cm", cutsL:2, highlightFace:"cutL",
        labelExtra:"One cut → 2 identical pieces"})
    ),
    hintText: "Increase = 2 × (area of the cut face). Possible faces: ab, ac, bc.",
    answer: { type:"two_numbers", values:[maxInc, minInc], order:"any", label:`Max = ${maxInc}, Min = ${minInc}` }
  };
}

function genH1(){
  const L = randInt(12, 28);
  const W = randInt(8, 20);
  const H = randInt(5, 14);

  const p = randInt(3, 7);
  const q = randInt(2, 6);

  const increase = 2*(p-1)*W*H + 2*(q-1)*L*H;

  const lines=[
    "(Hard 1) A cuboid is " + L + " cm × " + W + " cm × " + H + " cm.",
    `It is cut into ${p} equal slices along the length and ${q} equal slices along the width.`,
    "By how many cm² does the total surface area increase (ignore saw thickness)?",
    "(Enter one number.)"
  ];

  return {
    partIndex: 2,
    placeholder: "e.g., 960",
    svg: makeSvgQuestionCardMarkup(
      lines,
      cuboidDiagram({L:L, W:W, H:H, unit:"cm", cutsL:p, cutsW:q, highlightFace:"cutW",
        labelExtra:`Cuts: length→${p} parts, width→${q} parts`})
    ),
    hintText: "Each cut adds 2 × (area of the cutting cross-section). Add both directions.",
    answer: { type:"single", values:[increase], label:String(increase) }
  };
}

function genH2(){
  const side = randInt(6, 14);
  const pieces = randInt(4, 12);
  const cuts = pieces - 1;
  const increase = 2 * cuts * side * side;

  const lengthM = pick([1.2, 1.5, 2.0, 2.5, 3.0]);

  const lines=[
    "(Hard 2) A beam is " + lengthM + " m long with a square cross-section.",
    `The square side is ${side} cm.`,
    `After cutting it into some equal pieces (cuts ⟂ length), the surface area increases by ${increase} cm².`,
    "How many pieces is it cut into?",
    "(Enter one integer.)"
  ];

  return {
    partIndex: 2,
    placeholder: "e.g., 5",
    svg: makeSvgQuestionCardMarkup(
      lines,
      cuboidDiagram({L:Math.round(lengthM*100), W:side, H:side, unit:"cm", cutsL:pieces, highlightFace:"cutL",
        labelExtra:"Find number of pieces"})
    ),
    hintText: "Increase = 2 × (pieces−1) × side². So pieces = increase/(2·side²) + 1.",
    answer: { type:"single", values:[pieces], label:String(pieces) }
  };
}

/* ===================== Build Questions ===================== */
function buildQuestions(){
  return [genE1(), genE2(), genM1(), genM2(), genH1(), genH2()];
}

/* ===================== State ===================== */
let questions=[];
let currentQuestionIndex=0;
let studentName="Student";
let quizStartTime=null;
let quizEndTime=null;
let quizSubmitted=false;

let timerInterval=null;
let elapsedMs=0;
let isPaused=false;
let firstAttemptMs=null;

let setCounter=0;
let lastSignature="";

/* DOM */
const quizContent=document.getElementById("quizContent");
const sidebarEl=document.getElementById("sidebar");

const buttonContainer=document.getElementById("navButtons");
const backButton=document.getElementById("backButton");
const nextButton=document.getElementById("nextButton");
const submitButton=document.getElementById("submitButton");
const checkButton=document.getElementById("checkButton");
const saveButton=document.getElementById("saveButton");

const generateBtn=document.getElementById("generateButton");
const pauseButton=document.getElementById("pauseButton");
const exportQuestionsBtn=document.getElementById("exportQuestionsBtn");
const pdfPerPageSel=document.getElementById("pdfPerPage");

const timerDisplay=document.getElementById("timerDisplay");
const studentLine=document.getElementById("studentLine");
const setLine=document.getElementById("setLine");

/* ===================== Timer ===================== */
function updateTimerDisplay(){
  let totalMs=elapsedMs;
  if(!isPaused && quizStartTime) totalMs+=(new Date()-quizStartTime);
  let text=`Time: ${formatMs(totalMs)}`;
  if(firstAttemptMs!==null) text+=` (First: ${formatMs(firstAttemptMs)})`;
  timerDisplay.textContent=text;
}
function startTimerInterval(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(updateTimerDisplay, 1000);
}
function pauseTimer(){
  if(isPaused || !quizStartTime) return;
  const now=new Date();
  elapsedMs+=now-quizStartTime;
  isPaused=true;
  quizStartTime=null;
  updateTimerDisplay();
}
function resumeTimer(){
  if(!isPaused) return;
  isPaused=false;
  quizStartTime=new Date();
  updateTimerDisplay();
}

/* ===================== Generate Quiz ===================== */
function signatureOf(built){
  return built.map(q=>q.answer.label).join("|");
}
function generateQuiz(){
  questions=[];
  quizSubmitted=false;

  let tries=0;
  let built=null;

  while(tries<80){
    built = buildQuestions();
    const sig = signatureOf(built);
    if(sig !== lastSignature){
      lastSignature = sig;
      break;
    }
    tries++;
  }

  setCounter++;
  setLine.textContent = `Set: ${setCounter}`;

  const partCounters = PARTS.map(()=>0);

  for(let i=0;i<built.length;i++){
    const pi = built[i].partIndex ?? 0;
    partCounters[pi]++;

    questions.push({
      partIndex: pi,
      indexInPart: partCounters[pi],
      svg: built[i].svg,
      hint: built[i].hintText || "Think about how many new faces are created by cutting.",
      answer: built[i].answer,
      placeholder: built[i].placeholder || "Enter your answer",
      userValue:"",
      isCorrect:false
    });
  }
}

/* ===================== Sidebar ===================== */
function renderSidebar(){
  sidebarEl.style.display="block";
  sidebarEl.innerHTML=`<h4>Questions</h4><ul id="qList"></ul>`;
  const ul=document.getElementById("qList");

  for(let i=0;i<TOTAL_QUESTIONS;i++){
    const li=document.createElement("li");
    li.textContent=`Q${i+1}`;
    li.dataset.index=i;
    li.addEventListener("click",()=>{
      saveCurrentInput();
      currentQuestionIndex=i;
      renderQuestion();
    });
    ul.appendChild(li);
  }
  updateSidebarStatus();
}
function updateSidebarStatus(){
  const items=document.querySelectorAll("#qList li");
  items.forEach(li=>{
    const idx=Number(li.dataset.index);
    const q=questions[idx];
    li.classList.remove("active","answered","correct","incorrect");

    if(!quizSubmitted){
      li.classList.toggle("active", idx===currentQuestionIndex);
      if((q.userValue||"").trim()!=="") li.classList.add("answered");
    }else{
      if((q.userValue||"").trim()!==""){
        li.classList.add(q.isCorrect ? "correct" : "incorrect");
      }
    }
  });
}

/* ===================== Helpers ===================== */
function saveCurrentInput(){
  const input=document.getElementById("answerInput");
  if(input){
    questions[currentQuestionIndex].userValue=input.value.trim();
    if(quizSubmitted){
      const q=questions[currentQuestionIndex];
      q.isCorrect = gradeAnswer(q.userValue, q.answer);
      updateSidebarStatus();
    }
  }
}
function mountNavButtonsInto(slotId){
  const slot=document.getElementById(slotId);
  if(!slot) return;
  slot.appendChild(buttonContainer);
  buttonContainer.style.display="flex";
}

/* ===================== Render Question ===================== */
function renderQuestion(){
  const q=questions[currentQuestionIndex];
  const part = PARTS[q.partIndex] || PARTS[0];

  quizContent.innerHTML=`
    <p class="question-text">Question ${currentQuestionIndex+1} of ${TOTAL_QUESTIONS}</p>
    <div class="part-title">${escapeXml(part.title)}</div>

    <div class="single-question">
      <div style="font-weight:800;margin-bottom:8px;">${escapeXml(part.level)} — Question ${q.indexInPart}</div>

      <div class="img-wrap">
        <div class="svg-host" id="svgHost"></div>
      </div>

      <div class="answer-row">
        <div style="font-weight:700;">Answer:</div>
        <input id="answerInput" class="answer-box" type="text"
               placeholder="${escapeXml(q.placeholder)}"
               value="${escapeXml(q.userValue||"")}">
      </div>

      <div id="checkFeedback" style="display:none;"></div>

      <div class="hint-row">
        <button id="hintBtn" class="hint-btn">Hint</button>
      </div>

      <div id="hintBox" class="hint">${escapeXml(q.hint)}</div>
    </div>

    <div id="navSlot"></div>
  `;

  // inject SVG inline (crisp)
  document.getElementById("svgHost").innerHTML = q.svg;

  mountNavButtonsInto("navSlot");

  const hintBtn=document.getElementById("hintBtn");
  const hintBox=document.getElementById("hintBox");
  hintBtn.addEventListener("click", ()=>{
    const shown=hintBox.style.display==="block";
    hintBox.style.display = shown ? "none" : "block";
    hintBtn.textContent = shown ? "Hint" : "Hide Hint";
  });

  backButton.style.display="inline-block";
  backButton.style.visibility=(currentQuestionIndex===0)?"hidden":"visible";

  const isLast=(currentQuestionIndex===TOTAL_QUESTIONS-1);
  nextButton.style.display=isLast?"none":"inline-block";
  submitButton.style.display=isLast?"inline-block":"none";

  if(!quizSubmitted){
    checkButton.style.display="inline-block";
  }else{
    checkButton.style.display = (q.userValue||"").trim()!=="" && !q.isCorrect ? "inline-block" : "none";
  }

  saveButton.style.display=quizSubmitted?"inline-block":"none";
  updateSidebarStatus();
}

/* ===================== Results + Submit ===================== */
function calculateAndShowResults(){
  saveCurrentInput();

  const now=new Date();
  let attemptMs=elapsedMs;
  if(!isPaused && quizStartTime) attemptMs+=now-quizStartTime;
  if(firstAttemptMs===null) firstAttemptMs=attemptMs;

  const attemptStartTime=quizStartTime || now;
  quizEndTime=now;
  quizSubmitted=true;

  let correctCount=0;
  questions.forEach((q)=>{
    q.isCorrect = gradeAnswer(q.userValue, q.answer);
    if(q.isCorrect) correctCount++;
  });

  updateSidebarStatus();

  let html=`
    <h3>Results for ${escapeXml(studentName)}</h3>
    <p>Set: <strong>${setCounter}</strong></p>
    <p>Score: <strong>${correctCount} / ${TOTAL_QUESTIONS}</strong></p>
    <p>Start time: <strong>${attemptStartTime.toLocaleTimeString()}</strong></p>
    <p>Submit time: <strong>${quizEndTime.toLocaleTimeString()}</strong></p>
    <p>Time taken (this attempt): <strong>${formatMs(attemptMs)}</strong></p>
    <p>First attempt time: <strong>${formatMs(firstAttemptMs)}</strong></p>

    <table class="review-table">
      <tr>
        <th>#</th><th>Image</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th>
      </tr>
  `;

  questions.forEach((q,i)=>{
    const ua=(q.userValue||"").trim();
    const correctText = q.answer.label;

    html+=`
      <tr class="${q.isCorrect ? "correct-answer":"incorrect-answer"}">
        <td>${i+1}</td>
        <td><div class="thumbBox" id="thumb_${i}"></div></td>
        <td>${ua==="" ? "—" : escapeXml(ua)}</td>
        <td><strong>${escapeXml(correctText)}</strong></td>
        <td>${ua==="" ? "Not answered" : (q.isCorrect ? "Correct":"Incorrect")}</td>
      </tr>
    `;
  });

  html+=`</table><div id="navSlot"></div>`;
  quizContent.innerHTML=html;

  // inject thumbs
  questions.forEach((q,i)=>{
    const box=document.getElementById("thumb_"+i);
    if(box) box.innerHTML=q.svg;
  });

  mountNavButtonsInto("navSlot");

  backButton.style.display="none";
  nextButton.style.display="none";
  submitButton.style.display="none";
  checkButton.style.display="none";
  saveButton.style.display="inline-block";
}

/* ===================== Buttons ===================== */
nextButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex<TOTAL_QUESTIONS-1){
    currentQuestionIndex++;
    renderQuestion();
  }
});
backButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex>0){
    currentQuestionIndex--;
    renderQuestion();
  }
});
submitButton.addEventListener("click", ()=>{
  if(currentQuestionIndex===TOTAL_QUESTIONS-1){
    calculateAndShowResults();
  }
});

checkButton.addEventListener("click", ()=>{
  saveCurrentInput();
  const q=questions[currentQuestionIndex];

  q.isCorrect = gradeAnswer(q.userValue, q.answer);
  updateSidebarStatus();

  const box=document.getElementById("checkFeedback");
  if(!box) return;

  box.className="check-feedback";
  box.style.display="block";

  if(q.isCorrect){
    box.innerHTML=`✅ Correct!`;
    if(quizSubmitted) checkButton.style.display="none";
  }else{
    box.innerHTML=`❌ Incorrect. Correct answer: <strong>${escapeXml(q.answer.label)}</strong>`;
    if(quizSubmitted) checkButton.style.display="inline-block";
  }
});

/* Save TXT */
function formatDateForFilename(date){
  if(!date) return "no_time";
  const pad=n=>String(n).padStart(2,"0");
  return date.getFullYear()+pad(date.getMonth()+1)+pad(date.getDate())+"_"+pad(date.getHours())+pad(date.getMinutes())+pad(date.getSeconds());
}
function saveCurrentResultAsTxt(){
  saveCurrentInput();

  let correctCount=0;
  questions.forEach(q=>{ if(q.isCorrect) correctCount++; });

  const lines=[];
  lines.push(QUIZ_TITLE + " — Current Result");
  lines.push("Student: "+studentName);
  lines.push("Set: "+setCounter);
  if(quizEndTime) lines.push("Last submit time: "+quizEndTime.toLocaleString());
  lines.push("Score: "+correctCount+" / "+TOTAL_QUESTIONS);
  if(firstAttemptMs!==null) lines.push("First attempt time: "+formatMs(firstAttemptMs));
  lines.push("");

  questions.forEach((q,i)=>{
    const userAns=(q.userValue||"").trim()==="" ? "Not answered" : q.userValue;
    const resultText=(q.userValue||"").trim()==="" ? "Not answered" : (q.isCorrect?"Correct":"Incorrect");
    lines.push(`Q${i+1}`);
    lines.push("Your answer: "+userAns);
    lines.push("Correct answer: "+q.answer.label);
    lines.push("Result: "+resultText);
    lines.push("");
  });

  const content=lines.join("\n");
  const blob=new Blob([content],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const safeName=studentName.replace(/[^a-z0-9_\-]/gi,"_")||"Student";
  const ts=formatDateForFilename(new Date());
  a.href=url;
  a.download=`CuttingCuboids_${safeName}_Set${setCounter}_${ts}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
saveButton.addEventListener("click", saveCurrentResultAsTxt);

/* Pause/Resume */
pauseButton.addEventListener("click", ()=>{
  if(!quizStartTime && elapsedMs===0 && !quizSubmitted) return;
  if(isPaused){ resumeTimer(); pauseButton.textContent="Pause"; }
  else { pauseTimer(); pauseButton.textContent="Resume"; }
});

/* ===================== Generate new set (WITH browser confirm) ===================== */

function doGenerateNewSet(){
  if(timerInterval) clearInterval(timerInterval);

  quizStartTime=new Date(); quizEndTime=null;
  updateTimerDisplay(); startTimerInterval();
  pauseButton.style.display="inline-block";

/* ===================== Export Questions PDF ===================== */

  if(!window.jspdf || !window.jspdf.jsPDF){
    alert("PDF export needs internet to load jsPDF/html2canvas (CDN). The quiz itself works offline.");

  }

  const perPage = Number(pdfPerPageSel.value || 3);

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  const wrapper=document.createElement("div");
  wrapper.style.position="fixed";
  wrapper.style.left="-9999px";
  wrapper.style.top="0";
  wrapper.style.width="860px";
  wrapper.style.background="#ffffff";
  document.body.appendChild(wrapper);

  try{
    let pageDiv=null;

    questions.forEach((q, idx)=>{
      if(idx%perPage===0){
        pageDiv=document.createElement("div");
        pageDiv.style.padding="20px";
        pageDiv.style.marginBottom="20px";

        const header=document.createElement("div");

          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <div style="width:24px;height:24px;background:#0d47a1;border-radius:6px;position:relative;">
              <div style="position:absolute;width:12px;height:5px;background:#ff9800;top:-4px;left:12px;border-radius:3px;"></div>
            </div>
            <div style="display:flex;flex-direction:column;line-height:1.1;">
              <div style="font-weight:900;letter-spacing:1px;color:#ff9800;font-size:14px;">DYAA</div>
              <div style="font-size:11px;color:#0d47a1;font-weight:700;">EDUCATION</div>
            </div>
          </div>
          <hr style="border:none;border-top:1px solid #e0e0e0;margin:0 0 12px 0;">
          <div style="font-weight:800;color:#1f2a44;margin:0 0 4px 0;">${LESSON_TITLE}</div>
          <div style="color:#546e7a;font-weight:800;margin:0 0 10px 0;">Questions (Set ${setCounter})</div>
        `;
        pageDiv.appendChild(header);
        wrapper.appendChild(pageDiv);
      }

      const qDiv=document.createElement("div");
      qDiv.style.marginBottom="18px";
      qDiv.innerHTML=`
        <div style="font-weight:700;margin:4px 0 6px 0;">Q${idx+1}</div>
        <div style="border-radius:12px;border:1px solid #e5e5e5;padding:12px;">
          ${q.svg}
        </div>
      `;
      pageDiv.appendChild(qDiv);
    });

    const pages=Array.from(wrapper.children);

    for(let i=0;i<pages.length;i++){
      const canvas = await html2canvas(pages[i], {
        scale: 3,                // sharper PDF
        useCORS: true,
        backgroundColor: "#ffffff"
      });
      const imgData = canvas.toDataURL("image/png");

      const imgWidth = pageWidth - 20;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;

      if(i>0) pdf.addPage();
      pdf.addImage(imgData, "PNG", 10, 10, imgWidth, Math.min(imgHeight, pageHeight - 20));
    }

    const safeName=(studentName||"Student").replace(/[^a-z0-9_\-]/gi,"_") || "Student";
    const ts=formatDateForFilename(new Date());
    pdf.save(`CuttingCuboids_Questions_${safeName}_Set${setCounter}_${ts}.pdf`);
  } finally {
    document.body.removeChild(wrapper);
  }
});

/* ===================== Start Screen (+ optional ?name=Tiger) ===================== */
function getNameFromUrl(){
  const url=new URL(window.location.href);
  const name=url.searchParams.get("name");
  return name ? name.trim() : "";
}
function showStartScreen(){
  sidebarEl.style.display="none";
  buttonContainer.style.display="none";
  generateBtn.style.display="none";
  saveButton.style.display="none";
  pauseButton.style.display="none";
  exportQuestionsBtn.style.display="none";

  studentLine.textContent="";
  setLine.textContent="";

  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=null; quizEndTime=null;
  updateTimerDisplay();

  const preset=getNameFromUrl();
  if(preset){
    studentName=preset;
    studentLine.textContent=`Student: ${studentName}`;
    startQuiz(true);
    return;
  }

  quizContent.innerHTML=`
    <p>This quiz has <strong>${TOTAL_QUESTIONS}</strong> questions:</p>
    <ul style="margin:6px 0 10px 18px;">
      <li>2 Easy</li>
      <li>2 Medium</li>
      <li>2 Hard</li>
    </ul>
    <p style="margin-top:10px;">Enter your name to begin:</p>

    <input id="nameInput" type="text"
      style="padding:10px;width:260px;font-size:1.05em;border:1px solid #ccc;border-radius:10px;"
      placeholder="Your name">

    <button id="startButton"
      style="margin-left:10px;background:#4caf50;padding:10px 20px;color:white;border:none;border-radius:8px;">
      Start Quiz
    </button>
  `;
  document.getElementById("startButton").addEventListener("click", ()=>startQuiz(false));
}
function startQuiz(skipReadName){
  if(!skipReadName){
    const nameInput=document.getElementById("nameInput");
    studentName=(nameInput.value || "Student").trim();
  }
  studentLine.textContent=`Student: ${studentName}`;

  quizStartTime=new Date();
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  updateTimerDisplay(); startTimerInterval();

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();

  generateBtn.style.display="inline-block";
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";
  exportQuestionsBtn.style.display="inline-block";
}

/* ===================== Init ===================== */
showStartScreen();
</script>
