<script>
/* ===================== CONFIG ===================== */
const SVG_TITLE = "Classic Geometry Models — Equal-Area";
const LESSON_TITLE = "Classic Geometry Models — Equal-Area Method";
const PART_TITLES = [
  "Part 1 (Easy) — Same base / same height area ideas (2 questions)",
  "Part 2 (Medium) — Two-squares diagram area (2 questions)",
  "Part 3 (Hard) — Trapezoid diagonals & area ratios (2 questions)"
];
const NUM_PARTS = 3;
const QUESTIONS_PER_PART = 2;
const TOTAL_QUESTIONS = NUM_PARTS * QUESTIONS_PER_PART;

/* ===================== Utils ===================== */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function nC2(n){ return n*(n-1)/2; }

function formatMs(ms){
  const totalSec=Math.floor(ms/1000), min=Math.floor(totalSec/60), sec=totalSec%60;
  return `${String(min).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
function escapeXml(s){
  return String(s)
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&apos;");
}
function wrapLines(lines, maxChars=70){
  const out=[];
  function pushWrapped(line){
    const words=String(line).split(/\s+/).filter(Boolean);
    if(words.length===0){ out.push(""); return; }
    let cur="";
    for(const w of words){
      if(w.length>maxChars){
        if(cur){ out.push(cur); cur=""; }
        for(let i=0;i<w.length;i+=maxChars) out.push(w.slice(i,i+maxChars));
        continue;
      }
      if(!cur) cur=w;
      else if((cur+" "+w).length<=maxChars) cur+=" "+w;
      else { out.push(cur); cur=w; }
    }
    if(cur) out.push(cur);
  }
  for(const line of lines) pushWrapped(line);
  return out;
}
function svgDataUri(svg){
  const encoded=encodeURIComponent(svg)
    .replaceAll("%0A","").replaceAll("%20"," ")
    .replaceAll("%3D","=").replaceAll("%3A",":")
    .replaceAll("%2F","/").replaceAll("%2C",",");
  return "data:image/svg+xml;charset=utf-8," + encoded;
}

/* Parse numbers from user input */
function parseNumbersFromInput(str){
  const s=(str||"").trim();
  if(!s) return [];
  const out=[];
  const re=/([+-]?\d+\s*\/\s*[+-]?\d+)|([+-]?\d+(?:\.\d+)?)/g;
  let m;
  while((m=re.exec(s))!==null){
    const token=(m[1]||m[2]||"").replace(/\s+/g,"");
    if(token.includes("/")){
      const [a,b]=token.split("/");
      const n=Number(a), d=Number(b);
      if(Number.isFinite(n)&&Number.isFinite(d)&&d!==0) out.push(n/d);
    }else{
      const v=Number(token);
      if(Number.isFinite(v)) out.push(v);
    }
  }
  return out;
}
function approxEqual(a,b,tol=1e-6){ return Math.abs(a-b)<=tol; }

/* ===================== SVG Question Card ===================== */
function makeSvgQuestionCard(lines, diagramMarkup, titleText=SVG_TITLE){
  const W=980, headerH=72, padX=44, textLineH=36, topY=headerH+48;
  const wrapped=wrapLines(lines, 72);
  const textBlockH = wrapped.length * textLineH;
  const diagramY = topY + textBlockH + 18;
  const diagramH = 360;
  const padBottom = 54;
  const H = diagramY + diagramH + padBottom;

  const textSpans=wrapped.map((t,i)=>{
    const y=topY + i*textLineH;
    return `<text x="${padX}" y="${y}" font-size="28" fill="#1f2a44" font-family="Segoe UI, Arial">${escapeXml(t)}</text>`;
  }).join("");

  const svg=`
  <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#f7fbff"/>
        <stop offset="1" stop-color="#ffffff"/>
      </linearGradient>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/>
      </filter>
      <clipPath id="clipBox">
        <rect x="44" y="0" width="${W-88}" height="${diagramH}" rx="16" ry="16"></rect>
      </clipPath>
    </defs>

    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${H-36}"
          fill="url(#g)" stroke="#dfe7f2" stroke-width="3" filter="url(#shadow)"/>
    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${headerH}"
          fill="#0d47a1" opacity="0.10"/>

    <text x="${padX}" y="56" font-size="28" fill="#0d47a1" font-weight="700"
          font-family="Segoe UI, Arial">${escapeXml(titleText)}</text>

    ${textSpans}

    <g transform="translate(0, ${diagramY})">
      <rect x="44" y="0" width="${W-88}" height="${diagramH}" rx="16" ry="16"
            fill="#ffffff" stroke="#e5e5e5" stroke-width="3"/>
      <g clip-path="url(#clipBox)">
        ${diagramMarkup}
      </g>
    </g>
  </svg>`.trim();

  return svgDataUri(svg);
}

function hintCardSvg(lines, title="Hint"){
  const W=980, headerH=60, padX=44, lineH=34, firstLineY=headerH+44, padBottom=44;
  const wrapped=wrapLines(lines, 84);
  const H=firstLineY + (wrapped.length-1)*lineH + padBottom;

  const textSpans=wrapped.map((t,i)=>{
    const y=firstLineY + i*lineH;
    return `<text x="${padX}" y="${y}" font-size="24" fill="#1f2a44" font-family="Segoe UI, Arial">${escapeXml(t)}</text>`;
  }).join("");

  const svg=`
  <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ffffff"/>
        <stop offset="1" stop-color="#fff7e6"/>
      </linearGradient>
      <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.10"/>
      </filter>
    </defs>

    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${H-36}"
          fill="url(#bg)" stroke="#ffe0b2" stroke-width="3" filter="url(#shadow2)"/>

    <text x="${padX}" y="52" font-size="26" fill="#8d6e63" font-weight="800"
          font-family="Segoe UI, Arial">${escapeXml(title)}</text>

    ${textSpans}
  </svg>`.trim();

  return svgDataUri(svg);
}

/* ===================== Geometry helper (line intersection) ===================== */
function intersectLines(p1,p2,p3,p4){
  const x1=p1.x, y1=p1.y, x2=p2.x, y2=p2.y;
  const x3=p3.x, y3=p3.y, x4=p4.x, y4=p4.y;
  const den=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);
  if(Math.abs(den)<1e-9) return {x:(x2+x3)/2, y:(y2+y3)/2};
  const px=((x1*y2-y1*x2)*(x3-x4)-(x1-x2)*(x3*y4-y3*x4))/den;
  const py=((x1*y2-y1*x2)*(y3-y4)-(y1-y2)*(x3*y4-y3*x4))/den;
  return {x:px, y:py};
}

/* ===================== Diagram builders ===================== */
function diagramTwoTriangles(baseVal, heightVal){
  const topY=95, botY=275;
  const xL=180, xR=820;

  // two triangles placed left & right
  const triW=260;
  const gap=120;

  const bY=botY;
  const tY=topY;

  const leftBaseX=xL+40;
  const leftTopX=leftBaseX+triW*0.72;

  const rightBaseX=leftBaseX+triW+gap;
  const rightTopX=rightBaseX+triW*0.32;

  const styleText = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;

  let s=``;

  // parallel lines
  s+=`<line x1="${xL}" y1="${topY}" x2="${xR}" y2="${topY}" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${xL}" y1="${botY}" x2="${xR}" y2="${botY}" stroke="#1f2a44" stroke-width="4"/>`;

  // left triangle
  const L1={x:leftBaseX, y:bY};
  const L2={x:leftBaseX+triW, y:bY};
  const L3={x:leftTopX, y:tY};
  s+=`<polygon points="${L1.x},${L1.y} ${L2.x},${L2.y} ${L3.x},${L3.y}" fill="#e8f0fe" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<text x="${(L1.x+L2.x)/2}" y="${bY-18}" text-anchor="middle" font-size="24" ${styleText}>base = ${baseVal}</text>`;
  s+=`<text x="${L3.x-24}" y="${(tY+bY)/2}" text-anchor="end" font-size="24" ${styleText}>height = ${heightVal}</text>`;
  // height arrow
  const ax=L3.x-10;
  s+=`<line x1="${ax}" y1="${tY}" x2="${ax}" y2="${bY}" stroke="#455a64" stroke-width="3"/>`;
  s+=`<polygon points="${ax-8},${tY+12} ${ax+8},${tY+12} ${ax},${tY}" fill="#455a64"/>`;
  s+=`<polygon points="${ax-8},${bY-12} ${ax+8},${bY-12} ${ax},${bY}" fill="#455a64"/>`;
  s+=`<text x="${(L1.x+L2.x)/2}" y="${(tY+bY)/2}" text-anchor="middle" font-size="28" ${styleText}>①</text>`;

  // right triangle
  const R1={x:rightBaseX, y:bY};
  const R2={x:rightBaseX+triW, y:bY};
  const R3={x:rightTopX, y:tY};
  s+=`<polygon points="${R1.x},${R1.y} ${R2.x},${R2.y} ${R3.x},${R3.y}" fill="#e8f0fe" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<text x="${(R1.x+R2.x)/2}" y="${bY-18}" text-anchor="middle" font-size="24" ${styleText}>base = ${baseVal}</text>`;
  s+=`<text x="${(R1.x+R2.x)/2}" y="${(tY+bY)/2}" text-anchor="middle" font-size="28" ${styleText}>②</text>`;

  return `<g>${s}</g>`;
}

function diagramTrapezoidMidpoint(topBase, botBase, heightVal, shade=true){
  const yTop=110, yBot=290;
  const cx=490;
  const botLen=560;
  const topLen=botLen*(topBase/botBase);

  const xB1=cx-botLen/2, xB2=cx+botLen/2;
  const xT1=cx-topLen/2, xT2=cx+topLen/2;

  const A={x:xT1,y:yTop}, D={x:xT2,y:yTop}, B={x:xB1,y:yBot}, C={x:xB2,y:yBot};
  const E={x:(B.x+C.x)/2, y:yBot};

  const styleText = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;

  let s=``;

  // trapezoid outline
  s+=`<polygon points="${A.x},${A.y} ${D.x},${D.y} ${C.x},${C.y} ${B.x},${B.y}" fill="none" stroke="#1f2a44" stroke-width="4"/>`;

  // segments to midpoint
  s+=`<line x1="${A.x}" y1="${A.y}" x2="${E.x}" y2="${E.y}" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${D.x}" y1="${D.y}" x2="${E.x}" y2="${E.y}" stroke="#1f2a44" stroke-width="4"/>`;

  // shade triangles ABE and DCE
  if(shade){
    s+=`<polygon points="${A.x},${A.y} ${B.x},${B.y} ${E.x},${E.y}" fill="rgba(76,175,80,0.18)" stroke="none"/>`;
    s+=`<polygon points="${D.x},${D.y} ${C.x},${C.y} ${E.x},${E.y}" fill="rgba(76,175,80,0.18)" stroke="none"/>`;
  }

  // height arrow
  const ax=xB1-40;
  s+=`<line x1="${ax}" y1="${yTop}" x2="${ax}" y2="${yBot}" stroke="#455a64" stroke-width="3"/>`;
  s+=`<polygon points="${ax-8},${yTop+12} ${ax+8},${yTop+12} ${ax},${yTop}" fill="#455a64"/>`;
  s+=`<polygon points="${ax-8},${yBot-12} ${ax+8},${yBot-12} ${ax},${yBot}" fill="#455a64"/>`;
  s+=`<text x="${ax-10}" y="${(yTop+yBot)/2}" text-anchor="end" font-size="24" ${styleText}>h = ${heightVal}</text>`;

  // base labels
  s+=`<text x="${(A.x+D.x)/2}" y="${yTop-22}" text-anchor="middle" font-size="24" ${styleText}>AD = ${topBase}</text>`;
  s+=`<text x="${(B.x+C.x)/2}" y="${yBot+52}" text-anchor="middle" font-size="24" ${styleText}>BC = ${botBase}</text>`;

  // point labels
  const label=(p,txt,dx,dy)=>`<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${txt}</text>`;
  s+=label(A,"A",-18,-14);
  s+=label(D,"D",10,-14);
  s+=label(B,"B",-18,32);
  s+=label(C,"C",10,32);
  s+=label(E,"E",-10,32);

  return `<g>${s}</g>`;
}

function diagramTwoSquaresTriangleBDF(sideVal){
  const s=200;
  const x0=220, y0=285; // bottom of squares
  const styleText = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;

  // left square ABCD: B(0,0) C(s,0) D(s,s) A(0,s)
  const B={x:x0,y:y0}, C={x:x0+s,y:y0}, D={x:x0+s,y:y0-s}, A={x:x0,y:y0-s};
  const E={x:x0+2*s,y:y0}, F={x:x0+2*s,y:y0-s}, G={x:x0+s,y:y0-s};

  let g=``;
  // squares
  g+=`<rect x="${x0}" y="${y0-s}" width="${s}" height="${s}" fill="none" stroke="#1f2a44" stroke-width="4"/>`;
  g+=`<rect x="${x0+s}" y="${y0-s}" width="${s}" height="${s}" fill="none" stroke="#1f2a44" stroke-width="4"/>`;

  // triangle BDF shaded
  g+=`<polygon points="${B.x},${B.y} ${D.x},${D.y} ${F.x},${F.y}"
       fill="rgba(33,150,243,0.18)" stroke="#1f2a44" stroke-width="4"/>`;

  // key lines
  g+=`<line x1="${D.x}" y1="${D.y}" x2="${F.x}" y2="${F.y}" stroke="#1f2a44" stroke-width="4"/>`;
  g+=`<line x1="${B.x}" y1="${B.y}" x2="${F.x}" y2="${F.y}" stroke="#1f2a44" stroke-width="4"/>`;

  // labels
  const t=(p,txt,dx,dy)=>`<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${txt}</text>`;
  g+=t(A,"A",-18,-10);
  g+=t(B,"B",-18,30);
  g+=t(C,"C",10,30);
  g+=t(D,"D",10,-10);
  g+=t(E,"E",10,30);
  g+=t(F,"F",10,-10);
  g+=t(G,"G",-18,-10);

  // side label
  g+=`<text x="${x0+s/2}" y="${y0+58}" text-anchor="middle" font-size="24" ${styleText}>side = ${sideVal}</text>`;

  return `<g>${g}</g>`;
}

function diagramTwoSquaresTriangleDHF(sideVal){
  const s=200;
  const x0=220, y0=285;
  const styleText = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;

  const B={x:x0,y:y0}, C={x:x0+s,y:y0}, D={x:x0+s,y:y0-s}, A={x:x0,y:y0-s};
  const E={x:x0+2*s,y:y0}, F={x:x0+2*s,y:y0-s}, G={x:x0+s,y:y0-s};
  const H={x:x0+s, y:y0-s/2}; // intersection of BF with CD

  let g=``;
  g+=`<rect x="${x0}" y="${y0-s}" width="${s}" height="${s}" fill="none" stroke="#1f2a44" stroke-width="4"/>`;
  g+=`<rect x="${x0+s}" y="${y0-s}" width="${s}" height="${s}" fill="none" stroke="#1f2a44" stroke-width="4"/>`;

  // BF and CD
  g+=`<line x1="${B.x}" y1="${B.y}" x2="${F.x}" y2="${F.y}" stroke="#1f2a44" stroke-width="4"/>`;
  g+=`<line x1="${C.x}" y1="${C.y}" x2="${D.x}" y2="${D.y}" stroke="#1f2a44" stroke-width="4"/>`;

  // shade triangle D H F
  g+=`<polygon points="${D.x},${D.y} ${H.x},${H.y} ${F.x},${F.y}"
       fill="rgba(76,175,80,0.18)" stroke="#1f2a44" stroke-width="4"/>`;

  // mark H
  g+=`<circle cx="${H.x}" cy="${H.y}" r="6" fill="#1f2a44"/>`;

  const t=(p,txt,dx,dy)=>`<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${txt}</text>`;
  g+=t(A,"A",-18,-10);
  g+=t(B,"B",-18,30);
  g+=t(C,"C",10,30);
  g+=t(D,"D",10,-10);
  g+=t(E,"E",10,30);
  g+=t(F,"F",10,-10);
  g+=t(G,"G",-18,-10);
  g+=t(H,"H",-24,10);

  g+=`<text x="${x0+s/2}" y="${y0+58}" text-anchor="middle" font-size="24" ${styleText}>side = ${sideVal}</text>`;

  return `<g>${g}</g>`;
}

function diagramTrapezoidDiagonals(topBase, botBase, shadeWhich){
  const yTop=110, yBot=290;
  const cx=490;
  const botLen=560;
  const topLen=botLen*(topBase/botBase);

  const xB1=cx-botLen/2, xB2=cx+botLen/2;
  const xT1=cx-topLen/2, xT2=cx+topLen/2;

  const A={x:xT1,y:yTop}, D={x:xT2,y:yTop}, B={x:xB1,y:yBot}, C={x:xB2,y:yBot};
  const P=intersectLines(A,C,B,D);

  const styleText = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;

  let s=``;
  s+=`<polygon points="${A.x},${A.y} ${D.x},${D.y} ${C.x},${C.y} ${B.x},${B.y}" fill="none" stroke="#1f2a44" stroke-width="4"/>`;

  // diagonals
  s+=`<line x1="${A.x}" y1="${A.y}" x2="${C.x}" y2="${C.y}" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${B.x}" y1="${B.y}" x2="${D.x}" y2="${D.y}" stroke="#1f2a44" stroke-width="4"/>`;

  // shade
  if(shadeWhich==="APD"){
    s+=`<polygon points="${A.x},${A.y} ${P.x},${P.y} ${D.x},${D.y}" fill="rgba(33,150,243,0.18)" stroke="none"/>`;
  }else if(shadeWhich==="APB"){
    s+=`<polygon points="${A.x},${A.y} ${P.x},${P.y} ${B.x},${B.y}" fill="rgba(76,175,80,0.18)" stroke="none"/>`;
  }else if(shadeWhich==="BPC"){
    s+=`<polygon points="${B.x},${B.y} ${P.x},${P.y} ${C.x},${C.y}" fill="rgba(33,150,243,0.18)" stroke="none"/>`;
  }

  // base labels
  s+=`<text x="${(A.x+D.x)/2}" y="${yTop-22}" text-anchor="middle" font-size="24" ${styleText}>AD = ${topBase}</text>`;
  s+=`<text x="${(B.x+C.x)/2}" y="${yBot+52}" text-anchor="middle" font-size="24" ${styleText}>BC = ${botBase}</text>`;

  // point labels
  const label=(p,txt,dx,dy)=>`<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${txt}</text>`;
  s+=label(A,"A",-18,-14);
  s+=label(D,"D",10,-14);
  s+=label(B,"B",-18,32);
  s+=label(C,"C",10,32);
  s+=`<circle cx="${P.x}" cy="${P.y}" r="6" fill="#1f2a44"/>`;
  s+=label(P,"P",10,8);

  return `<g>${s}</g>`;
}

/* ===================== Question Generators (exactly 6) ===================== */
/* Answer format: type:"single", values:[number], label:"..." */

function genEasyTrianglesSameHeight(){
  // ensure integer area
  const baseVal = randInt(3,8)*2;         // even
  const heightVal = randInt(6,12);
  const area = (baseVal*heightVal)/2;

  const lines = [
    "(Easy) Two triangles between the same parallel lines",
    `Each triangle has base ${baseVal} cm and height ${heightVal} cm.`,
    "Find the area of each triangle (① and ②).",
    "(Enter one integer, in cm².)"
  ];

  const hint = hintCardSvg([
    "Triangle area = (base × height) ÷ 2.",
    "Even if the triangle is slanted, as long as base and height are the same, the area is the same."
  ], "Hint (Triangle area)");

  return {
    img: makeSvgQuestionCard(lines, diagramTwoTriangles(baseVal, heightVal)),
    diagram: hint,
    hintText: "Use area = (base × height) ÷ 2. Same base & height ⇒ same area.",
    answer: { type:"single", values:[area], label:`${area}` }
  };
}

function genEasyTrapezoidShadedMidpoint(){
  const topBase = randInt(4,8);
  const botBase = topBase*2;              // keeps numbers nice
  const heightVal = randInt(4,9);

  // E is midpoint of BC, so BE = EC = botBase/2
  // shaded = area(ABE) + area(DCE) = (BE*h)/2 + (EC*h)/2 = (botBase*h)/2
  const shaded = (botBase*heightVal)/2;   // integer because botBase even

  const lines = [
    "(Easy) Trapezoid shaded area (midpoint model)",
    `In trapezoid ABCD, AD ∥ BC, AD = ${topBase} cm, BC = ${botBase} cm, height = ${heightVal} cm.`,
    "Point E is the midpoint of BC. Segments AE and DE are drawn.",
    "The shaded parts are triangles ABE and DCE. Find the total shaded area.",
    "(Enter one integer, in cm².)"
  ];

  const hint = hintCardSvg([
    "A and D lie on the top base, so their perpendicular distance to BC equals the trapezoid height.",
    "Area of triangle ABE = (BE × height) ÷ 2, and area of triangle DCE = (CE × height) ÷ 2.",
    "Since E is the midpoint, BE = CE = BC ÷ 2."
  ], "Hint (Same height to BC)");

  return {
    img: makeSvgQuestionCard(lines, diagramTrapezoidMidpoint(topBase, botBase, heightVal, true)),
    diagram: hint,
    hintText: "Both triangles use the same height to BC. With E midpoint, BE = CE = BC/2.",
    answer: { type:"single", values:[shaded], label:`${shaded}` }
  };
}

function genMediumTwoSquaresBDF(){
  const sideVal = randInt(3,8)*2;         // even to keep /2 integer
  const area = (sideVal*sideVal)/2;

  const lines = [
    "(Medium) Two squares: area of a triangle",
    `Squares ABCD and CEFG have the same side length ${sideVal} cm and are placed side-by-side.`,
    "Segments BD, DF and BF form triangle BDF (shaded).",
    "Find the area of triangle BDF.",
    "(Enter one integer, in cm².)"
  ];

  const hint = hintCardSvg([
    "Use coordinates or observe: DF is a horizontal segment of length equal to one side.",
    "The vertical distance from B to line DF equals one side length.",
    "Area = (base × height) ÷ 2."
  ], "Hint (Base × height)");

  return {
    img: makeSvgQuestionCard(lines, diagramTwoSquaresTriangleBDF(sideVal)),
    diagram: hint,
    hintText: "Treat DF as the base (one side long), and the height from B to DF is also one side.",
    answer: { type:"single", values:[area], label:`${area}` }
  };
}

function genMediumTwoSquaresDHF(){
  const sideVal = randInt(3,8)*2;         // even
  const area = (sideVal*sideVal)/4;       // integer for even side

  const lines = [
    "(Medium) Two squares: intersection point H",
    `Two equal squares ABCD and CEFG have side length ${sideVal} cm and are placed side-by-side.`,
    "Draw BF and segment CD. They intersect at H. The shaded triangle is △DHF.",
    "Find the area of triangle DHF.",
    "(Enter one integer, in cm².)"
  ];

  const hint = hintCardSvg([
    "In this layout, H lies halfway up the vertical segment CD.",
    "So DH = (side) ÷ 2, and DF = side.",
    "Area △DHF = (DF × DH) ÷ 2."
  ], "Hint (Half-height)");

  return {
    img: makeSvgQuestionCard(lines, diagramTwoSquaresTriangleDHF(sideVal)),
    diagram: hint,
    hintText: "H is halfway up CD, so DH = side/2 and DF = side. Area = DF×DH/2.",
    answer: { type:"single", values:[area], label:`${area}` }
  };
}

function genHardTrapezoidDiagonalRatio(){
  const topBase = randInt(4,8);
  const m = pick([2,3]);                  // bottom is multiple of top
  const botBase = topBase*m;

  const areaAPD = randInt(6,20);
  const ratio = (botBase*botBase)/(topBase*topBase); // = m^2
  const areaBPC = areaAPD * ratio;

  const lines = [
    "(Hard) Trapezoid diagonals: area ratio (squares of bases)",
    `In trapezoid ABCD, AD ∥ BC, AD = ${topBase} cm and BC = ${botBase} cm.`,
    "Diagonals AC and BD intersect at point P.",
    `The area of triangle APD is ${areaAPD} cm².`,
    "Find the area of triangle BPC.",
    "(Enter one integer, in cm².)"
  ];

  const hint = hintCardSvg([
    "A key fact for trapezoids:",
    "Areas of triangles APD and BPC are in the ratio AD² : BC².",
    "So area(BPC) = area(APD) × (BC² / AD²)."
  ], "Hint (AD² : BC²)");

  return {
    img: makeSvgQuestionCard(lines, diagramTrapezoidDiagonals(topBase, botBase, "APD")),
    diagram: hint,
    hintText: "Use area(APD) : area(BPC) = AD² : BC² ⇒ area(BPC) = area(APD) × (BC²/AD²).",
    answer: { type:"single", values:[areaBPC], label:`${areaBPC}` }
  };
}

function genHardTrapezoidTotalFromAPB(){
  const topBase = randInt(4,9);
  const botBase = topBase*2;              // makes factor 9/2
  const areaAPB = randInt(4,15)*2;        // even, so total is integer
  const totalArea = areaAPB * ((topBase+botBase)*(topBase+botBase)) / (topBase*botBase);

  const lines = [
    "(Hard) Trapezoid total area from one triangle",
    `In trapezoid ABCD, AD ∥ BC, AD = ${topBase} cm and BC = ${botBase} cm.`,
    "Diagonals AC and BD intersect at P.",
    `The area of triangle APB is ${areaAPB} cm².`,
    "Find the area of trapezoid ABCD.",
    "(Enter one integer, in cm².)"
  ];

  const hint = hintCardSvg([
    "In a trapezoid, area(APB) = (AD × BC × h) / (2(AD+BC)).",
    "Total trapezoid area = (AD+BC)h / 2.",
    "Eliminate h to get:",
    "Total area = area(APB) × (AD+BC)² / (AD×BC)."
  ], "Hint (Eliminate the height)");

  return {
    img: makeSvgQuestionCard(lines, diagramTrapezoidDiagonals(topBase, botBase, "APB")),
    diagram: hint,
    hintText: "Total area = area(APB) × (AD+BC)² / (AD×BC).",
    answer: { type:"single", values:[totalArea], label:`${totalArea}` }
  };
}

/* ===================== Build exactly 6 questions ===================== */
function buildSixQuestions(){
  return [
    genEasyTrianglesSameHeight(),
    genEasyTrapezoidShadedMidpoint(),
    genMediumTwoSquaresBDF(),
    genMediumTwoSquaresDHF(),
    genHardTrapezoidDiagonalRatio(),
    genHardTrapezoidTotalFromAPB()
  ];
}

/* ===================== State ===================== */
let questions=[];
let currentQuestionIndex=0;
let studentName="Student";
let quizStartTime=null;
let quizEndTime=null;
let quizSubmitted=false;

let timerInterval=null;
let elapsedMs=0;
let isPaused=false;
let firstAttemptMs=null;

let setCounter=0;
let lastSignature="";

/* DOM */
const quizContent=document.getElementById("quizContent");
const sidebarEl=document.getElementById("sidebar");

const buttonContainer=document.getElementById("navButtons");
const backButton=document.getElementById("backButton");
const nextButton=document.getElementById("nextButton");
const submitButton=document.getElementById("submitButton");
const checkButton=document.getElementById("checkButton");
const saveButton=document.getElementById("saveButton");

const generateBtn=document.getElementById("generateButton");
const pauseButton=document.getElementById("pauseButton");
const exportQuestionsBtn=document.getElementById("exportQuestionsBtn");

const timerDisplay=document.getElementById("timerDisplay");
const studentLine=document.getElementById("studentLine");
const setLine=document.getElementById("setLine");

/* ===================== Timer ===================== */
function updateTimerDisplay(){
  let totalMs=elapsedMs;
  if(!isPaused && quizStartTime) totalMs+=(new Date()-quizStartTime);
  let text=`Time: ${formatMs(totalMs)}`;
  if(firstAttemptMs!==null) text+=` (First: ${formatMs(firstAttemptMs)})`;
  timerDisplay.textContent=text;
}
function startTimerInterval(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(updateTimerDisplay, 1000);
}
function pauseTimer(){
  if(isPaused || !quizStartTime) return;
  const now=new Date();
  elapsedMs+=now-quizStartTime;
  isPaused=true;
  quizStartTime=null;
  updateTimerDisplay();
}
function resumeTimer(){
  if(!isPaused) return;
  isPaused=false;
  quizStartTime=new Date();
  updateTimerDisplay();
}

/* ===================== Grading ===================== */
function gradeAnswer(userText, answer){
  const nums = parseNumbersFromInput(userText);
  if(answer.type==="single"){
    if(nums.length<1) return false;
    return approxEqual(nums[0], answer.values[0]);
  }
  return false;
}

/* ===================== Generate Quiz ===================== */
function signatureOf(built){
  return built.map(q=>q.answer.label).join("|");
}
function generateQuiz(){
  questions=[];
  quizSubmitted=false;

  let tries=0;
  let built=null;

  while(tries<30){
    built = buildSixQuestions();
    const sig = signatureOf(built);
    if(sig !== lastSignature){
      lastSignature = sig;
      break;
    }
    tries++;
  }

  setCounter++;
  setLine.textContent = `Set: ${setCounter}`;

  for(let i=0;i<built.length;i++){
    const partIndex=Math.floor(i/QUESTIONS_PER_PART);
    const indexInPart=i%QUESTIONS_PER_PART;
    questions.push({
      partIndex,
      indexInPart,
      img: built[i].img,
      diagram: built[i].diagram || "",
      hint: built[i].hintText || "Use equal-area ideas and base–height reasoning.",
      answer: built[i].answer,
      userValue:"",
      isCorrect:false
    });
  }
}

/* ===================== Sidebar ===================== */
function renderSidebar(){
  sidebarEl.style.display="block";
  sidebarEl.innerHTML=`<h4>Questions</h4><ul id="qList"></ul>`;
  const ul=document.getElementById("qList");
  for(let i=0;i<TOTAL_QUESTIONS;i++){
    const q=questions[i];
    const li=document.createElement("li");
    const label=["Easy","Medium","Hard"][q.partIndex]+(q.indexInPart+1);
    li.textContent=`Q${i+1} (${label})`;
    li.dataset.index=i;
    li.addEventListener("click",()=>{
      saveCurrentInput();
      currentQuestionIndex=i;
      renderQuestion();
    });
    ul.appendChild(li);
  }
  updateSidebarStatus();
}
function updateSidebarStatus(){
  const items=document.querySelectorAll("#qList li");
  items.forEach(li=>{
    const idx=Number(li.dataset.index);
    const q=questions[idx];
    li.classList.remove("active","answered","correct","incorrect");

    if(!quizSubmitted){
      li.classList.toggle("active", idx===currentQuestionIndex);
      if((q.userValue||"").trim()!=="") li.classList.add("answered");
    }else{
      if((q.userValue||"").trim()!==""){
        li.classList.add(q.isCorrect ? "correct" : "incorrect");
      }
    }
  });
}

/* ===================== Helpers ===================== */
function saveCurrentInput(){
  const input=document.getElementById("answerInput");
  if(input){
    questions[currentQuestionIndex].userValue=input.value.trim();
    if(quizSubmitted){
      const q=questions[currentQuestionIndex];
      q.isCorrect = gradeAnswer(q.userValue, q.answer);
      updateSidebarStatus();
    }
  }
}
function mountNavButtonsInto(slotId){
  const slot=document.getElementById(slotId);
  if(!slot) return;
  slot.appendChild(buttonContainer);
  buttonContainer.style.display="flex";
}

/* ===================== Render Question ===================== */
function renderQuestion(){
  const q=questions[currentQuestionIndex];
  const levelLabel=["Easy","Medium","Hard"][q.partIndex];
  const fullLabel=`${levelLabel} — Question ${q.indexInPart+1}`;

  const hintDiagramHtml = q.diagram
    ? `<div class="hint-diagram-wrap"><img src="${q.diagram}" alt="Hint diagram"></div>`
    : "";

  const placeholder = "e.g., 16";

  quizContent.innerHTML=`
    <p class="question-text">Question ${currentQuestionIndex+1} of ${TOTAL_QUESTIONS}</p>
    <div class="part-title">${escapeXml(PART_TITLES[q.partIndex])}</div>

    <div class="single-question">
      <div style="font-weight:800;margin-bottom:8px;">${escapeXml(fullLabel)}</div>

      <div class="img-wrap">
        <img class="q-img" src="${q.img}" alt="Question image">
      </div>

      <div class="answer-row">
        <div style="font-weight:700;">Answer:</div>
        <input id="answerInput" class="answer-box" type="text"
               placeholder="${escapeXml(placeholder)}"
               value="${escapeXml(q.userValue||"")}">
      </div>

      <div id="checkFeedback" style="display:none;"></div>

      <div class="hint-row">
        <button id="hintBtn" class="hint-btn">Hint</button>
      </div>

      <div id="hintBox" class="hint">
        <div>${escapeXml(q.hint)}</div>
        ${hintDiagramHtml}
      </div>
    </div>

    <div id="navSlot"></div>
  `;

  mountNavButtonsInto("navSlot");

  const hintBtn=document.getElementById("hintBtn");
  const hintBox=document.getElementById("hintBox");
  hintBtn.addEventListener("click", ()=>{
    const shown=hintBox.style.display==="block";
    hintBox.style.display = shown ? "none" : "block";
    hintBtn.textContent = shown ? "Hint" : "Hide Hint";
  });

  backButton.style.display="inline-block";
  backButton.style.visibility=(currentQuestionIndex===0)?"hidden":"visible";

  const isLast=(currentQuestionIndex===TOTAL_QUESTIONS-1);
  nextButton.style.display=isLast?"none":"inline-block";
  submitButton.style.display=isLast?"inline-block":"none";

  saveButton.style.display=quizSubmitted?"inline-block":"none";
  checkButton.style.display=(quizSubmitted && !q.isCorrect)?"inline-block":"none";

  updateSidebarStatus();
}

/* ===================== Results + Submit ===================== */
function calculateAndShowResults(){
  saveCurrentInput();

  const now=new Date();
  let attemptMs=elapsedMs;
  if(!isPaused && quizStartTime) attemptMs+=now-quizStartTime;
  if(firstAttemptMs===null) firstAttemptMs=attemptMs;

  const attemptStartTime=quizStartTime || now;
  quizEndTime=now;
  quizSubmitted=true;

  let correctCount=0;
  questions.forEach((q)=>{
    q.isCorrect = gradeAnswer(q.userValue, q.answer);
    if(q.isCorrect) correctCount++;
  });

  updateSidebarStatus();

  let html=`
    <h3>Results for ${escapeXml(studentName)}</h3>
    <p>Set: <strong>${setCounter}</strong></p>
    <p>Score: <strong>${correctCount} / ${TOTAL_QUESTIONS}</strong></p>
    <p>Start time: <strong>${attemptStartTime.toLocaleTimeString()}</strong></p>
    <p>Submit time: <strong>${quizEndTime.toLocaleTimeString()}</strong></p>
    <p>Time taken (this attempt): <strong>${formatMs(attemptMs)}</strong></p>
    <p>First attempt time: <strong>${formatMs(firstAttemptMs)}</strong></p>

    <table class="review-table">
      <tr>
        <th>#</th><th>Part</th><th>Image</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th>
      </tr>
  `;

  questions.forEach((q,i)=>{
    const partLbl=["Easy","Medium","Hard"][q.partIndex]+(q.indexInPart+1);
    const ua=(q.userValue||"").trim();
    const correctText = q.answer.label;

    html+=`
      <tr class="${q.isCorrect ? "correct-answer":"incorrect-answer"}">
        <td>${i+1}</td>
        <td>${escapeXml(partLbl)}</td>
        <td><img class="thumb" src="${q.img}" alt="Q${i+1}"></td>
        <td>${ua==="" ? "—" : escapeXml(ua)}</td>
        <td><strong>${escapeXml(correctText)}</strong></td>
        <td>${ua==="" ? "Not answered" : (q.isCorrect ? "Correct":"Incorrect")}</td>
      </tr>
    `;
  });

  html+=`</table><div id="navSlot"></div>`;
  quizContent.innerHTML=html;

  mountNavButtonsInto("navSlot");

  backButton.style.display="none";
  nextButton.style.display="none";
  submitButton.style.display="none";
  checkButton.style.display="none";
  saveButton.style.display="inline-block";

  // reset timer for review attempt
  elapsedMs=0; isPaused=false; quizStartTime=new Date();
  pauseButton.textContent="Pause";
  startTimerInterval();
  updateTimerDisplay();
}

/* ===================== Buttons ===================== */
nextButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex<TOTAL_QUESTIONS-1){
    currentQuestionIndex++;
    renderQuestion();
  }
});
backButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex>0){
    currentQuestionIndex--;
    renderQuestion();
  }
});
submitButton.addEventListener("click", ()=>{
  if(currentQuestionIndex===TOTAL_QUESTIONS-1){
    calculateAndShowResults();
  }
});
checkButton.addEventListener("click", ()=>{
  saveCurrentInput();
  const q=questions[currentQuestionIndex];
  if(!quizSubmitted) return;

  q.isCorrect = gradeAnswer(q.userValue, q.answer);
  updateSidebarStatus();

  const box=document.getElementById("checkFeedback");
  if(!box) return;

  box.className="check-feedback";
  box.style.display="block";

  if(q.isCorrect){
    box.innerHTML=`✅ Correct!`;
    checkButton.style.display="none";
  }else{
    box.innerHTML=`❌ Incorrect. Correct answer: <strong>${escapeXml(q.answer.label)}</strong>`;
    checkButton.style.display="inline-block";
  }
});

/* Save TXT */
function formatDateForFilename(date){
  if(!date) return "no_time";
  const pad=n=>String(n).padStart(2,"0");
  return date.getFullYear()+pad(date.getMonth()+1)+pad(date.getDate())+"_"+pad(date.getHours())+pad(date.getMinutes())+pad(date.getSeconds());
}
function saveCurrentResultAsTxt(){
  saveCurrentInput();

  let correctCount=0;
  questions.forEach(q=>{ if(q.isCorrect) correctCount++; });

  const lines=[];
  lines.push("Classic Geometry Models — Equal-Area — Current Result");
  lines.push("Student: "+studentName);
  lines.push("Set: "+setCounter);
  if(quizStartTime) lines.push("Start time: "+quizStartTime.toLocaleString());
  if(quizEndTime) lines.push("Last submit time: "+quizEndTime.toLocaleString());
  lines.push("Score: "+correctCount+" / "+TOTAL_QUESTIONS);
  if(firstAttemptMs!==null) lines.push("First attempt time: "+formatMs(firstAttemptMs));
  lines.push("");

  questions.forEach((q,i)=>{
    const partLbl=["Easy","Medium","Hard"][q.partIndex]+(q.indexInPart+1);
    const userAns=(q.userValue||"").trim()==="" ? "Not answered" : q.userValue;
    const resultText=(q.userValue||"").trim()==="" ? "Not answered" : (q.isCorrect?"Correct":"Incorrect");
    lines.push(`Q${i+1} (${partLbl})`);
    lines.push("Your answer: "+userAns);
    lines.push("Correct answer: "+q.answer.label);
    lines.push("Result: "+resultText);
    lines.push("");
  });

  const content=lines.join("\n");
  const blob=new Blob([content],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const safeName=studentName.replace(/[^a-z0-9_\-]/gi,"_")||"Student";
  const ts=formatDateForFilename(new Date());
  a.href=url;
  a.download=`EqualArea_${safeName}_Set${setCounter}_${ts}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
saveButton.addEventListener("click", saveCurrentResultAsTxt);

/* Pause/Resume (no pop-up) */
pauseButton.addEventListener("click", ()=>{
  if(!quizStartTime && elapsedMs===0 && !quizSubmitted) return;
  if(isPaused){ resumeTimer(); pauseButton.textContent="Pause"; }
  else { pauseTimer(); pauseButton.textContent="Resume"; }
});

/* Generate new set */
generateBtn.addEventListener("click", ()=>{
  if(!quizSubmitted && !confirm("Generate a new random set? All answers will be lost.")) return;

  if(timerInterval) clearInterval(timerInterval);
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=new Date(); quizEndTime=null;
  updateTimerDisplay(); startTimerInterval();
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();
});

/* ===================== Export Questions PDF (2 per page, DYAA header) ===================== */
function waitForImages(container){
  const imgs = Array.from(container.querySelectorAll("img"));
  return Promise.all(imgs.map(img => {
    if(img.complete && img.naturalWidth > 0) return Promise.resolve();
    return new Promise(resolve => {
      img.onload = () => resolve();
      img.onerror = () => resolve();
    });
  }));
}
exportQuestionsBtn.addEventListener("click", async ()=>{
  if(!questions || questions.length===0){
    alert("Please start a quiz first.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  const wrapper=document.createElement("div");
  wrapper.style.position="fixed";
  wrapper.style.left="-9999px";
  wrapper.style.top="0";
  wrapper.style.width="800px";
  wrapper.style.background="#ffffff";
  document.body.appendChild(wrapper);

  try{
    let groupDiv=null;

    questions.forEach((q, idx)=>{
      if(idx%2===0){
        groupDiv=document.createElement("div");
        groupDiv.style.padding="20px";
        groupDiv.style.marginBottom="20px";
        groupDiv.style.boxSizing="border-box";

        const header=document.createElement("div");
        header.innerHTML=`
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <div style="width:24px;height:24px;background:#0d47a1;border-radius:6px;position:relative;">
              <div style="position:absolute;width:12px;height:5px;background:#ff9800;top:-4px;left:12px;border-radius:3px;"></div>
            </div>
            <div style="display:flex;flex-direction:column;line-height:1.1;">
              <div style="font-weight:900;letter-spacing:1px;color:#ff9800;font-size:14px;">DYAA</div>
              <div style="font-size:11px;color:#0d47a1;font-weight:700;">EDUCATION</div>
            </div>
          </div>
          <hr style="border:none;border-top:1px solid #e0e0e0;margin:0 0 12px 0;">
          <div style="font-weight:800;color:#1f2a44;margin:0 0 4px 0;">${LESSON_TITLE}</div>
          <div style="color:#546e7a;font-weight:800;margin:0 0 10px 0;">Questions (Set ${setCounter})</div>
        `;
        groupDiv.appendChild(header);
        wrapper.appendChild(groupDiv);
      }

      const qDiv=document.createElement("div");
      qDiv.style.marginBottom="18px";
      qDiv.innerHTML=`
        <div style="font-weight:700;margin:4px 0 6px 0;">Q${idx+1}</div>
        <div style="border-radius:12px;border:1px solid #e5e5e5;padding:12px;">
          <img src="${q.img}" style="width:100%;height:auto;border-radius:10px;" />
        </div>
      `;
      groupDiv.appendChild(qDiv);
    });

    const groups=Array.from(wrapper.children);

    for(let i=0;i<groups.length;i++){
      await waitForImages(groups[i]);

      const canvas = await html2canvas(groups[i], { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
      const imgData = canvas.toDataURL("image/png");

      const imgWidth = pageWidth - 20;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;

      if(i>0) pdf.addPage();
      pdf.addImage(imgData, "PNG", 10, 10, imgWidth, Math.min(imgHeight, pageHeight - 20));
    }

    const safeName=(studentName||"Student").replace(/[^a-z0-9_\-]/gi,"_") || "Student";
    const ts=formatDateForFilename(new Date());
    pdf.save(`EqualArea_Questions_${safeName}_Set${setCounter}_${ts}.pdf`);
  } finally {
    document.body.removeChild(wrapper);
  }
});

/* ===================== Start Screen (+ optional ?name=Tiger) ===================== */
function getNameFromUrl(){
  const url=new URL(window.location.href);
  const name=url.searchParams.get("name");
  return name ? name.trim() : "";
}
function showStartScreen(){
  sidebarEl.style.display="none";
  buttonContainer.style.display="none";
  generateBtn.style.display="none";
  saveButton.style.display="none";
  pauseButton.style.display="none";
  exportQuestionsBtn.style.display="none";

  studentLine.textContent="";
  setLine.textContent="";

  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=null; quizEndTime=null;
  updateTimerDisplay();

  const preset=getNameFromUrl();
  if(preset){
    studentName=preset;
    studentLine.textContent=`Student: ${studentName}`;
    startQuiz(true);
    return;
  }

  quizContent.innerHTML=`
    <p>This quiz has <strong>${TOTAL_QUESTIONS}</strong> questions.</p>
    <ul style="margin-top:6px;color:#555;line-height:1.7;">
      <li><strong>Easy:</strong> 2 questions</li>
      <li><strong>Medium:</strong> 2 questions</li>
      <li><strong>Hard:</strong> 2 questions</li>
    </ul>
    <p style="margin-top:10px;">Enter your name to begin:</p>

    <input id="nameInput" type="text"
      style="padding:10px;width:260px;font-size:1.05em;border:1px solid #ccc;border-radius:10px;"
      placeholder="Your name">

    <button id="startButton"
      style="margin-left:10px;background:#4caf50;padding:10px 20px;color:white;border:none;border-radius:8px;">
      Start Quiz
    </button>
  `;
  document.getElementById("startButton").addEventListener("click", ()=>startQuiz(false));
}
function startQuiz(skipReadName){
  if(!skipReadName){
    const nameInput=document.getElementById("nameInput");
    studentName=(nameInput.value || "Student").trim();
  }
  studentLine.textContent=`Student: ${studentName}`;

  quizStartTime=new Date();
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  updateTimerDisplay(); startTimerInterval();

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();

  generateBtn.style.display="inline-block";
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";
  exportQuestionsBtn.style.display="inline-block";
}

/* ===================== Init ===================== */
showStartScreen();
</script>
</body>
</html>
