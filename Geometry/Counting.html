<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
/* ===================== CONFIG ===================== */
const SVG_TITLE = "Clever Shapes — Counting";
const LESSON_TITLE = "Clever Shapes — Counting (Segments / Rectangles / Angles)";
const PART_TITLES = [
  "Part 1 (Basics) — Line segments & rectangles (2 questions)",
  "Part 2 (Angles) — Counting angles from rays (2 questions)",
  "Part 3 (Mixed) — Harder counting (2 questions)"
];
const NUM_PARTS = 3;
const QUESTIONS_PER_PART = 2;
const TOTAL_QUESTIONS = NUM_PARTS * QUESTIONS_PER_PART;

/* ===================== Utils ===================== */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function nC2(n){ return n*(n-1)/2; }

function formatMs(ms){
  const totalSec=Math.floor(ms/1000), min=Math.floor(totalSec/60), sec=totalSec%60;
  return `${String(min).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
function escapeXml(s){
  return String(s)
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&apos;");
}
function wrapLines(lines, maxChars=68){
  const out=[];
  function pushWrapped(line){
    const words=String(line).split(/\s+/).filter(Boolean);
    if(words.length===0){ out.push(""); return; }
    let cur="";
    for(const w of words){
      if(w.length>maxChars){
        if(cur){ out.push(cur); cur=""; }
        for(let i=0;i<w.length;i+=maxChars) out.push(w.slice(i,i+maxChars));
        continue;
      }
      if(!cur) cur=w;
      else if((cur+" "+w).length<=maxChars) cur+=" "+w;
      else { out.push(cur); cur=w; }
    }
    if(cur) out.push(cur);
  }
  for(const line of lines) pushWrapped(line);
  return out;
}
function svgDataUri(svg){
  const encoded=encodeURIComponent(svg)
    .replaceAll("%0A","").replaceAll("%20"," ")
    .replaceAll("%3D","=").replaceAll("%3A",":")
    .replaceAll("%2F","/").replaceAll("%2C",",");
  return "data:image/svg+xml;charset=utf-8," + encoded;
}

/* Parse numbers from user input */
function parseNumbersFromInput(str){
  const s=(str||"").trim();
  if(!s) return [];
  const out=[];
  const re=/([+-]?\d+\s*\/\s*[+-]?\d+)|([+-]?\d+(?:\.\d+)?)/g;
  let m;
  while((m=re.exec(s))!==null){
    const token=(m[1]||m[2]||"").replace(/\s+/g,"");
    if(token.includes("/")){
      const [a,b]=token.split("/");
      const n=Number(a), d=Number(b);
      if(Number.isFinite(n)&&Number.isFinite(d)&&d!==0) out.push(n/d);
    }else{
      const v=Number(token);
      if(Number.isFinite(v)) out.push(v);
    }
  }
  return out;
}
function approxEqual(a,b,tol=1e-6){ return Math.abs(a-b)<=tol; }

/* ===================== SVG Question Card ===================== */
function makeSvgQuestionCard(lines, diagramMarkup, titleText=SVG_TITLE){
  const W=980, headerH=72, padX=44, textLineH=36, topY=headerH+48;
  const wrapped=wrapLines(lines, 70);
  const textBlockH = wrapped.length * textLineH;
  const diagramY = topY + textBlockH + 18;
  const diagramH = 360;
  const padBottom = 54;
  const H = diagramY + diagramH + padBottom;

  const textSpans=wrapped.map((t,i)=>{
    const y=topY + i*textLineH;
    return `<text x="${padX}" y="${y}" font-size="28" fill="#1f2a44" font-family="Segoe UI, Arial">${escapeXml(t)}</text>`;
  }).join("");

  const svg=`
  <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#f7fbff"/>
        <stop offset="1" stop-color="#ffffff"/>
      </linearGradient>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/>
      </filter>
    </defs>

    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${H-36}"
          fill="url(#g)" stroke="#dfe7f2" stroke-width="3" filter="url(#shadow)"/>
    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${headerH}"
          fill="#0d47a1" opacity="0.10"/>

    <text x="${padX}" y="56" font-size="28" fill="#0d47a1" font-weight="700"
          font-family="Segoe UI, Arial">${escapeXml(titleText)}</text>

    ${textSpans}

    <g transform="translate(0, ${diagramY})">
      <rect x="44" y="0" width="${W-88}" height="${diagramH}" rx="16" ry="16"
            fill="#ffffff" stroke="#e5e5e5" stroke-width="3"/>
      ${diagramMarkup}
    </g>
  </svg>`.trim();

  return svgDataUri(svg);
}

function hintCardSvg(lines, title="Hint"){
  const W=980, headerH=60, padX=44, lineH=34, firstLineY=headerH+44, padBottom=44;
  const wrapped=wrapLines(lines, 84);
  const H=firstLineY + (wrapped.length-1)*lineH + padBottom;

  const textSpans=wrapped.map((t,i)=>{
    const y=firstLineY + i*lineH;
    return `<text x="${padX}" y="${y}" font-size="24" fill="#1f2a44" font-family="Segoe UI, Arial">${escapeXml(t)}</text>`;
  }).join("");

  const svg=`
  <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ffffff"/>
        <stop offset="1" stop-color="#fff7e6"/>
      </linearGradient>
      <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.10"/>
      </filter>
    </defs>

    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${H-36}"
          fill="url(#bg)" stroke="#ffe0b2" stroke-width="3" filter="url(#shadow2)"/>

    <text x="${padX}" y="52" font-size="26" fill="#8d6e63" font-weight="800"
          font-family="Segoe UI, Arial">${escapeXml(title)}</text>

    ${textSpans}
  </svg>`.trim();

  return svgDataUri(svg);
}

/* ===================== Diagram builders ===================== */
function diagramLineWithPoints(n){
  const x0=140, x1=840, y=200;
  const gap=(x1-x0)/(n-1);
  const labels="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").slice(0,n);

  let marks=`<line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" stroke="#1f2a44" stroke-width="4" />`;
  for(let i=0;i<n;i++){
    const x=x0+i*gap;
    marks+=`<line x1="${x}" y1="${y-16}" x2="${x}" y2="${y+16}" stroke="#1f2a44" stroke-width="4" />`;
    marks+=`<text x="${x}" y="${y+62}" text-anchor="middle" font-size="26" fill="#1f2a44" font-family="Segoe UI, Arial">${labels[i]}</text>`;
  }
  return `<g transform="translate(0,70)">${marks}</g>`;
}

function diagramStripRectangles(n){
  const x=200, y=120, w=580, h=160;
  const step=w/n;
  let s=`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="none" stroke="#1f2a44" stroke-width="4" />`;
  for(let i=1;i<n;i++){
    const xx=x+i*step;
    s+=`<line x1="${xx}" y1="${y}" x2="${xx}" y2="${y+h}" stroke="#1f2a44" stroke-width="3" />`;
  }
  return `<g transform="translate(0,70)">${s}</g>`;
}

function diagramRays(m){
  const ox=260, oy=290;          // within diagram box
  const r=240;
  const start=-80, end=-10;      // degrees
  const labels="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").slice(0,m);

  let s=`<circle cx="${ox}" cy="${oy}" r="6" fill="#1f2a44"/><text x="${ox-16}" y="${oy+28}" font-size="26" fill="#1f2a44" font-family="Segoe UI, Arial">O</text>`;
  for(let i=0;i<m;i++){
    const ang=(start + (end-start)*(i/(m-1))) * Math.PI/180;
    const x2=ox + r*Math.cos(ang);
    const y2=oy + r*Math.sin(ang);
    s+=`<line x1="${ox}" y1="${oy}" x2="${x2}" y2="${y2}" stroke="#1f2a44" stroke-width="4" />`;
    const lx=ox + (r+22)*Math.cos(ang);
    const ly=oy + (r+22)*Math.sin(ang);
    s+=`<text x="${lx}" y="${ly}" font-size="26" fill="#1f2a44" font-family="Segoe UI, Arial">${labels[i]}</text>`;
  }
  return `<g transform="translate(140,60)">${s}</g>`;
}

function diagramCross(topCount, bottomCount){
  const y = 190;                 // horizontal line y (inside 0..360)
  const xLeft = 160, xRight = 820;
  const xMid = 490;

  const hPoints = ["A","B","C","D","E"];
  const hx = [220, 350, xMid, 630, 760];

  // Fix order: F above G
  const vTopLabels = ["F","G","J","K"];
  const vBotLabels = ["H","I","L","M"];

  const vSpacing = 55;
  const topPts = [];
  for(let i=0;i<topCount;i++){
    topPts.push({ label: vTopLabels[i], y: y - (i+1)*vSpacing });
  }
  const botPts = [];
  for(let i=0;i<bottomCount;i++){
    botPts.push({ label: vBotLabels[i], y: y + (i+1)*vSpacing });
  }

  const vTopY = topPts.length ? topPts[topPts.length-1].y : y;
  const vBotY = botPts.length ? botPts[botPts.length-1].y : y;

  const minY = 30, maxY = 330;
  const vStart = Math.max(minY, vTopY - 25);
  const vEnd   = Math.min(maxY, vBotY + 25);

  // label styling helper (white outline)
  const t = (x, yy, text, anchor="middle") => `
    <text x="${x}" y="${yy}" text-anchor="${anchor}"
      font-size="26" fill="#1f2a44" font-family="Segoe UI, Arial"
      paint-order="stroke" stroke="#ffffff" stroke-width="6">${text}</text>
  `;

  let s = "";

  // main cross
  s += `<line x1="${xLeft}" y1="${y}" x2="${xRight}" y2="${y}" stroke="#1f2a44" stroke-width="4" />`;
  s += `<line x1="${xMid}" y1="${vStart}" x2="${xMid}" y2="${vEnd}" stroke="#1f2a44" stroke-width="4" />`;

  // horizontal ticks + labels (move labels UP so C won't collide with H)
  for(let i=0;i<hx.length;i++){
    s += `<line x1="${hx[i]}" y1="${y-16}" x2="${hx[i]}" y2="${y+16}" stroke="#1f2a44" stroke-width="4" />`;
    s += t(hx[i], y+46, hPoints[i], "middle");   // was y+62
  }

  // vertical ticks + labels
  const labelX = xMid - 78; // move vertical labels further left
  topPts.forEach(p=>{
    s += `<line x1="${xMid-16}" y1="${p.y}" x2="${xMid+16}" y2="${p.y}" stroke="#1f2a44" stroke-width="4" />`;
    s += t(labelX, p.y+10, p.label, "end");
  });
  botPts.forEach(p=>{
    s += `<line x1="${xMid-16}" y1="${p.y}" x2="${xMid+16}" y2="${p.y}" stroke="#1f2a44" stroke-width="4" />`;
    // push bottom labels slightly lower to separate from C
    s += t(labelX, p.y+26, p.label, "end");
  });

  // center point
  s += `<circle cx="${xMid}" cy="${y}" r="6" fill="#1f2a44"/>`;

  return `<g>${s}</g>`;
}

/* ===================== Question Generators (exactly 6) ===================== */
/* Answer format: type:"single", values:[number], label:"..." */

function genQ1_LineSegments(){
  const n=randInt(5,7);
  const ans=nC2(n);

  const lines=[
    "(Easy) Count line segments",
    `There are ${n} marked points on one straight line.`,
    "How many different line segments can be formed using these points as endpoints?",
    "(Enter one integer.)"
  ];

  const hint=hintCardSvg([
    "Any two different points determine one unique segment.",
    "So the number of segments equals the number of point-pairs:",
    "Answer = C(n, 2) = n(n−1)/2."
  ], "Hint (Segments on a line)");

  return {
    img: makeSvgQuestionCard(lines, diagramLineWithPoints(n)),
    diagram: hint,
    hintText: "Any two points make one segment. Count pairs: C(n,2) = n(n−1)/2.",
    answer: { type:"single", values:[ans], label:`${ans}` }
  };
}

function genQ2_RectanglesStripEasy(){
  const n=randInt(3,5);
  const ans=n*(n+1)/2;

  const lines=[
    "(Easy) Count rectangles",
    `A long rectangle is divided into ${n} equal parts in one row.`,
    "How many rectangles are there in total (including larger ones made of several parts)?",
    "(Enter one integer.)"
  ];

  const hint=hintCardSvg([
    "In a 1×n strip, rectangles are made by choosing a left border and a right border.",
    "Count: 1+2+...+n = n(n+1)/2."
  ], "Hint (1×n strip)");

  return {
    img: makeSvgQuestionCard(lines, diagramStripRectangles(n)),
    diagram: hint,
    hintText: "Total rectangles in a 1×n strip = 1+2+...+n = n(n+1)/2.",
    answer: { type:"single", values:[ans], label:`${ans}` }
  };
}

function genQ3_RectanglesStripHard(){
  const n=randInt(5,8);
  const ans=n*(n+1)/2;

  const lines=[
    "(Medium) Count rectangles",
    `A long rectangle is divided into ${n} equal parts in one row.`,
    "How many rectangles are there in total (including larger ones)?",
    "(Enter one integer.)"
  ];

  const hint=hintCardSvg([
    "Same idea: choose the start and end parts of a rectangle.",
    "Count 1+2+...+n = n(n+1)/2."
  ], "Hint (Sum of 1..n)");

  return {
    img: makeSvgQuestionCard(lines, diagramStripRectangles(n)),
    diagram: hint,
    hintText: "Use 1+2+...+n = n(n+1)/2.",
    answer: { type:"single", values:[ans], label:`${ans}` }
  };
}

function genQ4_AnglesRays(){
  const m=randInt(5,6);
  const ans=nC2(m);

  const lines=[
    "(Medium) Count angles",
    `From point O, there are ${m} rays drawn in different directions.`,
    "How many different angles are formed by choosing any two rays?",
    "(Enter one integer.)"
  ];

  const hint=hintCardSvg([
    "Each angle is determined by choosing 2 rays.",
    "So the number of angles equals the number of ray-pairs:",
    "Answer = C(m, 2) = m(m−1)/2."
  ], "Hint (Angles from rays)");

  return {
    img: makeSvgQuestionCard(lines, diagramRays(m)),
    diagram: hint,
    hintText: "Any two rays form one angle. Count pairs: C(m,2) = m(m−1)/2.",
    answer: { type:"single", values:[ans], label:`${ans}` }
  };
}

function genQ5_AnglesRaysHard(){
  const m=randInt(6,8);
  const ans=nC2(m);

  const lines=[
    "(Hard) Count angles",
    `From point O, there are ${m} rays drawn in different directions.`,
    "How many different angles are formed by choosing any two rays?",
    "(Enter one integer.)"
  ];

  const hint=hintCardSvg([
    "Same rule: pick any two rays.",
    "Answer = C(m,2) = m(m−1)/2."
  ], "Hint (Choose 2 rays)");

  return {
    img: makeSvgQuestionCard(lines, diagramRays(m)),
    diagram: hint,
    hintText: "Angles = number of pairs of rays = C(m,2).",
    answer: { type:"single", values:[ans], label:`${ans}` }
  };
}

function genQ6_CrossSegments(){
  // Horizontal fixed 5 points; vertical varies
  const topCount=randInt(2,3);
  const bottomCount=randInt(1,2);
  const horizontalPoints=5;
  const verticalPoints=topCount + 1 + bottomCount;
  const ans = nC2(horizontalPoints) + nC2(verticalPoints);

  const lines=[
    "(Hard) Count line segments in a cross",
    "The diagram shows two straight lines crossing.",
    `On the horizontal line there are ${horizontalPoints} marked points.`,
    `On the vertical line there are ${verticalPoints} marked points (including the intersection).`,
    "How many different line segments are in the diagram (count along each straight line)?",
    "(Enter one integer.)"
  ];

  const hint=hintCardSvg([
    "Count segments on each straight line separately.",
    "If a straight line has t marked points, it contributes C(t,2) segments.",
    "Total = C(horizontal,2) + C(vertical,2)."
  ], "Hint (Add the two lines)");

  return {
    img: makeSvgQuestionCard(lines, diagramCross(topCount, bottomCount)),
    diagram: hint,
    hintText: "Total segments = C(#points on horizontal,2) + C(#points on vertical,2).",
    answer: { type:"single", values:[ans], label:`${ans}` }
  };
}

/* ===================== Build exactly 6 questions ===================== */
function buildSixQuestions(){
  return [
    genQ1_LineSegments(),
    genQ2_RectanglesStripEasy(),
    genQ3_RectanglesStripHard(),
    genQ4_AnglesRays(),
    genQ5_AnglesRaysHard(),
    genQ6_CrossSegments()
  ];
}

/* ===================== State ===================== */
let questions=[];
let currentQuestionIndex=0;
let studentName="Student";
let quizStartTime=null;
let quizEndTime=null;
let quizSubmitted=false;

let timerInterval=null;
let elapsedMs=0;
let isPaused=false;
let firstAttemptMs=null;

let setCounter=0;
let lastSignature="";

/* DOM */
const quizContent=document.getElementById("quizContent");
const sidebarEl=document.getElementById("sidebar");

const buttonContainer=document.getElementById("navButtons");
const backButton=document.getElementById("backButton");
const nextButton=document.getElementById("nextButton");
const submitButton=document.getElementById("submitButton");
const checkButton=document.getElementById("checkButton");
const saveButton=document.getElementById("saveButton");

const generateBtn=document.getElementById("generateButton");
const pauseButton=document.getElementById("pauseButton");
const exportQuestionsBtn=document.getElementById("exportQuestionsBtn");

const timerDisplay=document.getElementById("timerDisplay");
const studentLine=document.getElementById("studentLine");
const setLine=document.getElementById("setLine");

/* ===================== Timer ===================== */
function updateTimerDisplay(){
  let totalMs=elapsedMs;
  if(!isPaused && quizStartTime) totalMs+=(new Date()-quizStartTime);
  let text=`Time: ${formatMs(totalMs)}`;
  if(firstAttemptMs!==null) text+=` (First: ${formatMs(firstAttemptMs)})`;
  timerDisplay.textContent=text;
}
function startTimerInterval(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(updateTimerDisplay, 1000);
}
function pauseTimer(){
  if(isPaused || !quizStartTime) return;
  const now=new Date();
  elapsedMs+=now-quizStartTime;
  isPaused=true;
  quizStartTime=null;
  updateTimerDisplay();
}
function resumeTimer(){
  if(!isPaused) return;
  isPaused=false;
  quizStartTime=new Date();
  updateTimerDisplay();
}

/* ===================== Grading ===================== */
function gradeAnswer(userText, answer){
  const nums = parseNumbersFromInput(userText);
  if(answer.type==="single"){
    if(nums.length<1) return false;
    return approxEqual(nums[0], answer.values[0]);
  }
  return false;
}

/* ===================== Generate Quiz ===================== */
function signatureOf(built){
  return built.map(q=>q.answer.label).join("|");
}
function generateQuiz(){
  questions=[];
  quizSubmitted=false;

  let tries=0;
  let built=null;

  while(tries<30){
    built = buildSixQuestions();
    const sig = signatureOf(built);
    if(sig !== lastSignature){
      lastSignature = sig;
      break;
    }
    tries++;
  }

  setCounter++;
  setLine.textContent = `Set: ${setCounter}`;

  for(let i=0;i<built.length;i++){
    const partIndex=Math.floor(i/QUESTIONS_PER_PART);
    const indexInPart=i%QUESTIONS_PER_PART;
    questions.push({
      partIndex,
      indexInPart,
      img: built[i].img,
      diagram: built[i].diagram || "",
      hint: built[i].hintText || "Use counting rules and combinations.",
      answer: built[i].answer,
      userValue:"",
      isCorrect:false
    });
  }
}

/* ===================== Sidebar ===================== */
function renderSidebar(){
  sidebarEl.style.display="block";
  sidebarEl.innerHTML=`<h4>Questions</h4><ul id="qList"></ul>`;
  const ul=document.getElementById("qList");
  for(let i=0;i<TOTAL_QUESTIONS;i++){
    const q=questions[i];
    const li=document.createElement("li");
    const label=["Basics","Angles","Mixed"][q.partIndex]+(q.indexInPart+1);
    li.textContent=`Q${i+1} (${label})`;
    li.dataset.index=i;
    li.addEventListener("click",()=>{
      saveCurrentInput();
      currentQuestionIndex=i;
      renderQuestion();
    });
    ul.appendChild(li);
  }
  updateSidebarStatus();
}
function updateSidebarStatus(){
  const items=document.querySelectorAll("#qList li");
  items.forEach(li=>{
    const idx=Number(li.dataset.index);
    const q=questions[idx];
    li.classList.remove("active","answered","correct","incorrect");

    if(!quizSubmitted){
      li.classList.toggle("active", idx===currentQuestionIndex);
      if((q.userValue||"").trim()!=="") li.classList.add("answered");
    }else{
      if((q.userValue||"").trim()!==""){
        li.classList.add(q.isCorrect ? "correct" : "incorrect");
      }
    }
  });
}

/* ===================== Helpers ===================== */
function saveCurrentInput(){
  const input=document.getElementById("answerInput");
  if(input){
    questions[currentQuestionIndex].userValue=input.value.trim();
    if(quizSubmitted){
      const q=questions[currentQuestionIndex];
      q.isCorrect = gradeAnswer(q.userValue, q.answer);
      updateSidebarStatus();
    }
  }
}
function mountNavButtonsInto(slotId){
  const slot=document.getElementById(slotId);
  if(!slot) return;
  slot.appendChild(buttonContainer);
  buttonContainer.style.display="flex";
}

/* ===================== Render Question ===================== */
function renderQuestion(){
  const q=questions[currentQuestionIndex];
  const levelLabel=["Basics","Angles","Mixed"][q.partIndex];
  const fullLabel=`${levelLabel} — Question ${q.indexInPart+1}`;

  const hintDiagramHtml = q.diagram
    ? `<div class="hint-diagram-wrap"><img src="${q.diagram}" alt="Hint diagram"></div>`
    : "";

  const placeholder = "e.g., 10";

  quizContent.innerHTML=`
    <p class="question-text">Question ${currentQuestionIndex+1} of ${TOTAL_QUESTIONS}</p>
    <div class="part-title">${escapeXml(PART_TITLES[q.partIndex])}</div>

    <div class="single-question">
      <div style="font-weight:800;margin-bottom:8px;">${escapeXml(fullLabel)}</div>

      <div class="img-wrap">
        <img class="q-img" src="${q.img}" alt="Question image">
      </div>

      <div class="answer-row">
        <div style="font-weight:700;">Answer:</div>
        <input id="answerInput" class="answer-box" type="text"
               placeholder="${escapeXml(placeholder)}"
               value="${escapeXml(q.userValue||"")}">
      </div>

      <div id="checkFeedback" style="display:none;"></div>

      <div class="hint-row">
        <button id="hintBtn" class="hint-btn">Hint</button>
      </div>

      <div id="hintBox" class="hint">
        <div>${escapeXml(q.hint)}</div>
        ${hintDiagramHtml}
      </div>
    </div>

    <div id="navSlot"></div>
  `;

  mountNavButtonsInto("navSlot");

  const hintBtn=document.getElementById("hintBtn");
  const hintBox=document.getElementById("hintBox");
  hintBtn.addEventListener("click", ()=>{
    const shown=hintBox.style.display==="block";
    hintBox.style.display = shown ? "none" : "block";
    hintBtn.textContent = shown ? "Hint" : "Hide Hint";
  });

  backButton.style.display="inline-block";
  backButton.style.visibility=(currentQuestionIndex===0)?"hidden":"visible";

  const isLast=(currentQuestionIndex===TOTAL_QUESTIONS-1);
  nextButton.style.display=isLast?"none":"inline-block";
  submitButton.style.display=isLast?"inline-block":"none";

  saveButton.style.display=quizSubmitted?"inline-block":"none";
  checkButton.style.display=(quizSubmitted && !q.isCorrect)?"inline-block":"none";

  updateSidebarStatus();
}

/* ===================== Results + Submit ===================== */
function calculateAndShowResults(){
  saveCurrentInput();

  const now=new Date();
  let attemptMs=elapsedMs;
  if(!isPaused && quizStartTime) attemptMs+=now-quizStartTime;
  if(firstAttemptMs===null) firstAttemptMs=attemptMs;

  const attemptStartTime=quizStartTime || now;
  quizEndTime=now;
  quizSubmitted=true;

  let correctCount=0;
  questions.forEach((q)=>{
    q.isCorrect = gradeAnswer(q.userValue, q.answer);
    if(q.isCorrect) correctCount++;
  });

  updateSidebarStatus();

  let html=`
    <h3>Results for ${escapeXml(studentName)}</h3>
    <p>Set: <strong>${setCounter}</strong></p>
    <p>Score: <strong>${correctCount} / ${TOTAL_QUESTIONS}</strong></p>
    <p>Start time: <strong>${attemptStartTime.toLocaleTimeString()}</strong></p>
    <p>Submit time: <strong>${quizEndTime.toLocaleTimeString()}</strong></p>
    <p>Time taken (this attempt): <strong>${formatMs(attemptMs)}</strong></p>
    <p>First attempt time: <strong>${formatMs(firstAttemptMs)}</strong></p>

    <table class="review-table">
      <tr>
        <th>#</th><th>Part</th><th>Image</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th>
      </tr>
  `;

  questions.forEach((q,i)=>{
    const partLbl=["Basics","Angles","Mixed"][q.partIndex]+(q.indexInPart+1);
    const ua=(q.userValue||"").trim();
    const correctText = q.answer.label;

    html+=`
      <tr class="${q.isCorrect ? "correct-answer":"incorrect-answer"}">
        <td>${i+1}</td>
        <td>${escapeXml(partLbl)}</td>
        <td><img class="thumb" src="${q.img}" alt="Q${i+1}"></td>
        <td>${ua==="" ? "—" : escapeXml(ua)}</td>
        <td><strong>${escapeXml(correctText)}</strong></td>
        <td>${ua==="" ? "Not answered" : (q.isCorrect ? "Correct":"Incorrect")}</td>
      </tr>
    `;
  });

  html+=`</table><div id="navSlot"></div>`;
  quizContent.innerHTML=html;

  mountNavButtonsInto("navSlot");

  backButton.style.display="none";
  nextButton.style.display="none";
  submitButton.style.display="none";
  checkButton.style.display="none";
  saveButton.style.display="inline-block";

  // reset timer for review attempt
  elapsedMs=0; isPaused=false; quizStartTime=new Date();
  pauseButton.textContent="Pause";
  startTimerInterval();
  updateTimerDisplay();
}

/* ===================== Buttons ===================== */
nextButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex<TOTAL_QUESTIONS-1){
    currentQuestionIndex++;
    renderQuestion();
  }
});
backButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex>0){
    currentQuestionIndex--;
    renderQuestion();
  }
});
submitButton.addEventListener("click", ()=>{
  if(currentQuestionIndex===TOTAL_QUESTIONS-1){
    calculateAndShowResults();
  }
});
checkButton.addEventListener("click", ()=>{
  saveCurrentInput();
  const q=questions[currentQuestionIndex];
  if(!quizSubmitted) return;

  q.isCorrect = gradeAnswer(q.userValue, q.answer);
  updateSidebarStatus();

  const box=document.getElementById("checkFeedback");
  if(!box) return;

  box.className="check-feedback";
  box.style.display="block";

  if(q.isCorrect){
    box.innerHTML=`✅ Correct!`;
    checkButton.style.display="none";
  }else{
    box.innerHTML=`❌ Incorrect. Correct answer: <strong>${escapeXml(q.answer.label)}</strong>`;
    checkButton.style.display="inline-block";
  }
});

/* Save TXT */
function formatDateForFilename(date){
  if(!date) return "no_time";
  const pad=n=>String(n).padStart(2,"0");
  return date.getFullYear()+pad(date.getMonth()+1)+pad(date.getDate())+"_"+pad(date.getHours())+pad(date.getMinutes())+pad(date.getSeconds());
}
function saveCurrentResultAsTxt(){
  saveCurrentInput();

  let correctCount=0;
  questions.forEach(q=>{ if(q.isCorrect) correctCount++; });

  const lines=[];
  lines.push("Clever Shapes - Counting - Current Result");
  lines.push("Student: "+studentName);
  lines.push("Set: "+setCounter);
  if(quizStartTime) lines.push("Start time: "+quizStartTime.toLocaleString());
  if(quizEndTime) lines.push("Last submit time: "+quizEndTime.toLocaleString());
  lines.push("Score: "+correctCount+" / "+TOTAL_QUESTIONS);
  if(firstAttemptMs!==null) lines.push("First attempt time: "+formatMs(firstAttemptMs));
  lines.push("");

  questions.forEach((q,i)=>{
    const partLbl=["Basics","Angles","Mixed"][q.partIndex]+(q.indexInPart+1);
    const userAns=(q.userValue||"").trim()==="" ? "Not answered" : q.userValue;
    const resultText=(q.userValue||"").trim()==="" ? "Not answered" : (q.isCorrect?"Correct":"Incorrect");
    lines.push(`Q${i+1} (${partLbl})`);
    lines.push("Your answer: "+userAns);
    lines.push("Correct answer: "+q.answer.label);
    lines.push("Result: "+resultText);
    lines.push("");
  });

  const content=lines.join("\n");
  const blob=new Blob([content],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const safeName=studentName.replace(/[^a-z0-9_\-]/gi,"_")||"Student";
  const ts=formatDateForFilename(new Date());
  a.href=url;
  a.download=`CleverShapes_${safeName}_Set${setCounter}_${ts}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
saveButton.addEventListener("click", saveCurrentResultAsTxt);

/* Pause/Resume (no pop-up) */
pauseButton.addEventListener("click", ()=>{
  if(!quizStartTime && elapsedMs===0 && !quizSubmitted) return;
  if(isPaused){ resumeTimer(); pauseButton.textContent="Pause"; }
  else { pauseTimer(); pauseButton.textContent="Resume"; }
});

/* Generate new set */
generateBtn.addEventListener("click", ()=>{
  if(!quizSubmitted && !confirm("Generate a new random set? All answers will be lost.")) return;

  if(timerInterval) clearInterval(timerInterval);
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=new Date(); quizEndTime=null;
  updateTimerDisplay(); startTimerInterval();
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();
});

/* ===================== Export Questions PDF (2 per page, DYAA header) ===================== */
function waitForImages(container){
  const imgs = Array.from(container.querySelectorAll("img"));
  return Promise.all(imgs.map(img => {
    if(img.complete && img.naturalWidth > 0) return Promise.resolve();
    return new Promise(resolve => {
      img.onload = () => resolve();
      img.onerror = () => resolve();
    });
  }));
}
exportQuestionsBtn.addEventListener("click", async ()=>{
  if(!questions || questions.length===0){
    alert("Please start a quiz first.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  const wrapper=document.createElement("div");
  wrapper.style.position="fixed";
  wrapper.style.left="-9999px";
  wrapper.style.top="0";
  wrapper.style.width="800px";
  wrapper.style.background="#ffffff";
  document.body.appendChild(wrapper);

  try{
    let groupDiv=null;

    questions.forEach((q, idx)=>{
      if(idx%2===0){
        groupDiv=document.createElement("div");
        groupDiv.style.padding="20px";
        groupDiv.style.marginBottom="20px";
        groupDiv.style.boxSizing="border-box";

        const header=document.createElement("div");
        header.innerHTML=`
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <div style="width:24px;height:24px;background:#0d47a1;border-radius:6px;position:relative;">
              <div style="position:absolute;width:12px;height:5px;background:#ff9800;top:-4px;left:12px;border-radius:3px;"></div>
            </div>
            <div style="display:flex;flex-direction:column;line-height:1.1;">
              <div style="font-weight:900;letter-spacing:1px;color:#ff9800;font-size:14px;">DYAA</div>
              <div style="font-size:11px;color:#0d47a1;font-weight:700;">EDUCATION</div>
            </div>
          </div>
          <hr style="border:none;border-top:1px solid #e0e0e0;margin:0 0 12px 0;">
          <div style="font-weight:800;color:#1f2a44;margin:0 0 4px 0;">${LESSON_TITLE}</div>
          <div style="color:#546e7a;font-weight:800;margin:0 0 10px 0;">Questions (Set ${setCounter})</div>
        `;
        groupDiv.appendChild(header);
        wrapper.appendChild(groupDiv);
      }

      const qDiv=document.createElement("div");
      qDiv.style.marginBottom="18px";
      qDiv.innerHTML=`
        <div style="font-weight:700;margin:4px 0 6px 0;">Q${idx+1}</div>
        <div style="border-radius:12px;border:1px solid #e5e5e5;padding:12px;">
          <img src="${q.img}" style="width:100%;height:auto;border-radius:10px;" />
        </div>
      `;
      groupDiv.appendChild(qDiv);
    });

    const groups=Array.from(wrapper.children);

    for(let i=0;i<groups.length;i++){
      await waitForImages(groups[i]);

      const canvas = await html2canvas(groups[i], { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
      const imgData = canvas.toDataURL("image/png");

      const imgWidth = pageWidth - 20;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;

      if(i>0) pdf.addPage();
      pdf.addImage(imgData, "PNG", 10, 10, imgWidth, Math.min(imgHeight, pageHeight - 20));
    }

    const safeName=(studentName||"Student").replace(/[^a-z0-9_\-]/gi,"_") || "Student";
    const ts=formatDateForFilename(new Date());
    pdf.save(`CleverShapes_Questions_${safeName}_Set${setCounter}_${ts}.pdf`);
  } finally {
    document.body.removeChild(wrapper);
  }
});

/* ===================== Start Screen (+ optional ?name=Tiger) ===================== */
function getNameFromUrl(){
  const url=new URL(window.location.href);
  const name=url.searchParams.get("name");
  return name ? name.trim() : "";
}
function showStartScreen(){
  sidebarEl.style.display="none";
  buttonContainer.style.display="none";
  generateBtn.style.display="none";
  saveButton.style.display="none";
  pauseButton.style.display="none";
  exportQuestionsBtn.style.display="none";

  studentLine.textContent="";
  setLine.textContent="";

  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=null; quizEndTime=null;
  updateTimerDisplay();

  const preset=getNameFromUrl();
  if(preset){
    studentName=preset;
    studentLine.textContent=`Student: ${studentName}`;
    startQuiz(true);
    return;
  }

  quizContent.innerHTML=`
    <p>This quiz has <strong>${TOTAL_QUESTIONS}</strong> questions.</p>
    <ul style="margin-top:6px;color:#555;line-height:1.7;">
      <li><strong>Basics:</strong> 2 questions</li>
      <li><strong>Angles:</strong> 2 questions</li>
      <li><strong>Mixed:</strong> 2 questions</li>
    </ul>
    <p style="margin-top:10px;">Enter your name to begin:</p>

    <input id="nameInput" type="text"
      style="padding:10px;width:260px;font-size:1.05em;border:1px solid #ccc;border-radius:10px;"
      placeholder="Your name">

    <button id="startButton"
      style="margin-left:10px;background:#4caf50;padding:10px 20px;color:white;border:none;border-radius:8px;">
      Start Quiz
    </button>
  `;
  document.getElementById("startButton").addEventListener("click", ()=>startQuiz(false));
}
function startQuiz(skipReadName){
  if(!skipReadName){
    const nameInput=document.getElementById("nameInput");
    studentName=(nameInput.value || "Student").trim();
  }
  studentLine.textContent=`Student: ${studentName}`;

  quizStartTime=new Date();
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  updateTimerDisplay(); startTimerInterval();

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();

  generateBtn.style.display="inline-block";
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";
  exportQuestionsBtn.style.display="inline-block";
}

/* ===================== Init ===================== */
showStartScreen();
</script>
