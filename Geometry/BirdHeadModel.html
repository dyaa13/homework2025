<script>
/* ===================== CONFIG ===================== */
const QUIZ_TITLE = "Model 14 — Bird-Head Model (Area Ratios)";
const LESSON_TITLE = "Model 14 — Bird-Head Model (Area Ratios)";

const PARTS = [
  { title: "Part 1 (Foundation) — inside-triangle & ratio area (4 questions)", level: "Foundation", count: 4 },
  { title: "Part 2 (Applied) — extended points & composite area (2 questions)", level: "Applied", count: 2 },
];

const TOTAL_QUESTIONS = PARTS.reduce((s,p)=>s+p.count,0);

/* ===================== Utils ===================== */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ const t=a%b; a=b; b=t; } return a||1; }
function lcm(a,b){ return Math.abs(a/gcd(a,b)*b); }

function formatMs(ms){
  const totalSec=Math.floor(ms/1000), min=Math.floor(totalSec/60), sec=totalSec%60;
  return `${String(min).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
function escapeXml(s){
  return String(s)
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&apos;");
}
function wrapLines(lines, maxChars=72){
  const out=[];
  function pushWrapped(line){
    const words=String(line).split(/\s+/).filter(Boolean);
    if(words.length===0){ out.push(""); return; }
    let cur="";
    for(const w of words){
      if(w.length>maxChars){
        if(cur){ out.push(cur); cur=""; }
        for(let i=0;i<w.length;i+=maxChars) out.push(w.slice(i,i+maxChars));
        continue;
      }
      if(!cur) cur=w;
      else if((cur+" "+w).length<=maxChars) cur+=" "+w;
      else { out.push(cur); cur=w; }
    }
    if(cur) out.push(cur);
  }
  for(const line of lines) pushWrapped(line);
  return out;
}
function svgDataUri(svg){
  const encoded=encodeURIComponent(svg)
    .replaceAll("%0A","").replaceAll("%20"," ")
    .replaceAll("%3D","=").replaceAll("%3A",":")
    .replaceAll("%2F","/").replaceAll("%2C",",");
  return "data:image/svg+xml;charset=utf-8," + encoded;
}

/* Parse numbers from user input */
function parseNumbersFromInput(str){
  const s=(str||"").trim();
  if(!s) return [];
  const out=[];
  const re=/([+-]?\d+\s*\/\s*[+-]?\d+)|([+-]?\d+(?:\.\d+)?)/g;
  let m;
  while((m=re.exec(s))!==null){
    const token=(m[1]||m[2]||"").replace(/\s+/g,"");
    if(token.includes("/")){
      const [a,b]=token.split("/");
      const n=Number(a), d=Number(b);
      if(Number.isFinite(n)&&Number.isFinite(d)&&d!==0) out.push(n/d);
    }else{
      const v=Number(token);
      if(Number.isFinite(v)) out.push(v);
    }
  }
  return out;
}
function approxEqual(a,b,tol=1e-6){ return Math.abs(a-b)<=tol; }

/* ===================== SVG Card ===================== */
function makeSvgQuestionCard(lines, diagramMarkup, titleText=QUIZ_TITLE){
  const W=980, headerH=72, padX=44, textLineH=36, topY=headerH+48;
  const wrapped=wrapLines(lines, 72);
  const textBlockH = wrapped.length * textLineH;
  const diagramY = topY + textBlockH + 18;
  const diagramH = 380;
  const padBottom = 54;
  const H = diagramY + diagramH + padBottom;

  const textSpans=wrapped.map((t,i)=>{
    const y=topY + i*textLineH;
    return `<text x="${padX}" y="${y}" font-size="28" fill="#1f2a44" font-family="Segoe UI, Arial">${escapeXml(t)}</text>`;
  }).join("");

  const svg=`
  <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#f7fbff"/>
        <stop offset="1" stop-color="#ffffff"/>
      </linearGradient>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/>
      </filter>
      <clipPath id="clipBox">
        <rect x="44" y="0" width="${W-88}" height="${diagramH}" rx="16" ry="16"></rect>
      </clipPath>
    </defs>

    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${H-36}"
          fill="url(#g)" stroke="#dfe7f2" stroke-width="3" filter="url(#shadow)"/>
    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${headerH}"
          fill="#0d47a1" opacity="0.10"/>

    <text x="${padX}" y="56" font-size="28" fill="#0d47a1" font-weight="700"
          font-family="Segoe UI, Arial">${escapeXml(titleText)}</text>

    ${textSpans}

    <g transform="translate(0, ${diagramY})">
      <rect x="44" y="0" width="${W-88}" height="${diagramH}" rx="16" ry="16"
            fill="#ffffff" stroke="#e5e5e5" stroke-width="3"/>
      <g clip-path="url(#clipBox)">
        ${diagramMarkup}
      </g>
    </g>
  </svg>`.trim();

  return svgDataUri(svg);
}

function hintCardSvg(lines, title="Hint"){
  const W=980, headerH=60, padX=44, lineH=34, firstLineY=headerH+44, padBottom=44;
  const wrapped=wrapLines(lines, 86);
  const H=firstLineY + (wrapped.length-1)*lineH + padBottom;

  const textSpans=wrapped.map((t,i)=>{
    const y=firstLineY + i*lineH;
    return `<text x="${padX}" y="${y}" font-size="24" fill="#1f2a44" font-family="Segoe UI, Arial">${escapeXml(t)}</text>`;
  }).join("");

  const svg=`
  <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ffffff"/>
        <stop offset="1" stop-color="#fff7e6"/>
      </linearGradient>
      <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.10"/>
      </filter>
    </defs>

    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${H-36}"
          fill="url(#bg)" stroke="#ffe0b2" stroke-width="3" filter="url(#shadow2)"/>

    <text x="${padX}" y="52" font-size="26" fill="#8d6e63" font-weight="800"
          font-family="Segoe UI, Arial">${escapeXml(title)}</text>

    ${textSpans}
  </svg>`.trim();

  return svgDataUri(svg);
}

/* ===================== Geometry helpers ===================== */
function lerp(p,q,t){ return {x:p.x+(q.x-p.x)*t, y:p.y+(q.y-p.y)*t}; }

/* ===================== Diagrams ===================== */
function diagramTriangleWithInsideDE(tAD, tAE, shade="ADE"){
  // Triangle ABC
  const A={x:490,y:70}, B={x:220,y:320}, C={x:820,y:320};
  const D=lerp(A,B,tAD);
  const E=lerp(A,C,tAE);

  const styleText=`font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;
  let s=``;

  // outline
  s+=`<polygon points="${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}" fill="none" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${D.x}" y1="${D.y}" x2="${E.x}" y2="${E.y}" stroke="#1f2a44" stroke-width="4"/>`;

  // shade
  if(shade==="ADE"){
    s+=`<polygon points="${A.x},${A.y} ${D.x},${D.y} ${E.x},${E.y}" fill="rgba(33,150,243,0.18)" stroke="none"/>`;
  }

  // points
  function dot(p){ return `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#1f2a44"/>`; }
  function label(p,t,dx,dy){ return `<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${t}</text>`; }

  s+=dot(A)+dot(B)+dot(C)+dot(D)+dot(E);
  s+=label(A,"A",-18,-14);
  s+=label(B,"B",-18,34);
  s+=label(C,"C",10,34);
  s+=label(D,"D",-28,10);
  s+=label(E,"E",10,10);

  return `<g>${s}</g>`;
}

function diagramCDE_Extension(mBC, nCE, pAC, qCD){
  // B-C-E collinear (horizontal)
  const B={x:190,y:320}, C={x:560,y:320}, E={x:850,y:320};
  const A={x:420,y:85};
  // D on AC such that CD/AC = q/p
  const t = qCD / pAC; // from C towards A
  const D = lerp(C, A, t);

  const styleText=`font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;
  let s=``;

  // triangle ABC
  s+=`<polygon points="${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}" fill="none" stroke="#1f2a44" stroke-width="4"/>`;
  // extension to E
  s+=`<line x1="${B.x}" y1="${B.y}" x2="${E.x}" y2="${E.y}" stroke="#1f2a44" stroke-width="4"/>`;
  // DE
  s+=`<line x1="${D.x}" y1="${D.y}" x2="${E.x}" y2="${E.y}" stroke="#1f2a44" stroke-width="4"/>`;

  // shade triangle CDE
  s+=`<polygon points="${C.x},${C.y} ${D.x},${D.y} ${E.x},${E.y}" fill="rgba(76,175,80,0.18)" stroke="none"/>`;

  function dot(p){ return `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#1f2a44"/>`; }
  function label(p,t,dx,dy){ return `<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${t}</text>`; }

  s+=dot(A)+dot(B)+dot(C)+dot(D)+dot(E);
  s+=label(A,"A",-18,-14);
  s+=label(B,"B",-18,34);
  s+=label(C,"C",10,34);
  s+=label(D,"D",-28,10);
  s+=label(E,"E",10,34);

  // ratio tags
  s+=`<text x="200" y="60" font-size="22" ${styleText}>BC:CE = ${mBC}:${nCE}</text>`;
  s+=`<text x="520" y="60" font-size="22" ${styleText}>AC:CD = ${pAC}:${qCD}</text>`;

  return `<g>${s}</g>`;
}

function diagramBDE_Extend(aAB,bBE,cBC,dBD){
  const A={x:220,y:110}, B={x:460,y:110}, E={x:830,y:110};
  const C={x:460,y:250}, D={x:460,y:340};

  const styleText=`font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;
  let s=``;

  // lines
  s+=`<line x1="${A.x}" y1="${A.y}" x2="${E.x}" y2="${E.y}" stroke="#1f2a44" stroke-width="4"/>`; // A-B-E
  s+=`<line x1="${B.x}" y1="${B.y}" x2="${D.x}" y2="${D.y}" stroke="#1f2a44" stroke-width="4"/>`; // B-C-D

  // triangle ABC
  s+=`<polygon points="${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}" fill="rgba(33,150,243,0.10)" stroke="#1f2a44" stroke-width="3"/>`;

  // triangle BDE shaded
  s+=`<polygon points="${B.x},${B.y} ${D.x},${D.y} ${E.x},${E.y}" fill="rgba(244,67,54,0.12)" stroke="#1f2a44" stroke-width="4"/>`;

  function dot(p){ return `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#1f2a44"/>`; }
  function label(p,t,dx,dy){ return `<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${t}</text>`; }

  s+=dot(A)+dot(B)+dot(C)+dot(D)+dot(E);
  s+=label(A,"A",-18,-14);
  s+=label(B,"B",-18,-14);
  s+=label(C,"C",-18,34);
  s+=label(D,"D",-18,34);
  s+=label(E,"E",10,-14);

  s+=`<text x="200" y="60" font-size="22" ${styleText}>AB:BE = ${aAB}:${bBE}</text>`;
  s+=`<text x="520" y="60" font-size="22" ${styleText}>BC:BD = ${cBC}:${dBD}</text>`;

  return `<g>${s}</g>`;
}
function diagramHourglass(aAB,bAE,cAC,dAD){
  // Ensure A-B-E are collinear AND C-A-D are collinear.
  // Coordinates are chosen to fit inside the 980x380 diagram box.
  const A = {x:490, y:200};

  // Line 1: B - A - E collinear
  const u = {x:190, y:-140};     // A -> E
  const E = {x:A.x + u.x, y:A.y + u.y};
  const B = {x:A.x - u.x, y:A.y - u.y};

  // Line 2: D - A - C collinear (crossing line)
  const v = {x:210, y:140};      // A -> C
  const C = {x:A.x + v.x, y:A.y + v.y};
  const D = {x:A.x - v.x, y:A.y - v.y};

  const styleText=`font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;
  let s=``;

  // crossing lines (guaranteed collinear)
  s+=`<line x1="${B.x}" y1="${B.y}" x2="${E.x}" y2="${E.y}" stroke="#1f2a44" stroke-width="4"/>`; // B-A-E
  s+=`<line x1="${D.x}" y1="${D.y}" x2="${C.x}" y2="${C.y}" stroke="#1f2a44" stroke-width="4"/>`; // D-A-C

  // triangles ABC and ADE
  s+=`<polygon points="${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}" fill="rgba(33,150,243,0.10)" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<polygon points="${A.x},${A.y} ${D.x},${D.y} ${E.x},${E.y}" fill="rgba(76,175,80,0.12)" stroke="#1f2a44" stroke-width="3"/>`;

  function dot(p){ return `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#1f2a44"/>`; }
  function label(p,t,dx,dy){ return `<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${t}</text>`; }

  s+=dot(A)+dot(B)+dot(C)+dot(D)+dot(E);
  s+=label(A,"A",-18,-14);
  s+=label(B,"B",-18,34);
  s+=label(C,"C",10,34);
  s+=label(D,"D",-18,-14);
  s+=label(E,"E",10,-14);

  // ratio tags
  s+=`<text x="220" y="360" font-size="22" ${styleText}>AB:AE = ${aAB}:${bAE}</text>`;
  s+=`<text x="540" y="360" font-size="22" ${styleText}>AC:AD = ${cAC}:${dAD}</text>`;

  return `<g>${s}</g>`;
}

function diagramDEFwithABC(){
  // Enforce:
  // A, B, D collinear with BD = AB  (D = 2B - A)
  // B, C, E collinear with CE = 2BC (E = C + 2(C - B))
  // A, C, F collinear with AF = 3AC (F = A + 3(A - C))  => C-A-F collinear

  // Base triangle ABC (fits nicely inside the 980x380 box)
  const A = {x:470, y:240};
  const B = {x:360, y:290};
  const C = {x:560, y:290};

  // Construct extension points (guaranteed collinear)
  const D = {x: 2*B.x - A.x, y: 2*B.y - A.y};                         // A-B-D
  const E = {x: C.x + 2*(C.x - B.x), y: C.y + 2*(C.y - B.y)};         // B-C-E
  const F = {x: A.x + 3*(A.x - C.x), y: A.y + 3*(A.y - C.y)};         // C-A-F

  const styleText=`font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="6" fill="#1f2a44"`;
  let s=``;

  // Show the three collinear extension lines clearly
  s+=`<line x1="${A.x}" y1="${A.y}" x2="${D.x}" y2="${D.y}" stroke="#1f2a44" stroke-width="3" opacity="0.7"/>`; // A-B-D line
  s+=`<line x1="${B.x}" y1="${B.y}" x2="${E.x}" y2="${E.y}" stroke="#1f2a44" stroke-width="3" opacity="0.7"/>`; // B-C-E line
  s+=`<line x1="${C.x}" y1="${C.y}" x2="${F.x}" y2="${F.y}" stroke="#1f2a44" stroke-width="3" opacity="0.7"/>`; // C-A-F line

  // Outer triangle DEF
  s+=`<polygon points="${D.x},${D.y} ${E.x},${E.y} ${F.x},${F.y}" fill="rgba(76,175,80,0.08)" stroke="#1f2a44" stroke-width="4"/>`;

  // Inner triangle ABC
  s+=`<polygon points="${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}" fill="rgba(33,150,243,0.10)" stroke="#1f2a44" stroke-width="3"/>`;

  function dot(p){ return `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#1f2a44"/>`; }
  function label(p,t,dx,dy){ return `<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${t}</text>`; }

  // Points
  s+=dot(A)+dot(B)+dot(C)+dot(D)+dot(E)+dot(F);
  s+=label(A,"A",-18,-14);
  s+=label(B,"B",-18,34);
  s+=label(C,"C",10,34);
  s+=label(D,"D",-18,34);
  s+=label(E,"E",10,34);
  s+=label(F,"F",-18,-14);

  return `<g>${s}</g>`;
}



/* ===================== Question Generators (6) ===================== */
function genQ1(){
  // AD:AB = 1:k, AE:AC = 1:m, area(ADE)=x => area(ABC)=x*k*m
  const k = randInt(4,8);
  const m = randInt(3,7);
  const areaADE = randInt(1,6);
  const areaABC = areaADE * k * m;

  const lines=[
    "(Q1) In triangle ABC, points D on AB and E on AC.",
    `AD:AB = 1:${k},  AE:AC = 1:${m}.`,
    `If area of triangle ADE is ${areaADE} cm², find area of triangle ABC.`,
    "(Enter one number, cm².)"
  ];

  const hint = hintCardSvg([
    "If D is on AB and E is on AC, then triangle ADE is similar-in-area scaling from triangle ABC.",
    "Area(ADE) = Area(ABC) × (AD/AB) × (AE/AC).",
    "So Area(ABC) = Area(ADE) ÷ [(AD/AB)(AE/AC)]."
  ], "Hint (Bird-Head model)");

  return {
    img: makeSvgQuestionCard(lines, diagramTriangleWithInsideDE(1/k, 1/m, "ADE")),
    diagram: hint,
    hintText: "Use Area(ADE) = Area(ABC) × (AD/AB) × (AE/AC).",
    answer: { type:"single", values:[areaABC], label:String(areaABC) }
  };
}

function genQ2(){
  // Given areaABC, find areaADE.
  // Choose ratios p1/q1 and p2/q2; pick areaABC as multiple of q1*q2 to keep integer.
  const q1 = randInt(5,9);   // AD:AB = 1:q1
  const p2 = randInt(2,4);   // AE:AC = p2:q2
  const q2 = randInt(p2+3, p2+8);

  // simplify p2/q2 if needed
  const g = gcd(p2,q2);
  const pp2 = p2/g, qq2 = q2/g;

  const t = randInt(1,4);
  const areaABC = q1 * qq2 * t; // ensures integer
  const areaADE = areaABC * (1/q1) * (pp2/qq2);

  const lines=[
    "(Q2) In triangle ABC, D is on AB and E is on AC.",
    `AD:AB = 1:${q1},  AE:AC = ${pp2}:${qq2}.`,
    `If area of triangle ABC is ${areaABC} cm², find area of triangle ADE.`,
    "(Enter one number, cm².)"
  ];

  const hint = hintCardSvg([
    "Area(ADE) = Area(ABC) × (AD/AB) × (AE/AC).",
    "Compute (AD/AB) and (AE/AC) from the given ratios, then multiply."
  ], "Hint (Product of ratios)");

  return {
    img: makeSvgQuestionCard(lines, diagramTriangleWithInsideDE(1/q1, pp2/qq2, "ADE")),
    diagram: hint,
    hintText: "Area(ADE) = Area(ABC) × (AD/AB) × (AE/AC).",
    answer: { type:"single", values:[areaADE], label:String(areaADE) }
  };
}

function genQ3(){
  // area(CDE) = area(ABC) × (CE/BC) × (CD/AC)
  const presets = [
    {mBC:2, nCE:1, pAC:5, qCD:2},   // factor 1/5
    {mBC:3, nCE:1, pAC:4, qCD:1},   // factor 1/12
    {mBC:4, nCE:1, pAC:5, qCD:1},   // factor 1/20
    {mBC:5, nCE:2, pAC:6, qCD:1},   // factor 1/15
    {mBC:3, nCE:2, pAC:5, qCD:2},   // factor 4/15
  ];
  const P = pick(presets);

  const num = P.nCE * P.qCD;
  const den = P.mBC * P.pAC;
  const g = gcd(num, den);
  const N = num/g, D = den/g;

  const areaABC = D * randInt(5,18); // multiple of denominator
  const areaCDE = areaABC * N / D;

  const lines=[
    "(Q3) In the diagram, B, C, E are on the same straight line (C between B and E).",
    `BC:CE = ${P.mBC}:${P.nCE},  and D lies on AC with AC:CD = ${P.pAC}:${P.qCD}.`,
    `If area of triangle ABC is ${areaABC} cm², find area of triangle CDE.`,
    "(Enter one number, cm².)"
  ];

  const hint = hintCardSvg([
    "Triangles with bases on the same line share the same height.",
    "Height of point D above line BCE scales linearly along AC (0 at C, full at A).",
    "So Area(CDE) = Area(ABC) × (CE/BC) × (CD/AC)."
  ], "Hint (Two-step scaling)");

  return {
    img: makeSvgQuestionCard(lines, diagramCDE_Extension(P.mBC, P.nCE, P.pAC, P.qCD)),
    diagram: hint,
    hintText: "Area(CDE) = Area(ABC) × (CE/BC) × (CD/AC).",
    answer: { type:"single", values:[areaCDE], label:String(areaCDE) }
  };
}

function genQ4(){
  // area(BDE) = area(ABC) × (BE/AB) × (BD/BC)
  // pick ratios then choose areaABC = AB*BC*t so that answer = t*BE*BD
  const AB_BE = pick([{a:2,b:5},{a:3,b:5},{a:4,b:7},{a:5,b:8}]);
  const BC_BD = pick([{c:3,d:5},{c:2,d:3},{c:4,d:7},{c:5,d:9}]);
  const t = randInt(1,4);

  const areaABC = AB_BE.a * BC_BD.c * t;
  const areaBDE = t * AB_BE.b * BC_BD.d;

  const lines=[
    "(Q4) Points A, B, E are collinear, and points B, C, D are collinear.",
    `AB:BE = ${AB_BE.a}:${AB_BE.b},  BC:BD = ${BC_BD.c}:${BC_BD.d}.`,
    `If area of triangle ABC is ${areaABC} cm², find area of triangle BDE.`,
    "(Enter one number, cm².)"
  ];

  const hint = hintCardSvg([
    "Triangle BDE uses the same angle at B as triangle ABC (a supplementary angle has the same sine).",
    "So area scales by the product of the two side scale factors:",
    "Area(BDE) = Area(ABC) × (BE/AB) × (BD/BC)."
  ], "Hint (Extension scaling)");

  return {
    img: makeSvgQuestionCard(lines, diagramBDE_Extend(AB_BE.a,AB_BE.b,BC_BD.c,BC_BD.d)),
    diagram: hint,
    hintText: "Area(BDE) = Area(ABC) × (BE/AB) × (BD/BC).",
    answer: { type:"single", values:[areaBDE], label:String(areaBDE) }
  };
}

function genQ5(){
  // hourglass: area(ADE) = area(ABC) × (AE/AB) × (AD/AC)
  const aAB = randInt(4,9);
  const bAE = randInt(2, aAB-1);

  const cAC = randInt(5,10);
  const dAD = randInt(2, cAC-1);

  const g1=gcd(aAB,bAE), g2=gcd(cAC,dAD);
  const A1=aAB/g1, B1=bAE/g1;
  const C1=cAC/g2, D1=dAD/g2;

  const t = randInt(1,4);
  const areaABC = A1 * C1 * t;
  const areaADE = t * B1 * D1;

  const lines=[
    "(Q5) Two triangles share point A (a 'bird-head' / hourglass layout).",
    `AB:AE = ${A1}:${B1},  AC:AD = ${C1}:${D1}.`,
    `If area of triangle ABC is ${areaABC} cm², find area of triangle ADE.`,
    "(Enter one number, cm².)"
  ];

  const hint = hintCardSvg([
    "Even across the intersection at A, the area scaling rule still works:",
    "Area(ADE) = Area(ABC) × (AE/AB) × (AD/AC).",
    "Compute AE/AB and AD/AC from the given ratios."
  ], "Hint (Bird-head hourglass)");

  return {
    img: makeSvgQuestionCard(lines, diagramHourglass(A1,B1,C1,D1)),
    diagram: hint,
    hintText: "Area(ADE) = Area(ABC) × (AE/AB) × (AD/AC).",
    answer: { type:"single", values:[areaADE], label:String(areaADE) }
  };
}

function genQ6(){
  // From vector-area derivation: Area(DEF) = 18 × Area(ABC)
  const areaABC = randInt(1,10);
  const areaDEF = 18 * areaABC;

  const lines=[
    "(Q6) In triangle ABC, extend AB to point D so that BD = AB.",
    "Extend BC to point E so that CE = 2BC.",
    "Extend CA to point F so that AF = 3AC.",
    `If area of triangle ABC is ${areaABC} cm², find area of triangle DEF.`,
    "(Enter one number, cm².)"
  ];

  const hint = hintCardSvg([
    "This classic extension model has a fixed area multiplier.",
    "With BD=AB, CE=2BC, AF=3AC (as defined), the outer triangle satisfies:",
    "Area(DEF) = 18 × Area(ABC)."
  ], "Hint (Fixed multiplier)");

  return {
    img: makeSvgQuestionCard(lines, diagramDEFwithABC()),
    diagram: hint,
    hintText: "Use the fixed result: Area(DEF) = 18 × Area(ABC).",
    answer: { type:"single", values:[areaDEF], label:String(areaDEF) }
  };
}

/* ===================== Build Questions ===================== */
function buildQuestions(){
  // 4 foundation + 2 applied
  return [genQ1(), genQ2(), genQ3(), genQ4(), genQ5(), genQ6()];
}

/* ===================== State ===================== */
let questions=[];
let currentQuestionIndex=0;
let studentName="Student";
let quizStartTime=null;
let quizEndTime=null;
let quizSubmitted=false;

let timerInterval=null;
let elapsedMs=0;
let isPaused=false;
let firstAttemptMs=null;

let setCounter=0;
let lastSignature="";

/* DOM */
const quizContent=document.getElementById("quizContent");
const sidebarEl=document.getElementById("sidebar");

const buttonContainer=document.getElementById("navButtons");
const backButton=document.getElementById("backButton");
const nextButton=document.getElementById("nextButton");
const submitButton=document.getElementById("submitButton");
const checkButton=document.getElementById("checkButton");
const saveButton=document.getElementById("saveButton");

const generateBtn=document.getElementById("generateButton");
const pauseButton=document.getElementById("pauseButton");
const exportQuestionsBtn=document.getElementById("exportQuestionsBtn");
const pdfPerPageSel=document.getElementById("pdfPerPage");

/* ===================== Timer ===================== */
function updateTimerDisplay(){
  let totalMs=elapsedMs;
  if(!isPaused && quizStartTime) totalMs+=(new Date()-quizStartTime);
  let text=`Time: ${formatMs(totalMs)}`;
  if(firstAttemptMs!==null) text+=` (First: ${formatMs(firstAttemptMs)})`;
  timerDisplay.textContent=text;
}
function startTimerInterval(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(updateTimerDisplay, 1000);
}
function pauseTimer(){
  if(isPaused || !quizStartTime) return;
  const now=new Date();
  elapsedMs+=now-quizStartTime;
  isPaused=true;
  quizStartTime=null;
  updateTimerDisplay();
}
function resumeTimer(){
  if(!isPaused) return;
  isPaused=false;
  quizStartTime=new Date();
  updateTimerDisplay();
}

/* ===================== Grading ===================== */
function gradeAnswer(userText, answer){
  const nums = parseNumbersFromInput(userText);
  if(answer.type==="single"){
    if(nums.length<1) return false;
    return approxEqual(nums[0], answer.values[0]);
  }
  return false;
}

/* ===================== Generate Quiz ===================== */
function signatureOf(built){
  return built.map(q=>q.answer.label).join("|");
}
function generateQuiz(){
  questions=[];
  quizSubmitted=false;

  let tries=0;
  let built=null;

  while(tries<40){
    built = buildQuestions();
    const sig = signatureOf(built);
    if(sig !== lastSignature){
      lastSignature = sig;
      break;
    }
    tries++;
  }

  setCounter++;
  setLine.textContent = `Set: ${setCounter}`;

  // map part index by counts
  const partBoundaries=[];
  let acc=0;
  for(let i=0;i<PARTS.length;i++){
    partBoundaries.push({start:acc, end:acc+PARTS[i].count-1});
    acc+=PARTS[i].count;
  }

  for(let i=0;i<built.length;i++){
    let partIndex=0;
    for(let p=0;p<partBoundaries.length;p++){
      if(i>=partBoundaries[p].start && i<=partBoundaries[p].end){ partIndex=p; break; }
    }
    const indexInPart = i - partBoundaries[partIndex].start;

    questions.push({
      partIndex,
      indexInPart,
      img: built[i].img,
      diagram: built[i].diagram || "",
      hint: built[i].hintText || "Use area-ratio (bird-head) ideas.",
      answer: built[i].answer,
      userValue:"",
      isCorrect:false
    });
  }
}

/* ===================== Sidebar ===================== */
function renderSidebar(){
  sidebarEl.style.display="block";
  sidebarEl.innerHTML=`<h4>Questions</h4><ul id="qList"></ul>`;
  const ul=document.getElementById("qList");

  for(let i=0;i<TOTAL_QUESTIONS;i++){
    const q=questions[i];
    const li=document.createElement("li");
    const label = `${PARTS[q.partIndex].level}${q.indexInPart+1}`;
    li.textContent=`Q${i+1} (${label})`;
    li.dataset.index=i;
    li.addEventListener("click",()=>{
      saveCurrentInput();
      currentQuestionIndex=i;
      renderQuestion();
    });
    ul.appendChild(li);
  }
  updateSidebarStatus();
}
function updateSidebarStatus(){
  const items=document.querySelectorAll("#qList li");
  items.forEach(li=>{
    const idx=Number(li.dataset.index);
    const q=questions[idx];
    li.classList.remove("active","answered","correct","incorrect");

    if(!quizSubmitted){
      li.classList.toggle("active", idx===currentQuestionIndex);
      if((q.userValue||"").trim()!=="") li.classList.add("answered");
    }else{
      if((q.userValue||"").trim()!==""){
        li.classList.add(q.isCorrect ? "correct" : "incorrect");
      }
    }
  });
}

/* ===================== Helpers ===================== */
function saveCurrentInput(){
  const input=document.getElementById("answerInput");
  if(input){
    questions[currentQuestionIndex].userValue=input.value.trim();
    if(quizSubmitted){
      const q=questions[currentQuestionIndex];
      q.isCorrect = gradeAnswer(q.userValue, q.answer);
      updateSidebarStatus();
    }
  }
}
function mountNavButtonsInto(slotId){
  const slot=document.getElementById(slotId);
  if(!slot) return;
  slot.appendChild(buttonContainer);
  buttonContainer.style.display="flex";
}

/* ===================== Render Question ===================== */
function renderQuestion(){
  const q=questions[currentQuestionIndex];

  const hintDiagramHtml = q.diagram
    ? `<div class="hint-diagram-wrap"><img src="${q.diagram}" alt="Hint diagram"></div>`
    : "";

  quizContent.innerHTML=`
    <p class="question-text">Question ${currentQuestionIndex+1} of ${TOTAL_QUESTIONS}</p>
    <div class="part-title">${escapeXml(PARTS[q.partIndex].title)}</div>

    <div class="single-question">
      <div style="font-weight:800;margin-bottom:8px;">
        ${escapeXml(PARTS[q.partIndex].level)} — Question ${q.indexInPart+1}
      </div>

      <div class="img-wrap">
        <img class="q-img" src="${q.img}" alt="Question image">
      </div>

      <div class="answer-row">
        <div style="font-weight:700;">Answer:</div>
        <input id="answerInput" class="answer-box" type="text"
               placeholder="e.g., 54"
               value="${escapeXml(q.userValue||"")}">
      </div>

      <div id="checkFeedback" style="display:none;"></div>

      <div class="hint-row">
        <button id="hintBtn" class="hint-btn">Hint</button>
      </div>

      <div id="hintBox" class="hint">
        <div>${escapeXml(q.hint)}</div>
        ${hintDiagramHtml}
      </div>
    </div>

    <div id="navSlot"></div>
  `;

  mountNavButtonsInto("navSlot");

  const hintBtn=document.getElementById("hintBtn");
  const hintBox=document.getElementById("hintBox");
  hintBtn.addEventListener("click", ()=>{
    const shown=hintBox.style.display==="block";
    hintBox.style.display = shown ? "none" : "block";
    hintBtn.textContent = shown ? "Hint" : "Hide Hint";
  });

  backButton.style.display="inline-block";
  backButton.style.visibility=(currentQuestionIndex===0)?"hidden":"visible";

  const isLast=(currentQuestionIndex===TOTAL_QUESTIONS-1);
  nextButton.style.display=isLast?"none":"inline-block";
  submitButton.style.display=isLast?"inline-block":"none";

  // During quiz: show Check always; After submit: show Check only if incorrect
  if(!quizSubmitted){
    checkButton.style.display="inline-block";
  }else{
    checkButton.style.display = (q.userValue||"").trim()!=="" && !q.isCorrect ? "inline-block" : "none";
  }

  saveButton.style.display=quizSubmitted?"inline-block":"none";

  updateSidebarStatus();
}

/* ===================== Results + Submit ===================== */
function calculateAndShowResults(){
  saveCurrentInput();

  const now=new Date();
  let attemptMs=elapsedMs;
  if(!isPaused && quizStartTime) attemptMs+=now-quizStartTime;
  if(firstAttemptMs===null) firstAttemptMs=attemptMs;

  const attemptStartTime=quizStartTime || now;
  quizEndTime=now;
  quizSubmitted=true;

  let correctCount=0;
  questions.forEach((q)=>{
    q.isCorrect = gradeAnswer(q.userValue, q.answer);
    if(q.isCorrect) correctCount++;
  });

  updateSidebarStatus();

  let html=`
    <h3>Results for ${escapeXml(studentName)}</h3>
    <p>Set: <strong>${setCounter}</strong></p>
    <p>Score: <strong>${correctCount} / ${TOTAL_QUESTIONS}</strong></p>
    <p>Start time: <strong>${attemptStartTime.toLocaleTimeString()}</strong></p>
    <p>Submit time: <strong>${quizEndTime.toLocaleTimeString()}</strong></p>
    <p>Time taken (this attempt): <strong>${formatMs(attemptMs)}</strong></p>
    <p>First attempt time: <strong>${formatMs(firstAttemptMs)}</strong></p>

    <table class="review-table">
      <tr>
        <th>#</th><th>Part</th><th>Image</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th>
      </tr>
  `;

  questions.forEach((q,i)=>{
    const partLbl = `${PARTS[q.partIndex].level}${q.indexInPart+1}`;
    const ua=(q.userValue||"").trim();
    const correctText = q.answer.label;

    html+=`
      <tr class="${q.isCorrect ? "correct-answer":"incorrect-answer"}">
        <td>${i+1}</td>
        <td>${escapeXml(partLbl)}</td>
        <td><img class="thumb" src="${q.img}" alt="Q${i+1}"></td>
        <td>${ua==="" ? "—" : escapeXml(ua)}</td>
        <td><strong>${escapeXml(correctText)}</strong></td>
        <td>${ua==="" ? "Not answered" : (q.isCorrect ? "Correct":"Incorrect")}</td>
      </tr>
    `;
  });

  html+=`</table><div id="navSlot"></div>`;
  quizContent.innerHTML=html;

  mountNavButtonsInto("navSlot");

  backButton.style.display="none";
  nextButton.style.display="none";
  submitButton.style.display="none";
  checkButton.style.display="none";
  saveButton.style.display="inline-block";
}

/* ===================== Buttons ===================== */
nextButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex<TOTAL_QUESTIONS-1){
    currentQuestionIndex++;
    renderQuestion();
  }
});
backButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex>0){
    currentQuestionIndex--;
    renderQuestion();
  }
});
submitButton.addEventListener("click", ()=>{
  if(currentQuestionIndex===TOTAL_QUESTIONS-1){
    calculateAndShowResults();
  }
});

checkButton.addEventListener("click", ()=>{
  saveCurrentInput();
  const q=questions[currentQuestionIndex];

  q.isCorrect = gradeAnswer(q.userValue, q.answer);
  updateSidebarStatus();

  const box=document.getElementById("checkFeedback");
  if(!box) return;

  box.className="check-feedback";
  box.style.display="block";

  if(q.isCorrect){
    box.innerHTML=`✅ Correct!`;
    if(quizSubmitted) checkButton.style.display="none";
  }else{
    box.innerHTML=`❌ Incorrect. Correct answer: <strong>${escapeXml(q.answer.label)}</strong>`;
    if(quizSubmitted) checkButton.style.display="inline-block";
  }
});

/* Save TXT */
function formatDateForFilename(date){
  if(!date) return "no_time";
  const pad=n=>String(n).padStart(2,"0");
  return date.getFullYear()+pad(date.getMonth()+1)+pad(date.getDate())+"_"+pad(date.getHours())+pad(date.getMinutes())+pad(date.getSeconds());
}
function saveCurrentResultAsTxt(){
  saveCurrentInput();

  let correctCount=0;
  questions.forEach(q=>{ if(q.isCorrect) correctCount++; });

  const lines=[];
  lines.push(QUIZ_TITLE + " — Current Result");
  lines.push("Student: "+studentName);
  lines.push("Set: "+setCounter);
  if(quizStartTime) lines.push("Start time: "+quizStartTime.toLocaleString());
  if(quizEndTime) lines.push("Last submit time: "+quizEndTime.toLocaleString());
  lines.push("Score: "+correctCount+" / "+TOTAL_QUESTIONS);
  if(firstAttemptMs!==null) lines.push("First attempt time: "+formatMs(firstAttemptMs));
  lines.push("");

  questions.forEach((q,i)=>{
    const partLbl = `${PARTS[q.partIndex].level}${q.indexInPart+1}`;
    const userAns=(q.userValue||"").trim()==="" ? "Not answered" : q.userValue;
    const resultText=(q.userValue||"").trim()==="" ? "Not answered" : (q.isCorrect?"Correct":"Incorrect");
    lines.push(`Q${i+1} (${partLbl})`);
    lines.push("Your answer: "+userAns);
    lines.push("Correct answer: "+q.answer.label);
    lines.push("Result: "+resultText);
    lines.push("");
  });

  const content=lines.join("\n");
  const blob=new Blob([content],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const safeName=studentName.replace(/[^a-z0-9_\-]/gi,"_")||"Student";
  const ts=formatDateForFilename(new Date());
  a.href=url;
  a.download=`BirdHead_${safeName}_Set${setCounter}_${ts}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
saveButton.addEventListener("click", saveCurrentResultAsTxt);

/* Pause/Resume (no pop-up) */
pauseButton.addEventListener("click", ()=>{
  if(!quizStartTime && elapsedMs===0 && !quizSubmitted) return;
  if(isPaused){ resumeTimer(); pauseButton.textContent="Pause"; }
  else { pauseTimer(); pauseButton.textContent="Resume"; }
});

/* Generate new set (NO confirm) */
generateBtn.addEventListener("click", ()=>{
  if(!quizSubmitted && !confirm("Generate a new random set? All answers will be lost.")) return;

  if(timerInterval) clearInterval(timerInterval);
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=new Date(); quizEndTime=null;
  updateTimerDisplay(); startTimerInterval();
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();
});

/* ===================== Export Questions PDF ===================== */
function waitForImages(container){
  const imgs = Array.from(container.querySelectorAll("img"));
  return Promise.all(imgs.map(img => {
    if(img.complete && img.naturalWidth > 0) return Promise.resolve();
    return new Promise(resolve => {
      img.onload = () => resolve();
      img.onerror = () => resolve();
    });
  }));
}
exportQuestionsBtn.addEventListener("click", async ()=>{
  if(!questions || questions.length===0){
    alert("Please start a quiz first.");
    return;
  }
  if(!window.jspdf || !window.jspdf.jsPDF){
    alert("PDF export needs internet to load jsPDF/html2canvas (CDN). The quiz itself works offline.");
    return;
  }

  const perPage = Number(pdfPerPageSel.value || 3);

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  const wrapper=document.createElement("div");
  wrapper.style.position="fixed";
  wrapper.style.left="-9999px";
  wrapper.style.top="0";
  wrapper.style.width="800px";
  wrapper.style.background="#ffffff";
  document.body.appendChild(wrapper);

  try{
    let pageDiv=null;

    questions.forEach((q, idx)=>{
      if(idx%perPage===0){
        pageDiv=document.createElement("div");
        pageDiv.style.padding="20px";
        pageDiv.style.marginBottom="20px";
        pageDiv.style.boxSizing="border-box";

        const header=document.createElement("div");
        header.innerHTML=`
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <div style="width:24px;height:24px;background:#0d47a1;border-radius:6px;position:relative;">
              <div style="position:absolute;width:12px;height:5px;background:#ff9800;top:-4px;left:12px;border-radius:3px;"></div>
            </div>
            <div style="display:flex;flex-direction:column;line-height:1.1;">
              <div style="font-weight:900;letter-spacing:1px;color:#ff9800;font-size:14px;">DYAA</div>
              <div style="font-size:11px;color:#0d47a1;font-weight:700;">EDUCATION</div>
            </div>
          </div>
          <hr style="border:none;border-top:1px solid #e0e0e0;margin:0 0 12px 0;">
          <div style="font-weight:800;color:#1f2a44;margin:0 0 4px 0;">${LESSON_TITLE}</div>
          <div style="color:#546e7a;font-weight:800;margin:0 0 10px 0;">Questions (Set ${setCounter})</div>
        `;
        pageDiv.appendChild(header);
        wrapper.appendChild(pageDiv);
      }

      const qDiv=document.createElement("div");
      qDiv.style.marginBottom="18px";
      qDiv.innerHTML=`
        <div style="font-weight:700;margin:4px 0 6px 0;">Q${idx+1}</div>
        <div style="border-radius:12px;border:1px solid #e5e5e5;padding:12px;">
          <img src="${q.img}" style="width:100%;height:auto;border-radius:10px;" />
        </div>
      `;
      pageDiv.appendChild(qDiv);
    });

    const pages=Array.from(wrapper.children);

    for(let i=0;i<pages.length;i++){
      await waitForImages(pages[i]);

      const canvas = await html2canvas(pages[i], { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
      const imgData = canvas.toDataURL("image/png");

      const imgWidth = pageWidth - 20;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;

      if(i>0) pdf.addPage();
      pdf.addImage(imgData, "PNG", 10, 10, imgWidth, Math.min(imgHeight, pageHeight - 20));
    }

    const safeName=(studentName||"Student").replace(/[^a-z0-9_\-]/gi,"_") || "Student";
    const ts=formatDateForFilename(new Date());
    pdf.save(`BirdHead_Questions_${safeName}_Set${setCounter}_${ts}.pdf`);
  } finally {
    document.body.removeChild(wrapper);
  }
});

/* ===================== Start Screen (+ optional ?name=Tiger) ===================== */
function getNameFromUrl(){
  const url=new URL(window.location.href);
  const name=url.searchParams.get("name");
  return name ? name.trim() : "";
}
function showStartScreen(){
  sidebarEl.style.display="none";
  buttonContainer.style.display="none";
  generateBtn.style.display="none";
  saveButton.style.display="none";
  pauseButton.style.display="none";
  exportQuestionsBtn.style.display="none";

  studentLine.textContent="";
  setLine.textContent="";

  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=null; quizEndTime=null;
  updateTimerDisplay();

  const preset=getNameFromUrl();
  if(preset){
    studentName=preset;
    studentLine.textContent=`Student: ${studentName}`;
    startQuiz(true);
    return;
  }

  quizContent.innerHTML=`
    <p>This quiz has <strong>${TOTAL_QUESTIONS}</strong> questions.</p>
    <ul style="margin-top:6px;color:#555;line-height:1.7;">
      <li><strong>Foundation:</strong> 4 questions</li>
      <li><strong>Applied:</strong> 2 questions</li>
    </ul>
    <p style="margin-top:10px;">Enter your name to begin:</p>

    <input id="nameInput" type="text"
      style="padding:10px;width:260px;font-size:1.05em;border:1px solid #ccc;border-radius:10px;"
      placeholder="Your name">

    <button id="startButton"
      style="margin-left:10px;background:#4caf50;padding:10px 20px;color:white;border:none;border-radius:8px;">
      Start Quiz
    </button>
  `;
  document.getElementById("startButton").addEventListener("click", ()=>startQuiz(false));
}
function startQuiz(skipReadName){
  if(!skipReadName){
    const nameInput=document.getElementById("nameInput");
    studentName=(nameInput.value || "Student").trim();
  }
  studentLine.textContent=`Student: ${studentName}`;

  quizStartTime=new Date();
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  updateTimerDisplay(); startTimerInterval();

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();

  generateBtn.style.display="inline-block";
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";
  exportQuestionsBtn.style.display="inline-block";
}

/* ===================== Init ===================== */
showStartScreen();
</script>
