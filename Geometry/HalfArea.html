<script>
/* ===================== CONFIG ===================== */
const SVG_TITLE = "Model 12 — Half Model";
const LESSON_TITLE = "Model 12 — Half Model (Shaded Area)";

const PART_TITLES = [
  "Part 1 (Basic) — Half of a parallelogram/rectangle (2 questions)",
  "Part 2 (Composite) — Half-area patterns in a rectangle (2 questions)",
  "Part 3 (Advanced) — Half-model & opposite-sum model (2 questions)"
];
const PART_LABELS = ["Basic","Composite","Advanced"];

const NUM_PARTS = 3;
const QUESTIONS_PER_PART = 2;
const TOTAL_QUESTIONS = NUM_PARTS * QUESTIONS_PER_PART;

/* ===================== Utils ===================== */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

function formatMs(ms){
  const totalSec=Math.floor(ms/1000), min=Math.floor(totalSec/60), sec=totalSec%60;
  return `${String(min).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
function escapeXml(s){
  return String(s)
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&apos;");
}
function wrapLines(lines, maxChars=70){
  const out=[];
  function pushWrapped(line){
    const words=String(line).split(/\s+/).filter(Boolean);
    if(words.length===0){ out.push(""); return; }
    let cur="";
    for(const w of words){
      if(w.length>maxChars){
        if(cur){ out.push(cur); cur=""; }
        for(let i=0;i<w.length;i+=maxChars) out.push(w.slice(i,i+maxChars));
        continue;
      }
      if(!cur) cur=w;
      else if((cur+" "+w).length<=maxChars) cur+=" "+w;
      else { out.push(cur); cur=w; }
    }
    if(cur) out.push(cur);
  }
  for(const line of lines) pushWrapped(line);
  return out;
}
function svgDataUri(svg){
  const encoded=encodeURIComponent(svg)
    .replaceAll("%0A","").replaceAll("%20"," ")
    .replaceAll("%3D","=").replaceAll("%3A",":")
    .replaceAll("%2F","/").replaceAll("%2C",",");
  return "data:image/svg+xml;charset=utf-8," + encoded;
}

/* Parse numbers from user input */
function parseNumbersFromInput(str){
  const s=(str||"").trim();
  if(!s) return [];
  const out=[];
  const re=/([+-]?\d+\s*\/\s*[+-]?\d+)|([+-]?\d+(?:\.\d+)?)/g;
  let m;
  while((m=re.exec(s))!==null){
    const token=(m[1]||m[2]||"").replace(/\s+/g,"");
    if(token.includes("/")){
      const [a,b]=token.split("/");
      const n=Number(a), d=Number(b);
      if(Number.isFinite(n)&&Number.isFinite(d)&&d!==0) out.push(n/d);
    }else{
      const v=Number(token);
      if(Number.isFinite(v)) out.push(v);
    }
  }
  return out;
}
function approxEqual(a,b,tol=1e-6){ return Math.abs(a-b)<=tol; }

/* ===================== SVG Question Card ===================== */
function makeSvgQuestionCard(lines, diagramMarkup, titleText=SVG_TITLE){
  const W=980, headerH=72, padX=44, textLineH=36, topY=headerH+48;
  const wrapped=wrapLines(lines, 72);
  const textBlockH = wrapped.length * textLineH;
  const diagramY = topY + textBlockH + 18;
  const diagramH = 360;
  const padBottom = 54;
  const H = diagramY + diagramH + padBottom;

  const textSpans=wrapped.map((t,i)=>{
    const y=topY + i*textLineH;
    return `<text x="${padX}" y="${y}" font-size="28" fill="#1f2a44" font-family="Segoe UI, Arial">${escapeXml(t)}</text>`;
  }).join("");

  const svg=`
  <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#f7fbff"/>
        <stop offset="1" stop-color="#ffffff"/>
      </linearGradient>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/>
      </filter>
      <clipPath id="clipBox">
        <rect x="44" y="0" width="${W-88}" height="${diagramH}" rx="16" ry="16"></rect>
      </clipPath>
    </defs>

    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${H-36}"
          fill="url(#g)" stroke="#dfe7f2" stroke-width="3" filter="url(#shadow)"/>
    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${headerH}"
          fill="#0d47a1" opacity="0.10"/>

    <text x="${padX}" y="56" font-size="28" fill="#0d47a1" font-weight="700"
          font-family="Segoe UI, Arial">${escapeXml(titleText)}</text>

    ${textSpans}

    <g transform="translate(0, ${diagramY})">
      <rect x="44" y="0" width="${W-88}" height="${diagramH}" rx="16" ry="16"
            fill="#ffffff" stroke="#e5e5e5" stroke-width="3"/>
      <g clip-path="url(#clipBox)">
        ${diagramMarkup}
      </g>
    </g>
  </svg>`.trim();

  return svgDataUri(svg);
}

function hintCardSvg(lines, title="Hint"){
  const W=980, headerH=60, padX=44, lineH=34, firstLineY=headerH+44, padBottom=44;
  const wrapped=wrapLines(lines, 84);
  const H=firstLineY + (wrapped.length-1)*lineH + padBottom;

  const textSpans=wrapped.map((t,i)=>{
    const y=firstLineY + i*lineH;
    return `<text x="${padX}" y="${y}" font-size="24" fill="#1f2a44" font-family="Segoe UI, Arial">${escapeXml(t)}</text>`;
  }).join("");

  const svg=`
  <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ffffff"/>
        <stop offset="1" stop-color="#fff7e6"/>
      </linearGradient>
      <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.10"/>
      </filter>
    </defs>

    <rect x="18" y="18" rx="18" ry="18" width="${W-36}" height="${H-36}"
          fill="url(#bg)" stroke="#ffe0b2" stroke-width="3" filter="url(#shadow2)"/>

    <text x="${padX}" y="52" font-size="26" fill="#8d6e63" font-weight="800"
          font-family="Segoe UI, Arial">${escapeXml(title)}</text>

    ${textSpans}
  </svg>`.trim();

  return svgDataUri(svg);
}

/* ===================== Diagram builders ===================== */
function diagramParallelogramHalf(){
  const styleText = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="7" fill="#1f2a44"`;
  const A={x:240,y:110}, B={x:760,y:110}, C={x:840,y:270}, D={x:320,y:270};
  const P={x:540,y:270};

  let s=``;
  s+=`<polygon points="${A.x},${A.y} ${D.x},${D.y} ${P.x},${P.y}" fill="rgba(76,175,80,0.18)"/>`;
  s+=`<polygon points="${B.x},${B.y} ${C.x},${C.y} ${P.x},${P.y}" fill="rgba(76,175,80,0.18)"/>`;
  s+=`<polygon points="${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y} ${D.x},${D.y}" fill="none" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${A.x}" y1="${A.y}" x2="${P.x}" y2="${P.y}" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${B.x}" y1="${B.y}" x2="${P.x}" y2="${P.y}" stroke="#1f2a44" stroke-width="4"/>`;

  const label=(p,t,dx,dy)=>`<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${t}</text>`;
  s+=label(A,"A",-18,-14);
  s+=label(B,"B",10,-14);
  s+=label(C,"C",10,32);
  s+=label(D,"D",-18,32);
  s+=`<circle cx="${P.x}" cy="${P.y}" r="6" fill="#1f2a44"/>`;
  s+=label(P,"P",10,28);

  return `<g>${s}</g>`;
}

function diagramShearedRectangleHalf(){
  const styleText = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="7" fill="#1f2a44"`;
  const A={x:240,y:120}, B={x:720,y:120}, C={x:800,y:270}, D={x:320,y:270};
  const V1={x:720,y:120}, V2={x:720,y:270};

  s+=`<line x1="${V1.x}" y1="${V1.y}" x2="${V2.x}" y2="${V2.y}" stroke="#1f2a44" stroke-width="3" opacity="0.9"/>`;

}

function diagramHalfZigzagRectangle(){
  const styleText = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="7" fill="#1f2a44"`;

  const x0=240, y0=95, W=560, H=220;
  const x1=x0+W, y1=y0+H;
  const yMid=y0+H/2;

  const A={x:x0,y:y0}, B={x:x1,y:y0}, C={x:x1,y:y1}, D={x:x0,y:y1};
  const F={x:x0,y:yMid}, E={x:x1,y:yMid};

  const Ptop={x:x0+W/2,y:y0};
  const Pbot={x:x0+W/2,y:y1};

  const M1={x:x0+W/4,y:yMid};
  const M2={x:x0+3*W/4,y:yMid};

  let s=``;

  s+=`<polygon points="${A.x},${A.y} ${F.x},${F.y} ${M1.x},${M1.y}" fill="rgba(76,175,80,0.18)"/>`;
  s+=`<polygon points="${M1.x},${M1.y} ${Ptop.x},${Ptop.y} ${M2.x},${M2.y}" fill="rgba(76,175,80,0.18)"/>`;
  s+=`<polygon points="${B.x},${B.y} ${E.x},${E.y} ${M2.x},${M2.y}" fill="rgba(76,175,80,0.18)"/>`;

  s+=`<polygon points="${D.x},${D.y} ${F.x},${F.y} ${M1.x},${M1.y}" fill="rgba(76,175,80,0.18)"/>`;
  s+=`<polygon points="${M1.x},${M1.y} ${Pbot.x},${Pbot.y} ${M2.x},${M2.y}" fill="rgba(76,175,80,0.18)"/>`;
  s+=`<polygon points="${C.x},${C.y} ${E.x},${E.y} ${M2.x},${M2.y}" fill="rgba(76,175,80,0.18)"/>`;

  s+=`<rect x="${x0}" y="${y0}" width="${W}" height="${H}" fill="none" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${F.x}" y1="${F.y}" x2="${E.x}" y2="${E.y}" stroke="#1f2a44" stroke-width="3"/>`;

  s+=`<line x1="${A.x}" y1="${A.y}" x2="${M1.x}" y2="${M1.y}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${Ptop.x}" y1="${Ptop.y}" x2="${M1.x}" y2="${M1.y}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${Ptop.x}" y1="${Ptop.y}" x2="${M2.x}" y2="${M2.y}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${B.x}" y1="${B.y}" x2="${M2.x}" y2="${M2.y}" stroke="#1f2a44" stroke-width="3"/>`;

  s+=`<line x1="${D.x}" y1="${D.y}" x2="${M1.x}" y2="${M1.y}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${Pbot.x}" y1="${Pbot.y}" x2="${M1.x}" y2="${M1.y}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${Pbot.x}" y1="${Pbot.y}" x2="${M2.x}" y2="${M2.y}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${C.x}" y1="${C.y}" x2="${M2.x}" y2="${M2.y}" stroke="#1f2a44" stroke-width="3"/>`;

  const label=(p,t,dx,dy)=>`<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${t}</text>`;
  s+=label(A,"A",-18,-14);
  s+=label(B,"B",10,-14);
  s+=label(C,"C",10,32);
  s+=label(D,"D",-18,32);
  s+=label(F,"F",-18,10);
  s+=label(E,"E",10,10);

  return `<g>${s}</g>`;
}

function diagramFourRectanglesHalf(){
  const styleText = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="7" fill="#1f2a44"`;

  const x0=260, y0=95, W=520, H=240;
  const x1=x0+W, y1=y0+H;
  const xMid=x0+W/2, yMid=y0+H/2;

  const A={x:x0,y:y0}, B={x:x1,y:y0}, C={x:x1,y:y1}, D={x:x0,y:y1};

  let s=``;
  s+=`<polygon points="${x0},${yMid} ${xMid},${yMid} ${(x0+xMid)/2},${y0}" fill="rgba(76,175,80,0.18)"/>`;
  s+=`<polygon points="${xMid},${yMid} ${x1},${yMid} ${(xMid+x1)/2},${y0}" fill="rgba(76,175,80,0.18)"/>`;
  s+=`<polygon points="${x0},${y1} ${xMid},${y1} ${xMid},${yMid}" fill="rgba(76,175,80,0.18)"/>`;
  s+=`<polygon points="${xMid},${y1} ${x1},${y1} ${xMid},${yMid}" fill="rgba(76,175,80,0.18)"/>`;

  s+=`<rect x="${x0}" y="${y0}" width="${W}" height="${H}" fill="none" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${xMid}" y1="${y0}" x2="${xMid}" y2="${y1}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${x0}" y1="${yMid}" x2="${x1}" y2="${yMid}" stroke="#1f2a44" stroke-width="3"/>`;

  s+=`<line x1="${x0}" y1="${yMid}" x2="${(x0+xMid)/2}" y2="${y0}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${xMid}" y1="${yMid}" x2="${(x0+xMid)/2}" y2="${y0}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${xMid}" y1="${yMid}" x2="${(xMid+x1)/2}" y2="${y0}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${x1}" y1="${yMid}" x2="${(xMid+x1)/2}" y2="${y0}" stroke="#1f2a44" stroke-width="3"/>`;

  s+=`<line x1="${x0}" y1="${y1}" x2="${xMid}" y2="${yMid}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${xMid}" y1="${y1}" x2="${xMid}" y2="${yMid}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${x1}" y1="${y1}" x2="${xMid}" y2="${yMid}" stroke="#1f2a44" stroke-width="3"/>`;

  const label=(p,t,dx,dy)=>`<text x="${p.x+dx}" y="${p.y+dy}" font-size="26" ${styleText}>${t}</text>`;
  s+=label(A,"A",-18,-14);
  s+=label(B,"B",10,-14);
  s+=label(C,"C",10,32);
  s+=label(D,"D",-18,32);

  return `<g>${s}</g>`;
}

/* NEW: Q5 diagram — square split into 4 small rectangles, each shaded triangle is half of its small rectangle */
function diagramSquareFourRectsHalfModel(){
  const styleText = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="7" fill="#1f2a44"`;

  const x0=300, y0=85, S=260;
  const x1=x0+S, y1=y0+S;
  const xMid=x0+S/2, yMid=y0+S/2;
  const C={x:xMid,y:yMid};

  let s=``;

  // shaded triangles (one in each small square, each is half of that small square)
  // TL: base on top edge of TL
  s+=`<polygon points="${x0},${y0} ${xMid},${y0} ${xMid},${yMid}" fill="rgba(120,144,156,0.28)"/>`;
  // TR: base on right edge of TR
  s+=`<polygon points="${x1},${y0} ${x1},${yMid} ${xMid},${yMid}" fill="rgba(120,144,156,0.28)"/>`;
  // BL: base on left edge of BL
  s+=`<polygon points="${x0},${yMid} ${x0},${y1} ${xMid},${yMid}" fill="rgba(120,144,156,0.28)"/>`;
  // BR: base on bottom edge of BR
  s+=`<polygon points="${xMid},${y1} ${x1},${y1} ${xMid},${yMid}" fill="rgba(120,144,156,0.28)"/>`;

  // outline + grid
  s+=`<rect x="${x0}" y="${y0}" width="${S}" height="${S}" fill="none" stroke="#1f2a44" stroke-width="4"/>`;
  s+=`<line x1="${xMid}" y1="${y0}" x2="${xMid}" y2="${y1}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${x0}" y1="${yMid}" x2="${x1}" y2="${yMid}" stroke="#1f2a44" stroke-width="3"/>`;

  // show triangle edges (to resemble worksheet)
  s+=`<line x1="${xMid}" y1="${yMid}" x2="${x0}" y2="${y0}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${xMid}" y1="${yMid}" x2="${xMid}" y2="${y0}" stroke="#1f2a44" stroke-width="3"/>`;

  s+=`<line x1="${xMid}" y1="${yMid}" x2="${x1}" y2="${y0}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${xMid}" y1="${yMid}" x2="${x1}" y2="${yMid}" stroke="#1f2a44" stroke-width="3"/>`;

  s+=`<line x1="${xMid}" y1="${yMid}" x2="${x0}" y2="${yMid}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${xMid}" y1="${yMid}" x2="${x0}" y2="${y1}" stroke="#1f2a44" stroke-width="3"/>`;

  s+=`<line x1="${xMid}" y1="${yMid}" x2="${xMid}" y2="${y1}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${xMid}" y1="${yMid}" x2="${x1}" y2="${y1}" stroke="#1f2a44" stroke-width="3"/>`;

  s+=`<circle cx="${C.x}" cy="${C.y}" r="6" fill="#1f2a44"/>`;

  s+=`<text x="${xMid}" y="${y1+55}" text-anchor="middle" font-size="22" ${styleText}>4 equal small rectangles</text>`;
  s+=`<text x="${xMid}" y="${y1+85}" text-anchor="middle" font-size="22" ${styleText}>Each shaded triangle = 1/2 of its small rectangle</text>`;

  return `<g>${s}</g>`;
}

/* NEW: Q6 diagram — rectangle split into 4 colored triangles by an interior point */
function diagramFourColorRect(yellowA, redA, greenA, blueA){
  const styleText = `font-family="Segoe UI, Arial" paint-order="stroke" stroke="#ffffff" stroke-width="7" fill="#1f2a44"`;

  const x0=190, y0=95, W=600, H=240;
  const x1=x0+W, y1=y0+H;

  const A={x:x0,y:y0}, B={x:x1,y:y0}, C={x:x1,y:y1}, D={x:x0,y:y1};
  const P={x:x0+W*0.38, y:y0+H*0.58};

  let s=``;

  // fills (light)
  s+=`<polygon points="${A.x},${A.y} ${B.x},${B.y} ${P.x},${P.y}" fill="rgba(255,235,59,0.20)"/>`;  // Yellow (top)
  s+=`<polygon points="${B.x},${B.y} ${C.x},${C.y} ${P.x},${P.y}" fill="rgba(33,150,243,0.18)"/>`;  // Blue (right)
  s+=`<polygon points="${C.x},${C.y} ${D.x},${D.y} ${P.x},${P.y}" fill="rgba(76,175,80,0.18)"/>`;   // Green (bottom)
  s+=`<polygon points="${D.x},${D.y} ${A.x},${A.y} ${P.x},${P.y}" fill="rgba(244,67,54,0.14)"/>`;    // Red (left)

  // border
  s+=`<rect x="${x0}" y="${y0}" width="${W}" height="${H}" fill="none" stroke="#1f2a44" stroke-width="4"/>`;

  // lines from corners to P
  s+=`<line x1="${A.x}" y1="${A.y}" x2="${P.x}" y2="${P.y}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${B.x}" y1="${B.y}" x2="${P.x}" y2="${P.y}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${C.x}" y1="${C.y}" x2="${P.x}" y2="${P.y}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<line x1="${D.x}" y1="${D.y}" x2="${P.x}" y2="${P.y}" stroke="#1f2a44" stroke-width="3"/>`;
  s+=`<circle cx="${P.x}" cy="${P.y}" r="6" fill="#1f2a44"/>`;

  // labels with areas
  s+=`<text x="${x0+W*0.50}" y="${y0+H*0.22}" text-anchor="middle" font-size="26" ${styleText}>Yellow: ${yellowA}</text>`;
  s+=`<text x="${x0+W*0.84}" y="${y0+H*0.56}" text-anchor="middle" font-size="26" ${styleText}>Blue: ?</text>`;
  s+=`<text x="${x0+W*0.48}" y="${y0+H*0.83}" text-anchor="middle" font-size="26" ${styleText}>Green: ${greenA}</text>`;
  s+=`<text x="${x0+W*0.15}" y="${y0+H*0.56}" text-anchor="middle" font-size="26" ${styleText}>Red: ${redA}</text>`;

  return `<g>${s}</g>`;
}

/* ===================== Question Generators (exactly 6) ===================== */
/* Answer format: type:"single", values:[number], label:"..." */

function genQ1ParallelogramHalf(){
  const totalArea = randInt(18,70)*2; // even
  const shaded = totalArea/2;

  const lines = [
    "(Basic) Half Model — Parallelogram",
    `The area of parallelogram ABCD is ${totalArea} cm².`,
    "Point P is on the bottom base DC. Segments AP and BP are drawn.",
    "Find the area of the shaded region.",
    "(Enter one integer, in cm².)"
  ];

  const hint = hintCardSvg([
    "Triangle ABP has the same base AB as the parallelogram and the same height (distance between the parallel lines).",
    "So area(△ABP) = 1/2 × area(parallelogram).",
    "The shaded part is the rest of the parallelogram, so it is also half."
  ], "Hint (Half Model)");

  return {
    img: makeSvgQuestionCard(lines, diagramParallelogramHalf()),
    diagram: hint,
    hintText: "Use: a triangle with the same base and height as a parallelogram has half the area.",
    answer: { type:"single", values:[shaded], label:`${shaded}` }
  };
}

function genQ2ShearedRectHalf(){
  const rectArea = randInt(10,60)*2; // even
  const shaded = rectArea/2;

  const lines = [
    "(Basic) Half Model — Diagonal in a Parallelogram",
    `A rectangle has area ${rectArea} cm².`,
    "It is sheared into a parallelogram (same base and same height).",
    "A diagonal is drawn, and the shaded region is one side of the diagonal.",
    "Find the shaded area.",
    "(Enter one integer, in cm².)"
  ];

  const hint = hintCardSvg([
    "Shearing keeps base and height, so the area stays the same.",
    "A diagonal splits a parallelogram into two equal-area triangles.",
    "So the shaded area is half of the whole area."
  ], "Hint (Diagonal halves)");

  return {
    img: makeSvgQuestionCard(lines, diagramShearedRectangleHalf()),
    diagram: hint,
    hintText: "Shear does not change area. A diagonal splits a parallelogram into 2 equal halves.",
    answer: { type:"single", values:[shaded], label:`${shaded}` }
  };
}

function genQ3ZigzagRectHalf(){
  let L=randInt(16,30);
  let W=randInt(8,18);
  if((L*W)%2!==0) L+=1; // make even
  const total=L*W;
  const shaded=total/2;

  const lines = [
    "(Composite) Half Model — Rectangle ABCD",
    "Rectangles ABEF and CDFE are combined to form rectangle ABCD.",
    `AB = ${L} cm and AD = ${W} cm.`,
    "The inside is partitioned into triangles as shown.",
    "Find the total shaded area.",
    "(Enter one integer, in cm².)"
  ];

  const hint = hintCardSvg([
    "The triangle pattern forms a half-area model.",
    "The shaded region is exactly half of rectangle ABCD.",
    "So shaded area = (AB × AD) ÷ 2."
  ], "Hint (Half of the rectangle)");

  return {
    img: makeSvgQuestionCard(lines, diagramHalfZigzagRectangle()),
    diagram: hint,
    hintText: "This pattern represents half of the whole rectangle.",
    answer: { type:"single", values:[shaded], label:`${shaded}` }
  };
}

function genQ4FourRectsHalf(){
  const totalArea = randInt(12,50)*2; // even
  const shaded = totalArea/2;

  const lines = [
    "(Composite) Half Model — 4 smaller rectangles",
    "Rectangle ABCD is divided into four smaller rectangles.",
    `The area of rectangle ABCD is ${totalArea} cm².`,
    "Find the area of the shaded region.",
    "(Enter one integer, in cm².)"
  ];

  const hint = hintCardSvg([
    "Each shaded triangle is half of its small rectangle (same base and same height).",
    "Adding the halves gives half of the whole rectangle.",
    "So shaded area = (total area) ÷ 2."
  ], "Hint (Add halves)");

  return {
    img: makeSvgQuestionCard(lines, diagramFourRectanglesHalf()),
    diagram: hint,
    hintText: "Each small rectangle contributes a half; total shaded is half of ABCD.",
    answer: { type:"single", values:[shaded], label:`${shaded}` }
  };
}

/* NEW Q5 (from your image): big square split into 4 small rectangles; total area given */
function genQ5BigSquareFourRects(){
  const totalArea = pick([20,24,28,32,36,40,44,48,52,56,60]); // keep nice even values
  const shaded = totalArea/2;

  const lines = [
    "(Advanced) Half Model — Big square split into 4 small rectangles",
    `A big square is divided into 4 equal small rectangles. The area of the big square is ${totalArea} cm².`,
    "The shaded parts are shown in the diagram.",
    "Find the total shaded area.",
    "(Enter one integer, in cm².)"
  ];

  const hint = hintCardSvg([
    "The 4 small rectangles have equal area.",
    "In each small rectangle, the shaded triangle is exactly half of that small rectangle.",
    "So total shaded area = 1/2 of the big square area."
  ], "Hint (Half in each part)");

  return {
    img: makeSvgQuestionCard(lines, diagramSquareFourRectsHalfModel()),
    diagram: hint,
    hintText: "Each small rectangle contributes half its area → overall shaded is half of the big square.",
    answer: { type:"single", values:[shaded], label:`${shaded}` }
  };
}

/* NEW Q6 (from your image): rectangle split into 4 colored triangles, find Blue */
function genQ6FourColorRectangle(){
  // random but always integer and positive
  const yellow = randInt(12,30);
  const green  = randInt(6,20);
  const halfTotal = yellow + green;

  // pick red so blue stays positive
  const red = randInt(4, Math.max(4, halfTotal-2));
  const blue = halfTotal - red;

  const lines = [
    "(Advanced) Opposite-sum model in a rectangle",
    "A rectangle is divided into 4 triangles by joining an interior point to the 4 corners.",
    `Red triangle area = ${red} cm², Yellow triangle area = ${yellow} cm², Green triangle area = ${green} cm².`,
    "Find the area of the Blue triangle.",
    "(Enter one integer, in cm².)"
  ];

  const hint = hintCardSvg([
    "In a rectangle (or any parallelogram):",
    "Area(Top) + Area(Bottom) = Area(Left) + Area(Right) = half of the rectangle area.",
    "So Blue = (Yellow + Green) − Red."
  ], "Hint (Opposite sums)");

  return {
    img: makeSvgQuestionCard(lines, diagramFourColorRect(yellow, red, green, blue)),
    diagram: hint,
    hintText: "Use: Yellow + Green = Red + Blue ⇒ Blue = (Yellow + Green) − Red.",
    answer: { type:"single", values:[blue], label:`${blue}` }
  };
}

/* ===================== Build exactly 6 questions ===================== */
function buildSixQuestions(){
  return [
    genQ1ParallelogramHalf(),
    genQ2ShearedRectHalf(),
    genQ3ZigzagRectHalf(),
    genQ4FourRectsHalf(),
    genQ5BigSquareFourRects(),
    genQ6FourColorRectangle()
  ];
}

/* ===================== State ===================== */
let questions=[];
let currentQuestionIndex=0;
let studentName="Student";
let quizStartTime=null;
let quizEndTime=null;
let quizSubmitted=false;

let timerInterval=null;
let elapsedMs=0;
let isPaused=false;
let firstAttemptMs=null;

let setCounter=0;
let lastSignature="";

/* DOM */
const quizContent=document.getElementById("quizContent");
const sidebarEl=document.getElementById("sidebar");

const buttonContainer=document.getElementById("navButtons");
const backButton=document.getElementById("backButton");
const nextButton=document.getElementById("nextButton");
const submitButton=document.getElementById("submitButton");
const checkButton=document.getElementById("checkButton");
const saveButton=document.getElementById("saveButton");

const generateBtn=document.getElementById("generateButton");
const pauseButton=document.getElementById("pauseButton");
const exportQuestionsBtn=document.getElementById("exportQuestionsBtn");

const timerDisplay=document.getElementById("timerDisplay");
const studentLine=document.getElementById("studentLine");
const setLine=document.getElementById("setLine");

/* ===================== Timer ===================== */
function updateTimerDisplay(){
  let totalMs=elapsedMs;
  if(!isPaused && quizStartTime) totalMs+=(new Date()-quizStartTime);
  let text=`Time: ${formatMs(totalMs)}`;
  if(firstAttemptMs!==null) text+=` (First: ${formatMs(firstAttemptMs)})`;
  timerDisplay.textContent=text;
}
function startTimerInterval(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(updateTimerDisplay, 1000);
}
function pauseTimer(){
  if(isPaused || !quizStartTime) return;
  const now=new Date();
  elapsedMs+=now-quizStartTime;
  isPaused=true;
  quizStartTime=null;
  updateTimerDisplay();
}
function resumeTimer(){
  if(!isPaused) return;
  isPaused=false;
  quizStartTime=new Date();
  updateTimerDisplay();
}

/* ===================== Grading ===================== */
function gradeAnswer(userText, answer){
  const nums = parseNumbersFromInput(userText);
  if(answer.type==="single"){
    if(nums.length<1) return false;
    return approxEqual(nums[0], answer.values[0]);
  }
  return false;
}

/* ===================== Generate Quiz ===================== */
function signatureOf(built){
  return built.map(q=>q.answer.label).join("|");
}
function generateQuiz(){
  questions=[];
  quizSubmitted=false;

  let tries=0;
  let built=null;

  while(tries<50){
    built = buildSixQuestions();
    const sig = signatureOf(built);
    if(sig !== lastSignature){
      lastSignature = sig;
      break;
    }
    tries++;
  }

  setCounter++;
  setLine.textContent = `Set: ${setCounter}`;

  for(let i=0;i<built.length;i++){
    const partIndex=Math.floor(i/QUESTIONS_PER_PART);
    const indexInPart=i%QUESTIONS_PER_PART;
    questions.push({
      partIndex,
      indexInPart,
      img: built[i].img,
      diagram: built[i].diagram || "",
      hint: built[i].hintText || "Use the half model: identify two equal areas.",
      answer: built[i].answer,
      userValue:"",
      isCorrect:false
    });
  }
}

/* ===================== Sidebar ===================== */
function renderSidebar(){
  sidebarEl.style.display="block";
  sidebarEl.innerHTML=`<h4>Questions</h4><ul id="qList"></ul>`;
  const ul=document.getElementById("qList");
  for(let i=0;i<TOTAL_QUESTIONS;i++){
    const q=questions[i];
    const li=document.createElement("li");
    const label=PART_LABELS[q.partIndex]+(q.indexInPart+1);
    li.textContent=`Q${i+1} (${label})`;
    li.dataset.index=i;
    li.addEventListener("click",()=>{
      saveCurrentInput();
      currentQuestionIndex=i;
      renderQuestion();
    });
    ul.appendChild(li);
  }
  updateSidebarStatus();
}
function updateSidebarStatus(){
  const items=document.querySelectorAll("#qList li");
  items.forEach(li=>{
    const idx=Number(li.dataset.index);
    const q=questions[idx];
    li.classList.remove("active","answered","correct","incorrect");

    if(!quizSubmitted){
      li.classList.toggle("active", idx===currentQuestionIndex);
      if((q.userValue||"").trim()!=="") li.classList.add("answered");
    }else{
      if((q.userValue||"").trim()!==""){
        li.classList.add(q.isCorrect ? "correct" : "incorrect");
      }
    }
  });
}

/* ===================== Helpers ===================== */
function saveCurrentInput(){
  const input=document.getElementById("answerInput");
  if(input){
    questions[currentQuestionIndex].userValue=input.value.trim();
    if(quizSubmitted){
      const q=questions[currentQuestionIndex];
      q.isCorrect = gradeAnswer(q.userValue, q.answer);
      updateSidebarStatus();
    }
  }
}
function mountNavButtonsInto(slotId){
  const slot=document.getElementById(slotId);
  if(!slot) return;
  slot.appendChild(buttonContainer);
  buttonContainer.style.display="flex";
}

/* ===================== Render Question ===================== */
function renderQuestion(){
  const q=questions[currentQuestionIndex];
  const levelLabel=PART_LABELS[q.partIndex];
  const fullLabel=`${levelLabel} — Question ${q.indexInPart+1}`;

  const hintDiagramHtml = q.diagram
    ? `<div class="hint-diagram-wrap"><img src="${q.diagram}" alt="Hint diagram"></div>`
    : "";

  const placeholder = "e.g., 12";

  quizContent.innerHTML=`
    <p class="question-text">Question ${currentQuestionIndex+1} of ${TOTAL_QUESTIONS}</p>
    <div class="part-title">${escapeXml(PART_TITLES[q.partIndex])}</div>

    <div class="single-question">
      <div style="font-weight:800;margin-bottom:8px;">${escapeXml(fullLabel)}</div>

      <div class="img-wrap">
        <img class="q-img" src="${q.img}" alt="Question image">
      </div>

      <div class="answer-row">
        <div style="font-weight:700;">Answer:</div>
        <input id="answerInput" class="answer-box" type="text"
               placeholder="${escapeXml(placeholder)}"
               value="${escapeXml(q.userValue||"")}">
      </div>

      <div id="checkFeedback" style="display:none;"></div>

      <div class="hint-row">
        <button id="hintBtn" class="hint-btn">Hint</button>
      </div>

      <div id="hintBox" class="hint">
        <div>${escapeXml(q.hint)}</div>
        ${hintDiagramHtml}
      </div>
    </div>

    <div id="navSlot"></div>
  `;

  mountNavButtonsInto("navSlot");

  const hintBtn=document.getElementById("hintBtn");
  const hintBox=document.getElementById("hintBox");
  hintBtn.addEventListener("click", ()=>{
    const shown=hintBox.style.display==="block";
    hintBox.style.display = shown ? "none" : "block";
    hintBtn.textContent = shown ? "Hint" : "Hide Hint";
  });

  backButton.style.display="inline-block";
  backButton.style.visibility=(currentQuestionIndex===0)?"hidden":"visible";

  const isLast=(currentQuestionIndex===TOTAL_QUESTIONS-1);
  nextButton.style.display=isLast?"none":"inline-block";
  submitButton.style.display=isLast?"inline-block":"none";

  saveButton.style.display=quizSubmitted?"inline-block":"none";
  checkButton.style.display=(quizSubmitted && !q.isCorrect)?"inline-block":"none";

  updateSidebarStatus();
}

/* ===================== Results + Submit ===================== */
function calculateAndShowResults(){
  saveCurrentInput();

  const now=new Date();
  let attemptMs=elapsedMs;
  if(!isPaused && quizStartTime) attemptMs+=now-quizStartTime;
  if(firstAttemptMs===null) firstAttemptMs=attemptMs;

  const attemptStartTime=quizStartTime || now;
  quizEndTime=now;
  quizSubmitted=true;

  let correctCount=0;
  questions.forEach((q)=>{
    q.isCorrect = gradeAnswer(q.userValue, q.answer);
    if(q.isCorrect) correctCount++;
  });

  updateSidebarStatus();

  let html=`
    <h3>Results for ${escapeXml(studentName)}</h3>
    <p>Set: <strong>${setCounter}</strong></p>
    <p>Score: <strong>${correctCount} / ${TOTAL_QUESTIONS}</strong></p>
    <p>Start time: <strong>${attemptStartTime.toLocaleTimeString()}</strong></p>
    <p>Submit time: <strong>${quizEndTime.toLocaleTimeString()}</strong></p>
    <p>Time taken (this attempt): <strong>${formatMs(attemptMs)}</strong></p>
    <p>First attempt time: <strong>${formatMs(firstAttemptMs)}</strong></p>

    <table class="review-table">
      <tr>
        <th>#</th><th>Part</th><th>Image</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th>
      </tr>
  `;

  questions.forEach((q,i)=>{
    const partLbl=PART_LABELS[q.partIndex]+(q.indexInPart+1);
    const ua=(q.userValue||"").trim();
    const correctText = q.answer.label;

    html+=`
      <tr class="${q.isCorrect ? "correct-answer":"incorrect-answer"}">
        <td>${i+1}</td>
        <td>${escapeXml(partLbl)}</td>
        <td><img class="thumb" src="${q.img}" alt="Q${i+1}"></td>
        <td>${ua==="" ? "—" : escapeXml(ua)}</td>
        <td><strong>${escapeXml(correctText)}</strong></td>
        <td>${ua==="" ? "Not answered" : (q.isCorrect ? "Correct":"Incorrect")}</td>
      </tr>
    `;
  });

  html+=`</table><div id="navSlot"></div>`;
  quizContent.innerHTML=html;

  mountNavButtonsInto("navSlot");

  backButton.style.display="none";
  nextButton.style.display="none";
  submitButton.style.display="none";
  checkButton.style.display="none";
  saveButton.style.display="inline-block";

  // reset timer for review attempt
  elapsedMs=0; isPaused=false; quizStartTime=new Date();
  pauseButton.textContent="Pause";
  startTimerInterval();
  updateTimerDisplay();
}

/* ===================== Buttons ===================== */
nextButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex<TOTAL_QUESTIONS-1){
    currentQuestionIndex++;
    renderQuestion();
  }
});
backButton.addEventListener("click", ()=>{
  saveCurrentInput();
  if(currentQuestionIndex>0){
    currentQuestionIndex--;
    renderQuestion();
  }
});
submitButton.addEventListener("click", ()=>{
  if(currentQuestionIndex===TOTAL_QUESTIONS-1){
    calculateAndShowResults();
  }
});
checkButton.addEventListener("click", ()=>{
  saveCurrentInput();
  const q=questions[currentQuestionIndex];
  if(!quizSubmitted) return;

  q.isCorrect = gradeAnswer(q.userValue, q.answer);
  updateSidebarStatus();

  const box=document.getElementById("checkFeedback");
  if(!box) return;

  box.className="check-feedback";
  box.style.display="block";

  if(q.isCorrect){
    box.innerHTML=`✅ Correct!`;
    checkButton.style.display="none";
  }else{
    box.innerHTML=`❌ Incorrect. Correct answer: <strong>${escapeXml(q.answer.label)}</strong>`;
    checkButton.style.display="inline-block";
  }
});

/* Save TXT */
function formatDateForFilename(date){
  if(!date) return "no_time";
  const pad=n=>String(n).padStart(2,"0");
  return date.getFullYear()+pad(date.getMonth()+1)+pad(date.getDate())+"_"+pad(date.getHours())+pad(date.getMinutes())+pad(date.getSeconds());
}
function saveCurrentResultAsTxt(){
  saveCurrentInput();

  let correctCount=0;
  questions.forEach(q=>{ if(q.isCorrect) correctCount++; });

  const lines=[];
  lines.push("Model 12 — Half Model — Current Result");
  lines.push("Student: "+studentName);
  lines.push("Set: "+setCounter);
  if(quizStartTime) lines.push("Start time: "+quizStartTime.toLocaleString());
  if(quizEndTime) lines.push("Last submit time: "+quizEndTime.toLocaleString());
  lines.push("Score: "+correctCount+" / "+TOTAL_QUESTIONS);
  if(firstAttemptMs!==null) lines.push("First attempt time: "+formatMs(firstAttemptMs));
  lines.push("");

  questions.forEach((q,i)=>{
    const partLbl=PART_LABELS[q.partIndex]+(q.indexInPart+1);
    const userAns=(q.userValue||"").trim()==="" ? "Not answered" : q.userValue;
    const resultText=(q.userValue||"").trim()==="" ? "Not answered" : (q.isCorrect?"Correct":"Incorrect");
    lines.push(`Q${i+1} (${partLbl})`);
    lines.push("Your answer: "+userAns);
    lines.push("Correct answer: "+q.answer.label);
    lines.push("Result: "+resultText);
    lines.push("");
  });

  const content=lines.join("\n");
  const blob=new Blob([content],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const safeName=studentName.replace(/[^a-z0-9_\-]/gi,"_")||"Student";
  const ts=formatDateForFilename(new Date());
  a.href=url;
  a.download=`HalfModel_${safeName}_Set${setCounter}_${ts}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
saveButton.addEventListener("click", saveCurrentResultAsTxt);

/* Pause/Resume (no pop-up) */
pauseButton.addEventListener("click", ()=>{
  if(!quizStartTime && elapsedMs===0 && !quizSubmitted) return;
  if(isPaused){ resumeTimer(); pauseButton.textContent="Pause"; }
  else { pauseTimer(); pauseButton.textContent="Resume"; }
});

/* Generate new set */
generateBtn.addEventListener("click", ()=>{
  if(!quizSubmitted && !confirm("Generate a new random set? All answers will be lost.")) return;

  if(timerInterval) clearInterval(timerInterval);
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=new Date(); quizEndTime=null;
  updateTimerDisplay(); startTimerInterval();
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();
});

/* ===================== Export Questions PDF (2 per page, DYAA header) ===================== */
function waitForImages(container){
  const imgs = Array.from(container.querySelectorAll("img"));
  return Promise.all(imgs.map(img => {
    if(img.complete && img.naturalWidth > 0) return Promise.resolve();
    return new Promise(resolve => {
      img.onload = () => resolve();
      img.onerror = () => resolve();
    });
  }));
}
exportQuestionsBtn.addEventListener("click", async ()=>{
  if(!questions || questions.length===0){
    alert("Please start a quiz first.");
    return;
  }
  if(!window.jspdf || !window.html2canvas){
    alert("PDF libraries failed to load. Please check your internet connection and try again.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  const wrapper=document.createElement("div");
  wrapper.style.position="fixed";
  wrapper.style.left="-9999px";
  wrapper.style.top="0";
  wrapper.style.width="800px";
  wrapper.style.background="#ffffff";
  document.body.appendChild(wrapper);

  try{
    let groupDiv=null;

    questions.forEach((q, idx)=>{
      if(idx%2===0){
        groupDiv=document.createElement("div");
        groupDiv.style.padding="20px";
        groupDiv.style.marginBottom="20px";
        groupDiv.style.boxSizing="border-box";

        const header=document.createElement("div");
        header.innerHTML=`
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <div style="width:24px;height:24px;background:#0d47a1;border-radius:6px;position:relative;">
              <div style="position:absolute;width:12px;height:5px;background:#ff9800;top:-4px;left:12px;border-radius:3px;"></div>
            </div>
            <div style="display:flex;flex-direction:column;line-height:1.1;">
              <div style="font-weight:900;letter-spacing:1px;color:#ff9800;font-size:14px;">DYAA</div>
              <div style="font-size:11px;color:#0d47a1;font-weight:700;">EDUCATION</div>
            </div>
          </div>
          <hr style="border:none;border-top:1px solid #e0e0e0;margin:0 0 12px 0;">
          <div style="font-weight:800;color:#1f2a44;margin:0 0 4px 0;">${LESSON_TITLE}</div>
          <div style="color:#546e7a;font-weight:800;margin:0 0 10px 0;">Questions (Set ${setCounter})</div>
        `;
        groupDiv.appendChild(header);
        wrapper.appendChild(groupDiv);
      }

      const qDiv=document.createElement("div");
      qDiv.style.marginBottom="18px";
      qDiv.innerHTML=`
        <div style="font-weight:700;margin:4px 0 6px 0;">Q${idx+1}</div>
        <div style="border-radius:12px;border:1px solid #e5e5e5;padding:12px;">
          <img src="${q.img}" style="width:100%;height:auto;border-radius:10px;" />
        </div>
      `;
      groupDiv.appendChild(qDiv);
    });

    const groups=Array.from(wrapper.children);

    for(let i=0;i<groups.length;i++){
      await waitForImages(groups[i]);

      const canvas = await html2canvas(groups[i], { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
      const imgData = canvas.toDataURL("image/png");

      const imgWidth = pageWidth - 20;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;

      if(i>0) pdf.addPage();
      pdf.addImage(imgData, "PNG", 10, 10, imgWidth, Math.min(imgHeight, pageHeight - 20));
    }

    const safeName=(studentName||"Student").replace(/[^a-z0-9_\-]/gi,"_") || "Student";
    const ts=formatDateForFilename(new Date());
    pdf.save(`HalfModel_Questions_${safeName}_Set${setCounter}_${ts}.pdf`);
  } finally {
    document.body.removeChild(wrapper);
  }
});

/* ===================== Start Screen (+ optional ?name=Tiger) ===================== */
function getNameFromUrl(){
  const url=new URL(window.location.href);
  const name=url.searchParams.get("name");
  return name ? name.trim() : "";
}
function showStartScreen(){
  sidebarEl.style.display="none";
  buttonContainer.style.display="none";
  generateBtn.style.display="none";
  saveButton.style.display="none";
  pauseButton.style.display="none";
  exportQuestionsBtn.style.display="none";

  studentLine.textContent="";
  setLine.textContent="";

  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  quizStartTime=null; quizEndTime=null;
  updateTimerDisplay();

  const preset=getNameFromUrl();
  if(preset){
    studentName=preset;
    studentLine.textContent=`Student: ${studentName}`;
    startQuiz(true);
    return;
  }

  quizContent.innerHTML=`
    <p>This quiz has <strong>${TOTAL_QUESTIONS}</strong> questions.</p>
    <ul style="margin-top:6px;color:#555;line-height:1.7;">
      <li><strong>Basic:</strong> 2 questions</li>
      <li><strong>Composite:</strong> 2 questions</li>
      <li><strong>Advanced:</strong> 2 questions</li>
    </ul>
    <p style="margin-top:10px;">Enter your name to begin:</p>

    <input id="nameInput" type="text"
      style="padding:10px;width:260px;font-size:1.05em;border:1px solid #ccc;border-radius:10px;"
      placeholder="Your name">

    <button id="startButton"
      style="margin-left:10px;background:#4caf50;padding:10px 20px;color:white;border:none;border-radius:8px;">
      Start Quiz
    </button>
  `;
  document.getElementById("startButton").addEventListener("click", ()=>startQuiz(false));
}
function startQuiz(skipReadName){
  if(!skipReadName){
    const nameInput=document.getElementById("nameInput");
    studentName=(nameInput.value || "Student").trim();
  }
  studentLine.textContent=`Student: ${studentName}`;

  quizStartTime=new Date();
  elapsedMs=0; isPaused=false; firstAttemptMs=null;
  updateTimerDisplay(); startTimerInterval();

  generateQuiz();
  currentQuestionIndex=0;
  renderSidebar();
  renderQuestion();

  generateBtn.style.display="inline-block";
  pauseButton.style.display="inline-block";
  pauseButton.textContent="Pause";
  exportQuestionsBtn.style.display="inline-block";
}

/* ===================== Init ===================== */
showStartScreen();
</script>
